name: Notification
on:
  push:
    branches:
      - main

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          --data-urlencode "text=🔔 تم تحديث المنظومة بنجاح."
