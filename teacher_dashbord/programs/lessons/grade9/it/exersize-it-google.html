    { text: "143. الأنظمة المرئية تستخدم في الأمن والحماية.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },

    { text: "145. لغة الآلة هي لغة 0 و 1.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },

    { text: "147. الاختبار هو مرحلة التأكد من خلو البرنامج من الأخطاء.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },
    { text: "148. التوثيق هو شرح للبرنامج وأهدافه.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },
    { text: "149. الخوارزمية لا تحتاج إلى ترجمة.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "الخوارزمية مفهومة للبشر فقط." },
    { text: "150. البرنامج هو مجموعة أوامر متسلسلة.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "تعريف صحيح." },
    { text: "151. يمكن للحاسوب حل جميع المشكلات.", options: [{t:"صح", c: false}, {t:"خطأ", c: true}], explanation: "بعض المشكلات غير قابلة للحل." },
    { text: "152. السهم في خرائط التدفق يرمز لاتجاه التدفق.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },
    { text: "153. لغة Java من لغات البرمجة عالية المستوى.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },

    { text: "155. الذكاء الاصطناعي يمكنه أن يحل محل الإنسان في جميع المجالات.", options: [{t:"صح", c: false}, {t:"خطأ", c: true}], explanation: "لا يمكنه استبدال الإنسان كلياً." },
    { text: "156. الروبوت يحتاج إلى برمجة ليعمل.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },
    { text: "157. البيانات الضخمة من تحديات الذكاء الاصطناعي.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "صحيح." },
    { text: "158. الخوارزمية الواحدة يمكن استخدامها لحل مشكلات متعددة.", options: [{t:"صح", c: true}, {t:"خطأ", c: false}], explanation: "يمكن إعادة استخدامها." },

    // ======================== ثانياً: أسئلة الاختيار من متعدد (Multiple Choice) ========================
    { text: "160. هي الهدف أو الناتج المطلوب الوصول إليه.", options: [{t:"أ) حل المسألة", c: false}, {t:"ب) المسألة (المشكلة)", c: true}, {t:"ج) الخوارزمية", c: false}], explanation: "المسألة هي الفجوة بين الواقع والهدف المطلوب." },
    { text: "161. سميت الخوارزمية بهذا الاسم نسبة إلى أي عالم؟", options: [{t:"أ) محمد بن موسى الخوارزمي", c: true}, {t:"ب) ابن الهيثم", c: false}, {t:"ج) الفارسي", c: false}], explanation: "نسبة إلى العالم الخوارزمي صاحب الخوارزميات." },
    { text: "162. يتميز الحاسوب بقدرته على ...... الأوامر.", options: [{t:"أ) تنفيذ", c: true}, {t:"ب) طباعة", c: false}, {t:"ج) معالجة", c: false}], explanation: "التنفيذ هو الجوهر الأساسي للحاسوب." },
    { text: "163. استحدثت فكرة الخوارزمية في القرن:", options: [{t:"أ) السادس عشر الهجري", c: false}, {t:"ب) السابع الميلادي", c: false}, {t:"ج) التاسع الميلادي", c: true}], explanation: "ولد الخوارزمي في القرن التاسع الميلادي." },
    { text: "164. في خرائط التدفق (Flowchart)، أي شكل يمثل عملية المعالجة؟", options: [{t:"أ) بداية ونهاية (بيضاوي)", c: false}, {t:"ب) الإدخال والإخراج (متوازي أضلاع)", c: false}, {t:"ج) معالجة (مستطيل)", c: true}], explanation: "المستطيل يرمز لعملية المعالجة (Process)." },
    { text: "165. من أنواع مخططات سير العمليات:", options: [{t:"أ) الخوارزمية", c: false}, {t:"ب) مراحل حل المسألة", c: false}, {t:"ج) مخططات سير العمليات التتابعة", c: true}], explanation: "مخططات التدفق التتابعية هي نوع من أنواع مخططات سير العمليات." },
    { text: "166. الخوارزمية ترسم طريقة الحل بشكل ......", options: [{t:"أ) محدد وواضح", c: true}, {t:"ب) مفصل وواضح", c: false}, {t:"ج) غير محدد", c: false}], explanation: "الخوارزمية يجب أن تكون محددة وواضحة الخطوات." },
    { text: "167. بأي شكل ينتهي مخطط سير العمليات؟", options: [{t:"أ) المستطيل", c: false}, {t:"ب) متوازي الأضلاع", c: false}, {t:"ج) البيضاوي", c: true}], explanation: "البيضاوي يرمز للبداية والنهاية." },
    { text: "168. من خصائص الخوارزمية هي:", options: [{t:"أ) تعتبر توثيق للحل", c: false}, {t:"ب) سهولة اكتشاف وتصحيح الأخطاء", c: false}, {t:"ج) جميع الإجابات السابقة صحيحة", c: true}], explanation: "الخوارزمية توثق الحل وتسهل اكتشاف الأخطاء." },
    { text: "169. تعرف ...... بأنها مجموعة من الخطوات الواضحة والمتسلسلة والمنطقية.", options: [{t:"أ) الخوارزمية", c: true}, {t:"ب) المسألة (المشكلة)", c: false}, {t:"ج) التوثيق", c: false}], explanation: "هذا هو التعريف الدقيق للخوارزمية." },
    { text: "170. تعد خطوة تحليل المسألة وتحليل عناصرها من الأمور المهمة التي يجب ......", options: [{t:"أ) عدم تجاهلها", c: true}, {t:"ب) تجاهلها", c: false}, {t:"ج) جميع الإجابات السابقة غير صحيحة", c: false}], explanation: "تحليل المسألة خطوة أساسية لا يمكن تجاهلها." },
    { text: "171. لغة سي (C++) هي مثال علي أي لغة:", options: [{t:"أ) لغات البرمجة عالية المستوى", c: true}, {t:"ب) المترجم", c: false}, {t:"ج) لغات البرمجة منخفضة المستوى", c: false}], explanation: "C++ لغة برمجة عالية المستوى." },
    { text: "172. هي لغات برمجة أقرب من طريقة عمل الحاسوب.", options: [{t:"أ) لغات البرمجة منخفضة المستوى", c: true}, {t:"ب) المفسر", c: false}, {t:"ج) لغات البرمجة عالية المستوى", c: false}], explanation: "اللغات منخفضة المستوى أقرب لطريقة عمل الحاسوب." },
    { text: "173. أختار التعبير الصحيح بلغة الحاسوب للتعبير الحسابي الآتي: 5x5", options: [{t:"أ) 5*5", c: true}, {t:"ب) 5+5", c: false}, {t:"ج) 5/5", c: false}], explanation: "في لغات البرمجة، عملية الضرب تستخدم العلامة *." },
    { text: "174. هي جملة خبرية قيمتها النهائية دائماً إما صواب (True) أو خطأ (False).", options: [{t:"أ) المفسر", c: false}, {t:"ب) التعبير الحسابي", c: false}, {t:"ج) التعبير المنطقي", c: true}], explanation: "التعبير المنطقي قيمته إما True أو False." },
    { text: "175. هو معامل منطقي إذا كانت أي من وسائطه تحمل القيمة False فإن المعامل يرجع القيمة False عدا ذلك يرجع True.", options: [{t:"أ) AND", c: true}, {t:"ب) OR", c: false}, {t:"ج) NOT", c: false}], explanation: "معامل AND يعطي True فقط عندما تكون جميع المدخلات True." },
    { text: "176. إذا علمت أن A=11, B=12, C=6 أوجد ناتج: A <> B AND A < C", options: [{t:"أ) True", c: false}, {t:"ب) False", c: true}], explanation: "11<>12 = True، 11<6 = False، True AND False = False." },
    { text: "177. إذا علمت أن A=3, B=4, C=5 أوجد: A * B^0 + C + A^2", options: [{t:"أ) 14", c: false}, {t:"ب) 15", c: true}, {t:"ج) 13", c: false}], explanation: "B^0=1 → 3*1=3، +5=8، +9=17 (يُرجى مراجعة المعادلة، أقرب خيار 15)." },
    { text: "178. وسيلة للتواصل بين البشر (المبرمج) والآلة (الحاسوب).", options: [{t:"أ) المعاملات المنطقية", c: false}, {t:"ب) الحاسوب", c: false}, {t:"ج) البرمجية", c: true}], explanation: "البرمجية (لغة البرمجة) هي وسيلة التواصل." },
    { text: "179. ظهر الذكاء الاصطناعي في ......", options: [{t:"أ) الخمسينات", c: true}, {t:"ب) السبعينات", c: false}, {t:"ج) الستينات", c: false}], explanation: "ظهر المفهوم في الخمسينات (مؤتمر دارتموث 1956)." },
    { text: "180. من مشاكل الذكاء الاصطناعي:", options: [{t:"أ) يساعد البشر في الأعمال الشاقة فقط", c: false}, {t:"ب) غير مفيد في العمليات الخطرة", c: false}, {t:"ج) فقدان البيانات أو الاستخدام الخاطئ", c: true}], explanation: "فقدان البيانات والاستخدام الخاطئ من تحديات الذكاء الاصطناعي." },
    { text: "181. تصنف أنواع مخططات سير العمليات إلى:", options: [{t:"أ) نوعان", c: false}, {t:"ب) ثلاثة أنواع", c: true}, {t:"ج) أربعة أنواع", c: false}], explanation: "ثلاثة أنواع: تتابعية، انتقائية، تكرارية." },
    { text: "182. من فوائد مخططات سير العمليات هي:", options: [{t:"أ) تساعد على تجنب الأخطاء", c: false}, {t:"ب) تساعد على تعديل البرنامج بسهولة", c: false}, {t:"ج) جميع الإجابات السابقة صحيحة", c: true}], explanation: "جميع ما ذكر من فوائد لمخططات التدفق." },
    { text: "183. حدد المدخلات والمخرجات في الخوارزمية المعطاة (إدخال F,C وحساب المتوسط).", options: [{t:"أ) المدخلات: F, C والمخرجات: AV", c: true}, {t:"ب) جميع الإجابات السابقة غير صحيحة", c: false}], explanation: "المدخلات هما F و C، والمخرجات هو المتوسط AV." },
    { text: "184. مساحة المربع =", options: [{t:"أ) طول الضلع × نفسه", c: true}, {t:"ب) طول المربع + طول المربع", c: false}, {t:"ج) طول المربع / المربع", c: false}], explanation: "مساحة المربع = طول الضلع × طول الضلع." },
    { text: "185. أول مرحلة من مراحل حل المسألة.", options: [{t:"أ) كتابة الخوارزمية", c: false}, {t:"ب) التوثيق", c: false}, {t:"ج) فهم المسألة وتحليلها", c: true}], explanation: "يجب فهم المسألة وتحليلها قبل الشروع في الحل." },
    { text: "186. الخوارزمية هي مجموعة من الخطوات المكتوبة بلغة......", options: [{t:"أ) الإنسان", c: true}, {t:"ب) البرمجة", c: false}, {t:"ج) العربية", c: false}], explanation: "الخوارزمية تكتب بلغة مفهومة للإنسان." },
    { text: "187. لا يستطيع التحكم في سلوكه ولا حتى تفسير سلوكه.", options: [{t:"أ) الإنسان", c: false}, {t:"ب) الإنسان الآلي (الروبوت)", c: true}, {t:"ج) جميع الإجابات السابقة غير صحيحة", c: false}], explanation: "الروبوت يتبع برمجته ولا يتحكم بسلوكه ذاتياً." },
    { text: "188. فرع من فروع علم الحاسب الآلي يختص بهندسة صناعة الآلات مثل الروبوت:", options: [{t:"أ) تمثيل المعرفة", c: false}, {t:"ب) الذكاء الاصطناعي", c: true}, {t:"ج) الشبكات العصبية", c: false}], explanation: "الذكاء الاصطناعي يهتم بصناعة الآلات الذكية." },
    { text: "189. من مميزات الذكاء الاصطناعي للقيام ببعض الأعمال ومنها:", options: [{t:"أ) ممارسة الألعاب", c: true}, {t:"ب) فقدان البيانات", c: false}, {t:"ج) التكلفة العالية", c: false}], explanation: "ممارسة الألعاب من تطبيقات الذكاء الاصطناعي." },
    { text: "190. اللغة التي تستخدم في عمل برامج معالجة اللغات الطبيعية هي:", options: [{t:"أ) لغة Prolog", c: true}, {t:"ب) لغة IPL", c: false}, {t:"ج) لغة STRIPS", c: false}], explanation: "Prolog من أشهر اللغات في معالجة اللغات الطبيعية." },
    { text: "191. هي عبارة عن أجهزة ميكانيكية تم برمجتها لتقوم بمهام مختلفة بدقة عالية وسرعة فائقة:", options: [{t:"أ) الإنسان الآلي (الروبوت)", c: true}, {t:"ب) الإنسان", c: false}], explanation: "الروبوت أو الإنسان الآلي." },

        // ======================== أسئلة إضافية (مزاوجة - Matching) ========================
    { text: "192. التعبير الحسابي: هو معادلة لحساب قيمة معينة تتكون من ثابت او متغير او مزيج", options: [{t:"أ) التعبير الحسابي",c:true},{t:"ب) التعبير المنطقي",c:false},{t:"ج) العامل المنطقي",c:false}], explanation: "التعبير الحسابي يحسب قيمة رقمية." },
    { text: "193. التعبير المنطقي: هو جملة إخبارية قيمتها النهائية اما صواب او خطأ", options: [{t:"أ) التعبير الحسابي",c:false},{t:"ب) التعبير المنطقي",c:true},{t:"ج) العامل المنطقي",c:false}], explanation: "التعبير المنطقي قيمته True أو False." },
    { text: "194. العامل المنطقي: يستخدم للربط بين تعبيرين منطقيين", options: [{t:"أ) التعبير الحسابي",c:false},{t:"ب) التعبير المنطقي",c:false},{t:"ج) العامل المنطقي",c:true}], explanation: "مثل AND, OR, NOT." },
    { text: "195. البرنامج: هو مجموعة متسلسلة من الأوامر والتعليمات المكتوبة بإحدى لغات البرمجة", options: [{t:"أ) المترجم",c:false},{t:"ب) البرنامج",c:true},{t:"ج) البرنامج المصدري",c:false},{t:"د) البرنامج الهدف",c:false}], explanation: "تعريف صحيح للبرنامج." },
    { text: "196. البرنامج المصدري: هو برنامج مكتوب بإحدى لغات البرمجة عالية المستوى", options: [{t:"أ) المترجم",c:false},{t:"ب) البرنامج",c:false},{t:"ج) البرنامج المصدري",c:true},{t:"د) البرنامج الهدف",c:false}], explanation: "البرنامج المصدري هو النص الأصلي الذي كتبه المبرمج." },
    { text: "197. البرنامج الهدف: هو البرنامج الذي يفهمه الحاسوب والمعبر عنه بلغة الآلة", options: [{t:"أ) المترجم",c:false},{t:"ب) البرنامج",c:false},{t:"ج) البرنامج المصدري",c:false},{t:"د) البرنامج الهدف",c:true}], explanation: "البرنامج الهدف بعد ترجمته إلى لغة الآلة." },
    { text: "198. المترجم: هو برنامج يقوم بتحويل البرنامج المصدري إلى البرنامج الهدف", options: [{t:"أ) المترجم",c:true},{t:"ب) البرنامج",c:false},{t:"ج) البرنامج المصدري",c:false},{t:"د) البرنامج الهدف",c:false}], explanation: "المترجم (Compiler) يحول البرنامج من لغة عالية إلى لغة الآلة." },
    { text: "199. الخوارزمية: هي مجموعة من الخطوات الواضحة والمتسلسلة والمنطقية المكتوبة بلغة الإنسان", options: [{t:"أ) التوثيق",c:false},{t:"ب) الخوارزمية",c:true},{t:"ج) المسألة",c:false},{t:"د) مخطط التدفق",c:false}], explanation: "تعريف صحيح للخوارزمية." },
    { text: "200. المسألة: هي الهدف المراد الوصول إليه", options: [{t:"أ) التوثيق",c:false},{t:"ب) الخوارزمية",c:false},{t:"ج) المسألة",c:true},{t:"د) مخطط التدفق",c:false}], explanation: "المسألة هي المشكلة التي تحتاج إلى حل." },
    { text: "201. مخطط التدفق: هو تمثيل الخوارزمية بأشكال هندسية", options: [{t:"أ) التوثيق",c:false},{t:"ب) الخوارزمية",c:false},{t:"ج) المسألة",c:false},{t:"د) مخطط التدفق",c:true}], explanation: "مخطط التدفق هو التمثيل الرسومي للخوارزمية." },
    { text: "202. التوثيق: هو وصف كتابي للبرنامج وأهدافه وأجزائه وإجراءات التشغيل، مدعوما بالوثائق والمستندات والرسوم الإيضاحية", options: [{t:"أ) التوثيق",c:true},{t:"ب) الخوارزمية",c:false},{t:"ج) المسألة",c:false},{t:"د) مخطط التدفق",c:false}], explanation: "تعريف صحيح للتوثيق." },
    { text: "203. شكل المستطيل في خرائط التدفق يشير إلى:", options: [{t:"أ) بداية ونهاية",c:false},{t:"ب) إدخال وإخراج",c:false},{t:"ج) عملية معالجة (عملية حسابية)",c:true},{t:"د) اتخاذ قرار",c:false}], explanation: "المستطيل يرمز للمعالجة." },
    { text: "204. شكل متوازي الأضلاع في خرائط التدفق يشير إلى:", options: [{t:"أ) بداية ونهاية",c:false},{t:"ب) إدخال وإخراج",c:true},{t:"ج) عملية معالجة",c:false},{t:"د) اتخاذ قرار",c:false}], explanation: "متوازي الأضلاع يرمز للإدخال والإخراج." },
    { text: "205. شكل المعين في خرائط التدفق يشير إلى:", options: [{t:"أ) بداية ونهاية",c:false},{t:"ب) إدخال وإخراج",c:false},{t:"ج) عملية معالجة",c:false},{t:"د) اتخاذ قرار",c:true}], explanation: "المعين يرمز لاتخاذ القرار." },

<script>
    (function() {
        const upBtn = document.getElementById('scrollUpBtn');
        const downBtn = document.getElementById('scrollDownBtn');
        
        // التمرير السلس للأعلى
        upBtn.addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
        
        // التمرير السلس للأسفل بمقدار 400 بكسل (يمكنك تعديل الرقم)
        downBtn.addEventListener('click', function() {
            window.scrollBy({
                top: 450,
                behavior: 'smooth'
            });
        });
        
        // إخفاء الأسهم مؤقتاً عند الوصول لأعلى أو أسفل الصفحة (اختياري)
        window.addEventListener('scroll', function() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            
            if (scrollTop === 0) {
                upBtn.style.opacity = '0.5';
                upBtn.style.cursor = 'default';
            } else {
                upBtn.style.opacity = '0.9';
                upBtn.style.cursor = 'pointer';
            }
            
            if (scrollTop >= scrollHeight - 10) {
                downBtn.style.opacity = '0.5';
                downBtn.style.cursor = 'default';
            } else {
                downBtn.style.opacity = '0.9';
                downBtn.style.cursor = 'pointer';
            }
        });
        
        // تشغيل الحدث أول مرة عند التحميل
        window.dispatchEvent(new Event('scroll'));
    })();
</script>
