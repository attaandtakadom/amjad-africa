<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Game - Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --dark: #2C3E50; --light: #F7F9FB; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 100px; }
        .app-container { max-width: 500px; width: 100%; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        
        .family-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .family-card { background: #fff; border: 2px solid #eee; border-radius: 20px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .family-card:active { transform: scale(0.95); background: #f0f0f0; }
        .family-card img { width: 80px; height: 80px; border-radius: 50%; pointer-events: none; }
        .family-card h3 { margin: 8px 0 2px 0; font-size: 18px; color: var(--dark); pointer-events: none; }
        .family-card p { margin: 0; color: var(--primary); font-size: 14px; pointer-events: none; }

        .quiz-section { background: #fff0f0; padding: 15px; border-radius: 20px; border: 2px dashed var(--primary); }
        .target-text { font-size: 38px; color: var(--primary); font-weight: 900; margin: 10px 0; display: block; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 12px; text-decoration: none; background: #f1f2f6; color: var(--dark); font-weight: bold; text-align: center; border: none; font-size: 14px; }
    </style>
</head>
<body onclick="initAudio()">

<div class="app-container">
    <h1><i class="fas fa-users"></i> My Family</h1>
    
    <div class="quiz-section">
        <p style="margin:0; color:#666; font-weight: bold;">Find this person:</p>
        <span id="target-name" class="target-text">...</span>
    </div>

    <div class="family-grid" id="mainGrid"></div>
    <div id="feedback" style="font-size: 22px; font-weight: bold; margin-top: 10px; min-height: 35px;"></div>
</div>

<div class="nav-bar">
    <a href="../../../../english_dashboard.html" class="nav-btn">🏠 الرئيسية</a>
    <button onclick="location.reload()" class="nav-btn" style="background:var(--secondary); color:white;">🔄 إعادة اللعب</button>
</div>

<audio id="soundCorrect" src="../../../../../sound/correct-sound.mp3" preload="auto"></audio>
<audio id="soundWrong" src="#" preload="auto"></audio>

<script>
    const members = [
        { n: 'Father', a: 'الأب', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png' },
        { n: 'Mother', a: 'الأم', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png' },
        { n: 'Brother', a: 'الأخ', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140037.png' },
        { n: 'Sister', a: 'الأخت', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140040.png' },
        { n: 'Grandfather', a: 'الجد', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140052.png' },
        { n: 'Grandmother', a: 'الجدة', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140051.png' }
    ];

    let currentTarget = "";
    let isLocked = false;
    let audioStarted = false;

    // تفعيل قناة الصوت عند أول لمسة
    function initAudio() {
        if (!audioStarted) {
            audioStarted = true;
            document.getElementById('soundCorrect').play().then(() => {
                document.getElementById('soundCorrect').pause();
            }).catch(() => {});
        }
    }

    function build() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'family-card';
            card.innerHTML = `<img src="${m.i}"><h3>${m.n}</h3><p>${m.a}</p>`;
            card.onclick = (e) => { e.stopPropagation(); check(m.n); };
            grid.appendChild(card);
        });
        nextQuestion();
    }

    function nextQuestion() {
        isLocked = false; // فك قفل الاختيار
        let pick;
        do {
            pick = members[Math.floor(Math.random() * members.length)].n;
        } while (pick === currentTarget);
        
        currentTarget = pick;
        document.getElementById('target-name').innerText = currentTarget;
        document.getElementById('feedback').innerText = "";
    }

    function check(selectedName) {
        if (isLocked) return;
        const fb = document.getElementById('feedback');
        
        if (selectedName === currentTarget) {
            isLocked = true; // منع الضغط المتعدد أثناء الانتقال
            fb.innerText = "Excellent! 🎉";
            fb.style.color = "#27ae60";
            playSound('soundCorrect');
            
            // الانتقال الإجباري للسؤال التالي بعد ثانيتين
            setTimeout(nextQuestion, 2000);
        } else {
            fb.innerText = "Try again! ❌";
            fb.style.color = "#e74c3c";
            playSound('soundWrong');
        }
    }

    function playSound(id) {
        const s = document.getElementById(id);
        if (s) {
            s.currentTime = 0;
            s.play().catch(() => {});
        }
    }

    // التشغيل
    window.onload = build;
</script>
</body>
</html>
