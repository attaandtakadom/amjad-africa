<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning - Data Show Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --dark: #2C3E50;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 1300px; width: 100%; background: rgba(255, 255, 255, 0.95);
            border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 40px; text-align: center; position: relative;
        }

        .home-btn {
            position: absolute; top: 30px; left: 30px;
            background: var(--dark); color: white; padding: 15px 25px;
            border-radius: 20px; text-decoration: none; font-size: 20px;
            font-weight: bold; display: flex; align-items: center; gap: 10px;
        }

        .family-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .family-card {
            background: white; border: 6px solid #eee; border-radius: 40px;
            padding: 20px; cursor: pointer; transition: 0.3s;
        }
        .family-card:active { transform: scale(0.95); border-color: var(--secondary); }
        .family-card img { width: 140px; height: 140px; border-radius: 50%; pointer-events: none; }
        .family-card h3 { font-size: 32px; margin: 10px 0; color: var(--dark); pointer-events: none; }
        .family-card p { font-size: 20px; color: #666; font-weight: bold; pointer-events: none; }

        .quiz-section {
            background: white; padding: 40px; border-radius: 50px; border: 8px dashed var(--primary);
        }
        #target-name { 
            font-size: 110px; color: var(--primary); font-weight: 900; 
            display: block; margin: 15px 0; text-transform: uppercase;
        }

        .feedback { font-size: 45px; font-weight: bold; min-height: 60px; margin-top: 20px; }
        .btn-music { background: #5f27cd; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 20px; }
        .repeat-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 25px; cursor: pointer; font-size: 24px; margin-top: 15px; }
    </style>
</head>
<body onclick="startEngine()">

<div class="app-container">
    <a href="../../../../../teacher_dashbord/english_dashboard.html" class="home-btn">
        <i class="fas fa-arrow-left"></i> الرئيسية
    </a>

    <div style="margin-top: 50px;">
        <button class="btn-music" onclick="toggleMusic()">
            <i class="fas fa-music"></i> MUSIC ON/OFF
        </button>
    </div>
    
    <h1 style="font-size: 50px; color: var(--dark); margin: 15px 0;">Family Members</h1>
    
    <div class="family-grid" id="mainGrid"></div>

    <div class="quiz-section">
        <h2 style="font-size: 35px; margin:0; color: var(--dark);">WHO IS:</h2>
        <span id="target-name">...</span>
        <button class="repeat-btn" onclick="repeatQuest()">
            <i class="fas fa-volume-up"></i> HEAR QUESTION
        </button>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<audio id="bg-music" loop src="https://www.soundjay.com/free-music/sounds/barn-beat-01.mp3"></audio>
<audio id="applause-sound" src="https://www.soundjay.com/human/sounds/applause-01.mp3" preload="auto"></audio>

<script>
    const members = [
        { n: 'Dad', a: 'الأب', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png' },
        { n: 'Mom', a: 'الأم', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png' },
        { n: 'Uncle', a: 'العم/الخال', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140061.png' },
        { n: 'Aunt', a: 'العمة/الخالة', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140045.png' },
        { n: 'Cousin', a: 'ابن العم', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140039.png' },
        { n: 'Grandpa', a: 'الجد', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140052.png' },
        { n: 'Grandma', a: 'الجدة', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140051.png' },
        { n: 'Brother', a: 'الأخ', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140037.png' },
        { n: 'Sister', a: 'الأخت', i: 'https://cdn-icons-png.flaticon.com/512/4140/4140040.png' }
    ];

    let currentTarget = "";
    let engineStarted = false;
    let canChoose = true;

    function startEngine() {
        if (!engineStarted) {
            engineStarted = true;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            if(currentTarget === "") nextQuest();
        }
    }

    function initApp() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'family-card';
            card.onclick = (e) => { e.stopPropagation(); checkAnswer(m.n); };
            card.innerHTML = `<img src="${m.i}"><h3>${m.n}</h3><p>${m.a}</p>`;
            grid.appendChild(card);
        });
        // إظهار الاسم الأول فوراً
        currentTarget = members[Math.floor(Math.random() * members.length)].n;
        document.getElementById('target-name').innerText = currentTarget;
    }

    function nextQuest() {
        canChoose = true;
        let next;
        do {
            next = members[Math.floor(Math.random() * members.length)].n;
        } while (next === currentTarget);
        
        currentTarget = next;
        document.getElementById('target-name').innerText = currentTarget;
        document.getElementById('feedback').innerText = "";
        say("Where is " + currentTarget + "?");
    }

    function checkAnswer(selected) {
        if (!canChoose) return;
        if (!engineStarted) startEngine();

        const fb = document.getElementById('feedback');
        if (selected === currentTarget) {
            canChoose = false;
            fb.innerText = "FANTASTIC! 🌟";
            fb.style.color = "var(--success)";
            try { document.getElementById('applause-sound').play(); } catch(e){}
            say("Yes! That is " + selected);
            
            // وقت كافٍ للصوت قبل التبديل
            setTimeout(nextQuest, 3000);
        } else {
            fb.innerText = "TRY AGAIN! IT'S " + selected.toUpperCase();
            fb.style.color = "var(--danger)";
            say("No, that is " + selected);
        }
    }

    function say(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function repeatQuest() {
        if(!engineStarted) startEngine();
        say("Where is " + currentTarget + "?");
    }

    let isMusicOn = false;
    function toggleMusic() {
        const music = document.getElementById('bg-music');
        if(!isMusicOn) { music.play(); isMusicOn = true; }
        else { music.pause(); isMusicOn = false; }
    }

    window.onload = initApp;
</script>
</body>
</html>
