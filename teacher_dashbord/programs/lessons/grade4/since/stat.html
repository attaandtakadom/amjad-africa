<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الأمل - حالات المادة</title>
    <style>
        :root { --solid: #e67e22; --liquid: #3498db; --gas: #9b59b6; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Arial; background: #f4f7f9; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; padding: 15px; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        
        .header { text-align: center; border-bottom: 3px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 1.3rem; }
        
        .btn-home { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; width: 100%; }
        
        .card { background: #fff; border: 3px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .card.correct { border-color: var(--success); background-color: #f0fff4; }
        
        .title-solid { color: var(--solid); }
        .title-liquid { color: var(--liquid); }
        .title-gas { color: var(--gas); }

        .question-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .input-box { width: 85%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; text-align: center; margin-bottom: 10px; outline: none; }
        
        .btn-check { width: 100%; padding: 12px; background: #34495e; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        
        .feedback { display: none; text-align: center; margin-top: 10px; font-weight: bold; font-size: 1.2rem; color: var(--success); }
        .clap { display: none; font-size: 2.5rem; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
        <a href="../../../../../teacher_dashbord/s-da.html" class="mhome">🏠 العودة للرئيسية</a>
    
    <div class="header">
        <h1>🔍 استكشاف حالات المادة الثلاث</h1>
    </div>

    <div class="card" id="card-solid">
        <span class="question-text title-solid">1. الحجر يحتفظ دائماً بنفس الشكل، إذاً هو حالة:</span>
        <input type="text" class="input-box" id="ans-solid" placeholder="اكتب الإجابة هنا...">
        <button class="btn-check" onclick="checkAnswer('card-solid', 'ans-solid', ['صلب', 'صلبة', 'الصلبة', 'الصلب'])">تأكيد الإجابة</button>
        <div class="feedback">رائع! الجسم الصلب لا يتغير شكله ✨</div>
        <div class="clap">👏👏👏👏</div>
    </div>

    <div class="card" id="card-liquid">
        <span class="question-text title-liquid">2. الماء يتخذ شكل الإناء الذي يوضع فيه، هو حالة:</span>
        <input type="text" class="input-box" id="ans-liquid" placeholder="اكتب الإجابة هنا...">
        <button class="btn-check" onclick="checkAnswer('card-liquid', 'ans-liquid', ['سائل', 'سائلة', 'السائلة', 'السائل'])">تأكيد الإجابة</button>
        <div class="feedback">ممتاز! السائل ليس له شكل محدد 💧</div>
        <div class="clap">👏👏👏👏</div>
    </div>

    <div class="card" id="card-gas">
        <span class="question-text title-gas">3. الهواء داخل البالونات يمثل الحالة:</span>
        <input type="text" class="input-box" id="ans-gas" placeholder="اكتب الإجابة هنا...">
        <button class="btn-check" onclick="checkAnswer('card-gas', 'ans-gas', ['غاز', 'غازية', 'الغازية', 'الغاز'])">تأكيد الإجابة</button>
        <div class="feedback">بطل! الغازات ليس لها شكل محدد 🎈</div>
        <div class="clap">👏👏👏👏</div>
    </div>

</div>


<script>
    function checkAnswer(cardId, inputId, correctList) {
        const userInput = document.getElementById(inputId).value.trim();
        const card = document.getElementById(cardId);
        
        // التحقق من وجود الإجابة في القائمة المرنة
        if (correctList.includes(userInput)) {
            card.classList.add('correct');
            card.querySelector('.feedback').style.display = 'block';
            card.querySelector('.clap').style.display = 'block';
            
            // تشغيل صوت التصفيق
            const sound = document.getElementById('clap-sound');
            sound.currentTime = 0;
            sound.play();
            
            // اهتزاز النقال للتعزيز الحسي
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
            alert("حاول مرة أخرى يا بطل ❤️");
        }
    }
</script>

</body>
</html>
