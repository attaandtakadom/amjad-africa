<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Safari - English</title>
    <style>
        :root {
            --safari-green: #2ecc71;
            --safari-orange: #e67e22;
            --bg: #fafff0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 10px 10px 100px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.4s;
        }

        h1 {
            color: var(--safari-green);
            font-size: 24px;
            margin: 10px 0;
        }

        .quiz-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 3px dashed var(--safari-orange);
            margin-bottom: 15px;
        }

        .target-name {
            font-size: 40px;
            font-weight: bold;
            color: var(--safari-orange);
            min-height: 50px;
        }

        .animals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .animal-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .animal-emoji { font-size: 50px; display: block; margin-bottom: 5px; }
        .animal-label { font-size: 18px; font-weight: bold; color: #2d3436; }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: none;
        }

        .home-btn { background: #f1f2f6; color: #2d3436; }
        .next-btn { background: var(--safari-green); color: white; }

        #feedback {
            font-weight: bold;
            margin-top: 10px;
            font-size: 1.2rem;
            height: 25px;
        }
    </style>
</head>
<body>

    <h1>🦁 Animal Safari 🐘</h1>

    <div class="quiz-container">
        <div style="color: #7f8c8d; font-weight: bold;">Find the animal:</div>
        <div id="targetDisplay" class="target-name">Loading...</div>
        <div id="feedback"></div>
    </div>

    <div class="animals-grid" id="mainGrid"></div>

    <div class="nav-bar">
        <a href="../../../../../teacher_dashbord/english_dashboard.html" class="nav-btn home-btn">
            🏠 الرئيسية
        </a>
        <a href="numbers.html" class="nav-btn next-btn">
            الأرقام ➔
        </a>
    </div>

    <script>
        const animalData = [
            { n: 'Lion', e: '🦁' }, { n: 'Elephant', e: '🐘' },
            { n: 'Monkey', e: '🐒' }, { n: 'Zebra', e: '🦓' },
            { n: 'Giraffe', e: '🦒' }, { n: 'Panda', e: '🐼' },
            { n: 'Rabbit', e: '🐰' }, { n: 'Cat', e: '🐱' },
            { n: 'Dog', e: '🐶' }, { n: 'Cow', e: '🐮' }
        ];

        let target = "";

        function buildGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            animalData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'animal-card';
                card.innerHTML = `<span class="animal-emoji">${item.e}</span><span class="animal-label">${item.n}</span>`;
                card.onclick = () => check(item.n, card);
                grid.appendChild(card);
            });
        }

        function newQuest() {
            // اختيار حيوان عشوائي مختلف عن الحالي
            let newTarget;
            do {
                newTarget = animalData[Math.floor(Math.random() * animalData.length)].n;
            } while (newTarget === target);
            
            target = newTarget;
            document.getElementById('targetDisplay').innerText = target;
            document.getElementById('feedback').innerText = "";
            document.body.style.backgroundColor = "#fafff0";
        }

        function check(clicked, element) {
            const feedback = document.getElementById('feedback');
            if (clicked === target) {
                element.style.backgroundColor = "#d1f7d1";
                feedback.innerText = "Excellent! ✨";
                feedback.style.color = "#27ae60";
                document.body.style.backgroundColor = "#d1f7d1";
                
                // الاستمرار في التمرين بعد ثانيتين
                setTimeout(() => {
                    element.style.backgroundColor = "white";
                    newQuest();
                }, 1500);
            } else {
                element.style.backgroundColor = "#ffe0e0";
                feedback.innerText = "Try again! ❌";
                feedback.style.color = "#e74c3c";
                document.body.style.backgroundColor = "#ffe0e0";
                setTimeout(() => { 
                    element.style.backgroundColor = "white";
                    document.body.style.backgroundColor = "#fafff0";
                    feedback.innerText = "";
                }, 800);
            }
        }

        // بدء اللعبة
        buildGrid();
        newQuest();
    </script>
</body>
</html>
