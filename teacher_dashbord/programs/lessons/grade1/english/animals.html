<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Safari - English</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --safari-green: #2ecc71;
            --safari-orange: #e67e22;
            --bg: #fafff0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 10px 10px 120px 10px; /* مسافة كبيرة للأزرار السفلية */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--safari-green);
            font-size: 24px;
            margin: 10px 0;
            text-shadow: 1px 1px white;
        }

        .quiz-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 3px dashed var(--safari-orange);
            margin-bottom: 15px;
        }

        .target-name {
            font-size: 40px;
            font-family: 'Fredoka One';
            color: var(--safari-orange);
            min-height: 50px;
        }

        .animals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .animal-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .animal-card:active { transform: scale(0.95); }

        .animal-emoji { font-size: 55px; display: block; margin-bottom: 5px; }
        .animal-label { font-size: 18px; font-weight: 900; color: #2d3436; }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            border: none;
        }

        .home-btn { background: #f1f2f6; color: #2d3436; }
        .next-btn { background: var(--safari-green); color: white; }

        .repeat-btn {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body onclick="initAudioOnce()">

    <h1>🦁 Animal Safari 🐘</h1>

    <div class="quiz-container">
        <div style="color: #7f8c8d; font-weight: bold;">Find the animal:</div>
        <div id="targetDisplay" class="target-name">...</div>
        <button class="repeat-btn" onclick="repeatQuest()">
            <i class="fas fa-volume-up"></i> Listen
        </button>
    </div>

    <div class="animals-grid" id="mainGrid"></div>

    <div class="nav-bar">
        <a href="../../../../../teacher_dashbord/english_dashboard.html" class="nav-btn home-btn">
            <i class="fas fa-home"></i> الرئيسية
        </a>
        <a href="numbers.html" class="nav-btn next-btn">
            الأرقام <i class="fas fa-arrow-right"></i>
        </a>
    </div>

    <audio id="clapSnd" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>

    <script>
        const animalData = [
            { n: 'Lion', e: '🦁' }, { n: 'Elephant', e: '🐘' },
            { n: 'Monkey', e: '🐒' }, { n: 'Zebra', e: '🦓' },
            { n: 'Giraffe', e: '🦒' }, { n: 'Panda', e: '🐼' },
            { n: 'Rabbit', e: '🐰' }, { n: 'Cat', e: '🐱' },
            { n: 'Dog', e: '🐶' }, { n: 'Cow', e: '🐄' }
        ];

        let target = "";
        let audioInited = false;

        function initAudioOnce() {
            if (!audioInited) {
                audioInited = true;
                const msg = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(msg);
                newQuest();
            }
        }

        function buildGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            animalData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'animal-card';
                card.innerHTML = `<span class="animal-emoji">${item.e}</span><span class="animal-label">${item.n}</span>`;
                card.onclick = (e) => {
                    e.stopPropagation();
                    check(item.n, card);
                };
                grid.appendChild(card);
            });
        }

        function newQuest() {
            const random = animalData[Math.floor(Math.random() * animalData.length)];
            target = random.n;
            document.getElementById('targetDisplay').innerText = target;
            say("Where is the " + target);
        }

        function check(clicked, element) {
            if (clicked === target) {
                element.style.backgroundColor = "#d1f7d1";
                document.getElementById('clapSnd').play();
                say("Excellent! " + clicked);
                setTimeout(() => {
                    element.style.backgroundColor = "white";
                    newQuest();
                }, 2000);
            } else {
                element.style.backgroundColor = "#ffe0e0";
                say("No, that is " + clicked);
                setTimeout(() => { element.style.backgroundColor = "white"; }, 500);
            }
        }

        function say(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function repeatQuest() { say(target); }

        // بناء الشبكة فوراً
        buildGrid();
    </script>
</body>
</html>
