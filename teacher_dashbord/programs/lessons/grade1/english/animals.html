<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Safari - Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --safari-green: #2ecc71; --safari-orange: #e67e22; --bg: #fafff0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 10px 10px 100px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* واجهة البدء لضمان التشغيل */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 204, 113, 0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            padding: 20px 50px; font-size: 30px; font-family: 'Fredoka One';
            background: white; color: var(--safari-green); border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .quiz-container { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 15px; text-align: center; border: 3px dashed var(--safari-orange); margin-bottom: 15px; }
        .target-name { font-size: 40px; font-family: 'Fredoka One'; color: var(--safari-orange); min-height: 50px; }
        .animals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 400px; }
        .animal-card { background: white; border-radius: 15px; padding: 10px; text-align: center; border: 2px solid #eee; }
        .animal-emoji { font-size: 50px; display: block; }
        .animal-label { font-size: 16px; font-weight: 900; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 10px; padding: 12px; background: white; border-top: 1px solid #eee; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 12px; text-decoration: none; text-align: center; font-weight: bold; background: #f1f2f6; color: #2d3436; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="color: white; font-family: 'Fredoka One'; margin-bottom: 20px;">Animal Safari</h1>
        <button class="start-btn" onclick="startGame()">START! 🦁</button>
    </div>

    <h1>🐾 Animal Safari 🐾</h1>

    <div class="quiz-container">
        <div style="color: #7f8c8d; font-weight: bold;">Find the:</div>
        <div id="targetAnimal" class="target-name">...</div>
    </div>

    <div class="animals-grid" id="grid"></div>

    <div class="nav-bar">
        <a href="numbers.html" class="nav-btn" style="background: var(--safari-green); color: white;">Next: Numbers ➡️</a>
    </div>

    <audio id="clapSnd" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>

    <script>
        const animals = [
            { name: 'Lion', emoji: '🦁' }, { name: 'Elephant', emoji: '🐘' },
            { name: 'Monkey', emoji: '🐒' }, { name: 'Zebra', emoji: '🦓' },
            { name: 'Giraffe', emoji: '🦒' }, { name: 'Rabbit', emoji: '🐰' },
            { name: 'Tiger', emoji: '🐯' }, { name: 'Panda', emoji: '🐼' },
            { name: 'Cat', emoji: '🐱' }, { name: 'Dog', emoji: '🐶' }
        ];

        function startGame() {
            document.getElementById('startOverlay').style.display = 'none';
            // تفعيل محرك الصوت بلمسة المستخدم
            const msg = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(msg);
            
            initGame();
            newQuestion();
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            animals.forEach(animal => {
                const card = document.createElement('div');
                card.className = 'animal-card';
                card.innerHTML = `<span class="animal-emoji">${animal.emoji}</span><span class="animal-label">${animal.name}</span>`;
                card.onclick = () => checkChoice(animal, card);
                grid.appendChild(card);
            });
        }

        function newQuestion() {
            const targetDisplay = document.getElementById('targetAnimal');
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            
            // تحديث النص يدوياً لضمان الظهور
            targetDisplay.innerText = randomAnimal.name;
            window.currentTargetName = randomAnimal.name;
            
            speak("Where is the " + randomAnimal.name);
        }

        function checkChoice(selected, element) {
            if (selected.name === window.currentTargetName) {
                element.style.backgroundColor = "#d1f7d1";
                document.getElementById('clapSnd').play();
                speak("Excellent! This is " + selected.name);
                setTimeout(() => {
                    element.style.backgroundColor = "white";
                    newQuestion();
                }, 2000);
            } else {
                speak("No, that is " + selected.name);
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
