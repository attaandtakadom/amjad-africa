<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learning Numbers - Words & Digits</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --bg: #f9f7ff;
            --accent: #ff7675;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.4s;
        }

        .quiz-box {
            width: 100%; max-width: 400px;
            background: white; border-radius: 25px;
            padding: 20px; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 4px solid #a29bfe; margin-bottom: 20px;
        }

        .question-text { font-size: 18px; font-weight: bold; color: #636e72; margin-bottom: 5px; }
        
        /* جعل الكلمة كبيرة وواضحة */
        .target-word { 
            font-size: 45px; 
            font-weight: 900; 
            color: var(--primary); 
            text-transform: capitalize;
            margin: 10px 0;
        }

        .numbers-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; width: 100%; max-width: 400px;
            margin-bottom: 100px;
        }

        .num-card {
            aspect-ratio: 1/1; background: white; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: #444;
            box-shadow: 0 4px 0 #ddd; border: 2px solid #eee;
            cursor: pointer; transition: 0.2s;
        }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; gap: 10px; padding: 15px;
            background: white; border-top: 1px solid #eee;
        }

        .nav-btn {
            flex: 1; padding: 12px; border-radius: 15px;
            text-decoration: none; text-align: center; font-weight: bold; font-size: 14px;
        }
        .home { background: #f1f2f6; color: #2d3436; }

        #feedback { font-weight: bold; margin-top: 10px; height: 25px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h2 style="color: var(--primary);">Numbers Word Match</h2>

    <div class="quiz-box">
        <div class="question-text">Find the number:</div>
        <div id="targetWord" class="target-word">Zero</div>
        <div id="feedback"></div>
    </div>

    <div class="numbers-grid" id="grid"></div>

    <div class="nav-bar">
        <a href="../../../../../teacher_dashbord/english_dashboard.html" class="nav-btn home">Home</a>
    </div>

<script>
    // قائمة الأرقام بالحروف
    const numberWords = [
        "Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten",
        "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen", "Twenty"
    ];

    const grid = document.getElementById('grid');
    const targetWordDisplay = document.getElementById('targetWord');
    const feedback = document.getElementById('feedback');
    let targetNum = 0;

    function initNumbers() {
        grid.innerHTML = '';
        for (let i = 0; i <= 20; i++) { 
            const card = document.createElement('div');
            card.className = 'num-card';
            card.innerText = i;
            card.onclick = () => checkAnswer(i, card);
            grid.appendChild(card);
        }
        newQuestion();
    }

    function newQuestion() {
        targetNum = Math.floor(Math.random() * 21); 
        // عرض الكلمة المقابلة للرقم
        targetWordDisplay.innerText = numberWords[targetNum];
        feedback.innerText = "";
        document.body.style.backgroundColor = "#f9f7ff";
    }

    function checkAnswer(selected, element) {
        if (selected === targetNum) {
            element.style.backgroundColor = "#00b894";
            element.style.color = "white";
            feedback.innerText = "Great Job! ✨";
            feedback.style.color = "#00b894";
            document.body.style.backgroundColor = "#d1f7d1";
            
            setTimeout(() => {
                element.style.backgroundColor = "white";
                element.style.color = "#444";
                newQuestion();
            }, 1500);
        } else {
            element.style.backgroundColor = "#ff7675";
            element.style.color = "white";
            feedback.innerText = "Try again ❌";
            feedback.style.color = "#ff7675";
            document.body.style.backgroundColor = "#ffe0e0";
            
            setTimeout(() => {
                element.style.backgroundColor = "white";
                element.style.color = "#444";
                document.body.style.backgroundColor = "#f9f7ff";
                feedback.innerText = "";
            }, 800);
        }
    }

    initNumbers(); 
</script>
</body>
</html>
