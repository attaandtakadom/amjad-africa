<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big Numbers Spinner - Clean</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); text-align: center; margin: 0; padding: 20px; transition: background 0.5s; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* السهم العلوي */
        .pointer { 
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-top: 40px solid #ff4757; 
            margin: 0 auto -20px auto; position: relative; z-index: 10;
        }

        .wheel-container { width: 280px; height: 280px; margin: 0 auto; position: relative; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 10px solid #2f3542; position: relative; overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: #fff;
        }

        /* تقسيم الألوان */
        .sec { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%); transform-origin: 50% 50%; }
        .s1 { background: #1abc9c; transform: rotate(0deg); }
        .s2 { background: #3498db; transform: rotate(60deg); }
        .s3 { background: #9b59b6; transform: rotate(120deg); }
        .s4 { background: #f1c40f; transform: rotate(180deg); }
        .s5 { background: #e67e22; transform: rotate(240deg); }
        .s6 { background: #e74c3c; transform: rotate(300deg); }

        .num { position: absolute; width: 100%; height: 100%; top:0; left:0; font-weight: bold; color: white; font-size: 1.2rem; pointer-events: none; }
        .num span { position: absolute; left: 50%; transform: translateX(-50%); top: 25px; }

        .spin-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.5rem; cursor: pointer; margin-top: 30px; box-shadow: 0 5px 0 #4834d4; }
        .spin-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        #result { 
            margin-top: 25px; display: none; border-top: 2px dashed #ddd; padding-top: 15px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .big-txt { font-size: 3.5rem; color: var(--primary); margin: 0; font-weight: bold; }
        .word-txt { font-size: 1.8rem; color: #2f3542; margin: 5px 0; font-weight: bold; }

        .nav-bar { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .nav-btn { text-decoration: none; padding: 10px 20px; background: #eee; color: #333; border-radius: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #2f3542;">Spin & Learn 🎡</h1>
    
    <div class="pointer"></div>
    <div class="wheel-container">
        <div class="wheel" id="wheel">
            <div class="sec s1"></div><div class="sec s2"></div><div class="sec s3"></div>
            <div class="sec s4"></div><div class="sec s5"></div><div class="sec s6"></div>
            
            <div class="num" style="transform: rotate(30deg);"><span>100</span></div>
            <div class="num" style="transform: rotate(90deg);"><span>200</span></div>
            <div class="num" style="transform: rotate(150deg);"><span>300</span></div>
            <div class="num" style="transform: rotate(210deg);"><span>500</span></div>
            <div class="num" style="transform: rotate(270deg);"><span>800</span></div>
            <div class="num" style="transform: rotate(330deg);"><span>1000</span></div>
        </div>
    </div>

    <button class="spin-btn" id="btn" onclick="spin()">SPIN!</button>

    <div id="result">
        <p class="big-txt" id="res-num"></p>
        <p id="res-word" class="word-txt"></p>
        <p style="color: #27ae60; font-weight: bold;">Great Job! ✨</p>
    </div>
</div>

<div class="nav-bar">
    <a href="../../../../../teacher_dashbord/english_dashboard.html" class="nav-btn">🏠 الرئيسية</a>
    <a href="A_Z.html" class="nav-btn">🔤 تعلم الحروف</a>
</div>

<script>
    let currentDeg = 0;
    const config = [
        { targetDeg: 330, n: "100",  w: "One Hundred" },
        { targetDeg: 270, n: "200",  w: "Two Hundred" },
        { targetDeg: 210, n: "300",  w: "Three Hundred" },
        { targetDeg: 150, n: "500",  w: "Five Hundred" },
        { targetDeg: 90,  n: "800",  w: "Eight Hundred" },
        { targetDeg: 30,  n: "1000", w: "One Thousand" }
    ];

    function spin() {
        const btn = document.getElementById('btn');
        const resultDiv = document.getElementById('result');
        
        btn.disabled = true;
        resultDiv.style.display = 'none';
        document.body.style.backgroundColor = "#f4f7f6";

        // اختيار نتيجة عشوائية
        const res = config[Math.floor(Math.random() * config.length)];
        
        // حساب الدوران (10 دورات كاملة + الزاوية المطلوبة)
        currentDeg += 3600 + (360 - (currentDeg % 360)) + res.targetDeg;
        document.getElementById('wheel').style.transform = `rotate(${currentDeg}deg)`;

        setTimeout(() => {
            document.getElementById('res-num').innerText = res.n;
            document.getElementById('res-word').innerText = res.w;
            resultDiv.style.display = 'block';
            document.body.style.backgroundColor = "#d1f7d1"; // تمييز بصري عند التوقف
            btn.disabled = false;
        }, 4000);
    }
</script>

</body>
</html>
