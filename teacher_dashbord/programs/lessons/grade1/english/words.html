<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج الأبلة منال الناطق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --success: #4CAF50; --danger: #f44336; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        /* بطاقة الكلمة */
        .vocab-card { background: white; border-radius: 25px; overflow: hidden; shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px; }
        .english-word { font-size: 45px; font-weight: bold; }
        .card-body { padding: 25px; }
        .arabic-meaning { font-size: 24px; color: var(--secondary); margin-bottom: 10px; font-weight: bold; }

        /* أزرار الصوت */
        .audio-btns { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .btn-audio { background: rgba(255,255,255,0.2); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        /* لوحة التسجيل (خاصة بالأبلة منال) */
        .recorder-zone { background: #fff; padding: 15px; border-radius: 15px; border: 2px dashed var(--primary); margin-top: 20px; text-align: center; }
        .btn-rec { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-rec.recording { animation: pulse 1s infinite; background: #000; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .nav-controls { display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="vocab-card">
            <div class="card-header">
                <div class="english-word" id="wordEn">Apple</div>
                <div class="audio-btns">
                    <button class="btn-audio" onclick="playLocal()" title="صوت الأبلة منال"><i class="fas fa-microphone-alt"></i></button>
                    <button class="btn-audio" onclick="playSystem()"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>
            <div class="card-body">
                <div class="arabic-meaning" id="wordAr">تفاحة</div>
                <p id="wordEx">"I eat an apple"</p>
            </div>
        </div>

        <div class="nav-controls">
            <button class="btn-nav" style="background:#ddd; color:#333" onclick="changeWord(-1)">السابق</button>
            <button class="btn-nav" onclick="changeWord(1)">التالي</button>
        </div>

        <div class="recorder-zone">
            <p style="font-size: 14px; margin-bottom: 10px; color: #666;">خاص بالأبلة منال: سجلي نطق الكلمة الحالية</p>
            <button id="recBtn" class="btn-rec" onclick="toggleRecording()">
                <i class="fas fa-circle"></i> ابدأ التسجيل
            </button>
            <p id="recStatus" style="font-size: 12px; margin-top: 5px; color: var(--success); display: none;">تم حفظ صوتك بنجاح!</p>
        </div>
    </div>

    <script>
        const vocabulary = [
            { en: "Apple", ar: "تفاحة", ex: "I eat an apple" },
            { en: "Car", ar: "سيارة", ex: "My car is fast" },
            { en: "Home", ar: "منزل", ex: "Go to home" }
        ];

        let currentIndex = 0;
        let mediaRecorder;
        let audioChunks = [];

        function updateUI() {
            const item = vocabulary[currentIndex];
            document.getElementById('wordEn').innerText = item.en;
            document.getElementById('wordAr').innerText = item.ar;
            document.getElementById('wordEx').innerText = `"${item.ex}"`;
            document.getElementById('recStatus').style.display = 'none';
        }

        // تشغيل صوت المعلمة المخزن
        function playLocal() {
            const savedAudio = localStorage.getItem('audio_' + vocabulary[currentIndex].en);
            if (savedAudio) {
                const audio = new Audio(savedAudio);
                audio.play();
            } else {
                alert("أبلة منال، لم تقومي بتسجيل هذه الكلمة بعد.");
            }
        }

        // نطق آلي
        function playSystem() {
            const msg = new SpeechSynthesisUtterance(vocabulary[currentIndex].en);
            window.speechSynthesis.speak(msg);
        }

        // وظيفة التسجيل
        async function toggleRecording() {
            const btn = document.getElementById('recBtn');
            
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        // حفظ الصوت في ذاكرة المتصفح باسم الكلمة
                        localStorage.setItem('audio_' + vocabulary[currentIndex].en, reader.result);
                        document.getElementById('recStatus').style.display = 'block';
                    };
                };

                mediaRecorder.start();
                btn.innerHTML = '<i class="fas fa-stop"></i> إيقاف وحفظ';
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                btn.innerHTML = '<i class="fas fa-circle"></i> ابدأ التسجيل';
                btn.classList.remove('recording');
            }
        }

        function changeWord(step) {
            currentIndex = (currentIndex + step + vocabulary.length) % vocabulary.length;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
