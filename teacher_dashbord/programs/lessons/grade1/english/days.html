<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تعلم أيام الأسبوع مع الأبلة منال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #eef2f7;
            --primary-color: #6c5ce7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            color: #2d3436;
            font-size: 22px;
            margin: 10px 0 20px 0;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        .days-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 100px;
        }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 0 #dfe6e9;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid transparent;
        }

        /* تأثير عند الضغط */
        .day-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #dfe6e9;
            background-color: #f8f9fa;
        }

        /* تأثير نبض بسيط عند التشغيل */
        .playing {
            border-color: var(--primary-color) !important;
            background-color: #f0edff !important;
        }

        .day-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .day-ar {
            font-size: 24px;
            font-weight: 900;
            color: #2d3436;
        }

        .day-en {
            font-size: 14px;
            color: #636e72;
            font-weight: bold;
        }

        .day-icon {
            font-size: 30px;
        }

        /* ألوان الأيام */
        .sat { border-right: 10px solid #ff7675; }
        .sun { border-right: 10px solid #fdcb6e; }
        .mon { border-right: 10px solid #55efc4; }
        .tue { border-right: 10px solid #81ecec; }
        .wed { border-right: 10px solid #74b9ff; }
        .thu { border-right: 10px solid #a29bfe; }
        .fri { border-right: 10px solid #e84393; }

        /* شريط التنقل */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex; gap: 10px; padding: 15px;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            border-radius: 25px 25px 0 0;
        }

        .nav-btn {
            flex: 1; padding: 12px; border-radius: 15px;
            text-decoration: none; text-align: center;
            font-weight: bold; display: flex; align-items: center;
            justify-content: center; gap: 8px; font-size: 14px;
            background: #f1f2f6; color: #2d3436;
        }

        .active-nav { background: #fdcb6e; }
    </style>
</head>
<body>

    <h1>🎙️ تعلم مع الأبلة منال</h1>

    <div class="days-container">
        <div class="day-card sat" onclick="playAudio('sat', this)">
            <div class="day-info">
                <span class="day-ar">السبت</span>
                <span class="day-en">Saturday</span>
            </div>
            <span class="day-icon">🎈</span>
        </div>

        <div class="day-card sun" onclick="playAudio('sun', this)">
            <div class="day-info">
                <span class="day-ar">الأحد</span>
                <span class="day-en">Sunday</span>
            </div>
            <span class="day-icon">☀️</span>
        </div>

        <div class="day-card mon" onclick="playAudio('mon', this)">
            <div class="day-info">
                <span class="day-ar">الاثنين</span>
                <span class="day-en">Monday</span>
            </div>
            <span class="day-icon">🌙</span>
        </div>

        <div class="day-card tue" onclick="playAudio('tue', this)">
            <div class="day-info">
                <span class="day-ar">الثلاثاء</span>
                <span class="day-en">Tuesday</span>
            </div>
            <span class="day-icon">🌸</span>
        </div>

        <div class="day-card wed" onclick="playAudio('wed', this)">
            <div class="day-info">
                <span class="day-ar">الأربعاء</span>
                <span class="day-en">Wednesday</span>
            </div>
            <span class="day-icon">🌈</span>
        </div>

        <div class="day-card thu" onclick="playAudio('thu', this)">
            <div class="day-info">
                <span class="day-ar">الخميس</span>
                <span class="day-en">Thursday</span>
            </div>
            <span class="day-icon">⭐</span>
        </div>

        <div class="day-card fri" onclick="playAudio('fri', this)">
            <div class="day-info">
                <span class="day-ar">الجمعة</span>
                <span class="day-en">Friday</span>
            </div>
            <span class="day-icon">🕌</span>
        </div>
    </div>

    <div class="nav-bar">
        <a href="../../../../../teacher_dashbord/english_dashboard.html" class="nav-btn"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="day_exersize.html" class="nav-btn active-nav"><i class="fas fa-play"></i> تمارين أيام الأسبوع</a>
    </div>

    <script>
        // 1. مصفوفة أصوات الأبلة منال (تأكدي من مطابقة الأسماء في مجلد sounds)
        const soundsMap = {
            'sat':'sounds/days/sutrday.mp3',
            'sun': 'sounds/days/sunday.mp3',
            'mon': 'sounds/days/munday.mp3',
            'tue': 'sounds/days/tusday.mp3',
            'wed': 'sounds/days/wensday.mp3',
            'thu': 'sounds/days/thursday.mp3',
            'fri': 'sounds/days/friday.mp3'
        };

        const audioObjects = {};

        // 2. تحميل مسبق للأصوات لضمان السرعة على الهاتف
        function preloadSounds() {
            for (let day in soundsMap) {
                audioObjects[day] = new Audio(soundsMap[day]);
            }
        }

        // 3. دالة تشغيل الصوت
        function playAudio(dayKey, element) {
            // إيقاف أي صوت شغال حالياً
            Object.values(audioObjects).forEach(sound => {
                sound.pause();
                sound.currentTime = 0;
            });

            // إزالة تمييز الألوان من كل البطاقات
            document.querySelectorAll('.day-card').forEach(card => card.classList.remove('playing'));

            // تشغيل الصوت المختار
            const audio = audioObjects[dayKey];
            if (audio) {
                element.classList.add('playing');
                audio.play().catch(e => console.log("تفاعل مع الشاشة أولاً"));
                
                // إزالة اللون عند انتهاء الصوت
                audio.onended = () => {
                    element.classList.remove('playing');
                };
            }
        }

        // 4. تفعيل المنظومة الصوتية مع أول لمسة للمستخدم
        window.addEventListener('touchstart', function() {
            preloadSounds();
        }, { once: true });

        window.addEventListener('click', function() {
            if (Object.keys(audioObjects).length === 0) preloadSounds();
        }, { once: true });
    </script>
</body>
</html>
