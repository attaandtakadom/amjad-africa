<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تعلم حرف الألف - مؤسسة التقدم والعطاء</title>
    <style>
        :root { --primary: #4A90E2; --success: #2ECC71; --bg: #F8FAFC; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.4s; }
        
        .screen { display: none; width: 100%; max-width: 500px; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 25px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin: 10px; width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-home { background: #95a5a6; width: auto; padding: 8px 15px; font-size: 0.9rem; border-radius: 10px; margin-bottom: 10px; border: none; color: white; cursor: pointer; }

        .shape-card { background: white; margin: 15px 0; padding: 20px; border-radius: 20px; border-right: 8px solid var(--primary); display: flex; align-items: center; justify-content: space-around; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .shape-img { width: 150px; height: 150px; object-fit: contain; }
        .shape-text p { margin: 5px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        .quiz-box { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .quiz-img { width: 140px; height: 140px; margin-bottom: 15px; object-fit: contain; }
        .opt-btn { width: 75px; height: 75px; font-size: 1.8rem; border-radius: 15px; border: 3px solid var(--primary); background: white; cursor: pointer; margin: 5px; font-weight: bold; }
        
        .progress-bar { width: 100%; height: 10px; background: #ddd; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
        #feedback { font-size: 1.5rem; font-weight: bold; margin-top: 15px; height: 30px; }
    </style>
</head>
<body>


<style>
    .home-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: bold;

            transition: all 0.3s;
         box-shadow: 0 4px 10px rgba(30, 136, 229, 0.3);
        }
        
        .home-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
</style>
    <div class="app-container">

<a href="../../../../../teacher_dashbord/arabic_dashboard.html" class="home-btn">
            <i class="fas fa-arrow-left"></i> الرئيسية
        </a>

        <div id="home-screen" class="screen active">
            <h1 style="color: var(--primary); margin-top: 40px;">مرحباً يا بطل 🌟</h1>
            <img src="../../../images/taalm.png" class="shape-img">
            <button class="btn-main" onclick="showScreen('shapes-screen')">تعلم أشكال الحرف 📖</button>
            <button class="btn-main" onclick="startQuiz()">ابدأ التمارين (10) 📝</button>
        </div>

        <div id="shapes-screen" class="screen">
            <button class="btn-home" onclick="goHome()">🏠 العودة</button>
            <h2>أين يختبئ حرف الألف؟</h2>
            <div class="shape-card">
                <img src="../../../images/rabit.png" class="shape-img">
                <div class="shape-text"><h3>أول الكلمة</h3><p><span style="color:red">أ</span>رنب</p></div>
            </div>
            <div class="shape-card">
                <img src="../../../images/lolo.png" class="shape-img">
                <div class="shape-text"><h3>وسط الكلمة</h3><p>لُـ<span style="color:red">ؤ</span>لُـ<span style="color:red">ؤ</span>ة</p></div>
            </div>
            <div class="shape-card">
                <img src="../../../images/shose.png" class="shape-img">
                <div class="shape-text"><h3>آخر الكلمة</h3><p>حذ<span style="color:red">ا</span>ء</p></div>
            </div>
            <button class="btn-main" onclick="startQuiz()">انتقل للتمارين الآن!</button>
        </div>

        <div id="quiz-screen" class="screen">
            <button class="btn-home" onclick="goHome()">🏠 العودة</button>
            <div class="progress-bar"><div id="progress" class="progress-inner"></div></div>
            <div class="quiz-box">
                <h4 id="q-num">تمرين 1 من 10</h4>
                <img id="q-img" src="" class="quiz-img">
                <h2 id="q-word" style="font-size: 2.2rem; margin: 10px 0;"></h2>
                <div id="options">
                    <button class="opt-btn" onclick="checkAns('أَ')">أَ</button>
                    <button class="opt-btn" onclick="checkAns('أُ')">أُ</button>
                    <button class="opt-btn" onclick="checkAns('إِ')">إِ</button>
                </div>
                <p id="feedback"></p>
            </div>
        </div>

        <div id="end-screen" class="screen">
            <h1 style="font-size: 4rem;">🎉</h1>
            <h2>أنت مذهل! اكتملت المهمة</h2>
            <button class="btn-main" onclick="goHome()">العب مرة أخرى</button>
        </div>
    </div>

    <script>
        const exercises = [
            { img: "../../../images/rabit.png", word: "...رنب", ans: "أَ" },
            { img: "../../../images/ear.png", word: "...ذن", ans: "أُ" },
            { img: "../../../images/kettle.jpg", word: "...بريق", ans: "إِ" },
            { img: "../../../images/lion.png", word: "...سد", ans: "أَ" },
            { img: "../../../images/octopus.jpg", word: "...خطبوط", ans: "أُ" },
            { img: "../../../images/needle.jpg", word: "...برة", ans: "إِ" },
            { img: "../../../images/color.jpg", word: "...لوان", ans: "أَ" },
            { img: "../../../images/mother.jpg", word: "...م", ans: "أُ" },
            { img: "../../../images/finger.jpg", word: "...صبع", ans: "إِ" },
            { img: "../../../images/pineapple.jpg", word: "...ناناس", ans: "أَ" }
        ];

        let currentQ = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.body.style.backgroundColor = "var(--bg)";
        }

        function goHome() { showScreen('home-screen'); }

        function startQuiz() {
            currentQ = 0;
            updateQuiz();
            showScreen('quiz-screen');
        }

        function updateQuiz() {
            const q = exercises[currentQ];
            document.getElementById('q-num').innerText = `تمرين ${currentQ + 1} من ${exercises.length}`;
            document.getElementById('q-img').src = q.img;
            document.getElementById('q-word').innerText = q.word;
            document.getElementById('progress').style.width = (currentQ / exercises.length * 100) + "%";
            document.getElementById('feedback').innerText = "";
        }

        function checkAns(selected) {
            const q = exercises[currentQ];
            const feedback = document.getElementById('feedback');
            
            if (selected === q.ans) {
                feedback.innerText = "ممتاز! ✅";
                feedback.style.color = "var(--success)";
                document.body.style.backgroundColor = "#D4EDDA"; // أخضر عند النجاح

                setTimeout(() => {
                    currentQ++;
                    if (currentQ < exercises.length) {
                        updateQuiz();
                        document.body.style.backgroundColor = "var(--bg)";
                    } else {
                        showScreen('end-screen');
                    }
                }, 1000);
            } else {
                feedback.innerText = "حاول ثانية ❌";
                feedback.style.color = "red";
                document.body.style.backgroundColor = "#F8D7DA"; // أحمر عند الخطأ
                setTimeout(() => { 
                    feedback.innerText = ""; 
                    document.body.style.backgroundColor = "var(--bg)";
                }, 800);
            }
        }
    </script>
</body>
</html>
