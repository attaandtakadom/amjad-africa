<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الأرقام - التقدم والعطاء</title>
    <style>
        :root { --primary: #673ab7; --success: #4CAF50; --error: #f44336; }
        body { font-family: 'Arial', sans-serif; background-color: #f3e5f5; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 800px; background: white; margin: auto; padding: 25px; border-radius: 40px; border: 10px solid var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        .header-title { color: #4527a0; font-size: 28px; margin-bottom: 10px; border-bottom: 3px solid #eee; padding-bottom: 10px; }
        .character-box { display: flex; justify-content: space-around; background: #e1f5fe; padding: 15px; border-radius: 25px; margin-bottom: 25px; border: 3px solid #81d4fa; }
        
        /* منطقة السؤال */
        .math-box { font-size: 80px; font-weight: bold; color: #2c3e50; margin: 40px 0; background: #fffde7; border-radius: 20px; padding: 20px; border: 3px dashed #ffd54f; }
        .math-box span { display: inline-block; min-width: 80px; }

        .btn { background: var(--success); color: white; padding: 18px 45px; font-size: 28px; border: none; border-radius: 60px; cursor: pointer; margin: 15px; box-shadow: 0 6px #2e7d32; transition: 0.2s; }
        .btn:active { box-shadow: 0 2px #2e7d32; transform: translateY(4px); }
        .btn-red { background: var(--error); box-shadow: 0 6px #b71c1c; }

        input { font-size: 50px; width: 150px; text-align: center; border: 5px solid var(--primary); border-radius: 20px; padding: 10px; outline: none; background: #f9f9f9; }
        
        #feedback { font-size: 40px; font-weight: bold; margin: 25px; min-height: 60px; }
        .score-box { font-size: 24px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <div class="header-title">مؤسسة التقدم والعطاء - مغامرة الضرب</div>
    
    <div class="character-box">
        <div><h2 style="color: blue; margin:0;">👦 أنس</h2><p>بطل الرياضيات</p></div>
        <div><h2 style="color: #e91e63; margin:0;">👧 بثينة</h2><p>ذكية الأرقام</p></div>
    </div>

    <div class="score-box">أحسنت في: <span id="score">0</span> مسائل</div>

    <div class="math-box">
        <span id="num1">?</span> × <span id="num2">?</span> = 
        <input type="number" id="userAnswer" autofocus>
    </div>

    <button class="btn" onclick="checkMath()">تحقق من ذكائك ✅</button>
    
    <div id="feedback"></div>
    <button id="backBtn" class="btn btn-red" style="display:none;" onclick="location.reload()">إعادة من جديد ↩️</button>
</div>

<audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="applause" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>

<script>
    let correctCount = 0;
    let n1, n2;

    // توليد مسألة جديدة (من 1 إلى 5)
    function generateQuestion() {
        n1 = Math.floor(Math.random() * 5) + 1; // رقم من 1 إلى 5
        n2 = Math.floor(Math.random() * 10) + 1; // رقم من 1 إلى 10
        document.getElementById('num1').innerText = n1;
        document.getElementById('num2').innerText = n2;
        document.getElementById('userAnswer').value = "";
        document.getElementById('userAnswer').focus();
    }

    function checkMath() {
        let userVal = parseInt(document.getElementById('userAnswer').value);
        let feedback = document.getElementById('feedback');
        let correctAnswer = n1 * n2;

        if (userVal === correctAnswer) {
            // إجابة صحيحة
            document.getElementById('bell').play();
            feedback.innerText = "🌟 ممتاز! " + n1 + " × " + n2 + " = " + correctAnswer;
            feedback.style.color = "var(--success)";
            correctCount++;
            document.getElementById('score').innerText = correctCount;

            // تصفيق عند كل 3 إجابات صحيحة
            if (correctCount % 3 === 0) {
                document.getElementById('applause').play();
            }

            // توليد سؤال جديد بعد ثانية ونصف
            setTimeout(generateQuestion, 1500);
        } else {
            // إجابة خاطئة
            feedback.innerText = "فكر مرة أخرى يا بطل..";
            feedback.style.color = "var(--error)";
            document.getElementById('userAnswer').value = "";
            document.getElementById('userAnswer').focus();
        }
    }

    // لتشغيل الزر عند الضغط على Enter
    document.getElementById('userAnswer').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkMath();
        }
    });

    // ابدأ السؤال الأول عند التحميل
    window.onload = generateQuestion;
</script>

</body>
</html>
