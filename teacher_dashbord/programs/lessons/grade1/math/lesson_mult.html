<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>جدول الضرب - مؤسسة التقدم والعطاء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
    box-sizing: border-box;
    max-width: 100%;
}

:root {
    --primary: #4A90E2;
    --success: #2ECC71;
    --danger: #E74C3C;
    --bg: #F0F4F8;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg);
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
}

.app-container {
    max-width: 100%;
    width: 100%;
    background: white;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    padding: 20px;
    text-align: center;
    position: relative;
    overflow-x: hidden;
}

.home-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #34495E;
    color: white;
    padding: 8px 15px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    white-space: nowrap;
}

.logo-text {
    color: var(--primary);
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    padding-top: 15px;
    word-wrap: break-word;
}

.table-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
    flex-wrap: wrap;
}

.table-btn {
    width: 70px;
    height: 70px;
    font-size: 28px;
    border: 4px solid var(--primary);
    border-radius: 15px;
    background: #FFF;
    color: var(--primary);
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
}

.table-btn.active {
    background: var(--primary);
    color: white;
}

.quiz-area {
    background: #F9F9F9;
    border: 4px dashed #DDD;
    border-radius: 30px;
    padding: 20px;
    margin-top: 10px;
    width: 100%;
    overflow-x: hidden;
}

.equation {
    font-size: min(100px, 20vw);
    font-weight: 900;
    color: #2C3E50;
    margin: 5px 0;
    direction: ltr;
    word-break: break-word;
    line-height: 1.2;
}

.visual-aid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 15px auto;
    min-height: 60px;
    max-width: 100%;
    padding: 0 5px;
}

.dot {
    width: min(35px, 8vw);
    height: min(35px, 8vw);
    background: #FFD700;
    border-radius: 50%;
    border: 2px solid #DAA520;
    box-shadow: 0 4px 0 #DAA520;
    flex-shrink: 0;
}

.options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
    width: 100%;
}

.option-btn {
    padding: 15px 5px;
    font-size: min(50px, 12vw);
    border: none;
    border-radius: 20px;
    background: white;
    box-shadow: 0 5px 0 #DDD;
    border: 2px solid #EEE;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.option-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #DDD;
}

.feedback {
    font-size: min(40px, 8vw);
    font-weight: bold;
    height: 70px;
    margin-top: 15px;
    padding: 0 5px;
    word-wrap: break-word;
}

.win {
    animation: celebrate 0.5s ease;
    color: var(--success);
}

.progress-container {
    margin: 10px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.progress-bar {
    width: 150px;
    height: 20px;
    background-color: #eee;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
}

.progress-fill {
    height: 100%;
    background-color: var(--success);
    width: 0%;
    transition: width 0.5s;
}

.progress-text {
    font-size: 16px;
    font-weight: bold;
    color: var(--primary);
    white-space: nowrap;
}

@keyframes celebrate {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

@keyframes applause {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* تحسينات للشاشات الصغيرة */
@media (max-width: 480px) {
    .app-container {
        padding: 15px;
    }
    
    .table-btn {
        width: 55px;
        height: 55px;
        font-size: 24px;
        border-width: 3px;
    }
    
    .home-btn {
        position: static;
        display: inline-block;
        margin-bottom: 10px;
    }
    
    .logo-text {
        font-size: 18px;
        margin-top: 5px;
    }
    
    .quiz-area {
        padding: 15px;
    }
    
    .dot {
        width: 25px;
        height: 25px;
    }
    
    .options-grid {
        gap: 8px;
    }
    
    .option-btn {
        padding: 12px 3px;
        border-radius: 15px;
    }
}

@media (max-width: 360px) {
    .table-btn {
        width: 45px;
        height: 45px;
        font-size: 20px;
    }
    
    .dot {
        width: 20px;
        height: 20px;
    }
    
    .progress-bar {
        width: 120px;
    }
}

/* إصلاح مشكلة العرض على الأجهزة اللوحية */
@media (min-width: 768px) and (max-width: 1024px) {
    .app-container {
        max-width: 95%;
    }
    
    .equation {
        font-size: 90px;
    }
    
    .option-btn {
        font-size: 50px;
    }
}

/* لمنع تجاوز المحتوى */
img, svg, iframe, video, audio {
    max-width: 100%;
    height: auto;
}
</style>
</head>
<body>

<div class="app-container">
    <a href="../../../../math_dashboard.html" class="home-btn"><i class="fas fa-home"></i> الرئيسية</a>
    <div class="logo-text">مؤسسة التقدم والعطاء - البيضاء</div>
    
    <div class="progress-container">
        <span class="progress-text">التقدم: <span id="progress-count">0</span>/4</span>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="table-selector">
        <button class="table-btn active" onclick="setTable(1)">1</button>
        <button class="table-btn" onclick="setTable(2)">2</button>
        <button class="table-btn" onclick="setTable(3)">3</button>
        <button class="table-btn" onclick="setTable(4)">4</button>
        <button class="table-btn" onclick="setTable(5)">5</button>
    </div>

    <div class="quiz-area">
        <div id="equation-display" class="equation">...</div>
        <div id="visual-aid" class="visual-aid"></div>
        <div class="options-grid" id="options"></div>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<audio id="applause" src="../../../../../sound/applause.mp3" preload="auto"></audio>
<audio id="correct-sound" src="../../../../../sound/correct-sound.mp3" preload="auto"></audio>

<script>
let currentTable = 1;
let num2 = 1;
let correctAnswer = 0;
let correctStreak = 0;

function setTable(num) {
    currentTable = num;
    document.querySelectorAll('.table-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    generateQuestion();
}

function generateQuestion() {
    num2 = Math.floor(Math.random() * 10) + 1;
    correctAnswer = currentTable * num2;
    document.getElementById('equation-display').innerText = `${currentTable} × ${num2}`;
    document.getElementById('feedback').innerText = "";
    document.getElementById('feedback').style.color = "";
    updateVisualAid();
    createOptions();
}

function updateVisualAid() {
    const aid = document.getElementById('visual-aid');
    aid.innerHTML = "";
    
    // تحديد الحد الأقصى لعدد النقاط لتجنب ازدحام الشاشة
    const maxDots = 30;
    const displayCount = Math.min(correctAnswer, maxDots);
    
    for(let i=0; i < displayCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        aid.appendChild(dot);
    }
    
    // إذا كان العدد أكبر من الحد الأقصى، نضيف علامة +
    if (correctAnswer > maxDots) {
        const moreIndicator = document.createElement('div');
        moreIndicator.style.cssText = 'display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #666;';
        moreIndicator.innerText = `+${correctAnswer - maxDots}`;
        aid.appendChild(moreIndicator);
    }
}

function createOptions() {
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = "";
    
    let choices = [correctAnswer];
    while(choices.length < 3) {
        let wrong = Math.max(1, correctAnswer + (Math.floor(Math.random() * 7) - 3));
        if(!choices.includes(wrong)) choices.push(wrong);
    }
    
    // خلط الخيارات
    for(let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }
    
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = val;
        btn.onclick = () => checkAnswer(val);
        optionsDiv.appendChild(btn);
    });
}

function updateProgress() {
    const progressFill = document.getElementById('progress-fill');
    const progressCount = document.getElementById('progress-count');
    const progressPercent = (correctStreak % 4) * 25;
    progressFill.style.width = progressPercent + "%";
    progressCount.textContent = correctStreak % 4;
}

function checkAnswer(selected) {
    const fb = document.getElementById('feedback');
    
    if(selected === correctAnswer) {
        correctStreak++;
        fb.innerText = "أحسنت! إجابة صحيحة 🌟";
        fb.className = "feedback win";
        document.getElementById('correct-sound').play();
        
        updateProgress();
        
        if (correctStreak % 4 === 0) {
            document.getElementById('applause').play();
            fb.innerText = "ممتاز! 4 إجابات صحيحة متتالية! 🎉";
            fb.style.color = "#FF6B6B";
            fb.style.animation = "applause 1s ease-in-out";
            
            setTimeout(() => {
                correctStreak = 0;
                updateProgress();
                generateQuestion();
            }, 3000);
        } else {
            setTimeout(generateQuestion, 1500);
        }
    } else {
        fb.innerText = "حاول ثانية 😊";
        fb.style.color = "var(--danger)";
        fb.className = "feedback";
        correctStreak = 0;
        updateProgress();
    }
}

window.onload = function() {
    generateQuestion();
    updateProgress();
    
    // التأكد من عدم تجاوز المحتوى للشاشة
    document.body.style.overflowX = 'hidden';
};
</script>

</body>
</html>
