<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة جداول الضرب (1-5) - التقدم والعطاء</title>
    <style>
        :root { --p-color: #6c5ce7; --s-color: #00b894; --bg: #f7f1e3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); text-align: center; padding: 10px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 8px solid var(--p-color); }
        
        .header h1 { color: var(--p-color); font-size: 32px; margin-bottom: 10px; }
        .character-box { display: flex; justify-content: space-around; background: #eee; padding: 10px; border-radius: 15px; margin-bottom: 20px; }

        /* أزرار اختيار الجدول */
        .table-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .table-btn { padding: 15px 30px; border: none; border-radius: 15px; background: #fab1a0; color: white; cursor: pointer; font-weight: bold; font-size: 24px; transition: 0.3s; box-shadow: 0 4px #e17055; }
        .table-btn:hover { transform: scale(1.05); }
        .active-table { background: var(--p-color) !important; box-shadow: 0 4px #4834d4 !important; transform: scale(1.1); }

        /* منطقة السؤال */
        .question-box { font-size: 70px; font-weight: bold; margin: 25px 0; color: #2d3436; background: #fffde7; border-radius: 20px; padding: 15px; }
        .input-area input { width: 160px; height: 80px; font-size: 50px; text-align: center; border: 4px solid #dfe6e9; border-radius: 20px; color: var(--p-color); }
        
        .check-btn { margin-top: 20px; width: 100%; padding: 20px; border-radius: 25px; border: none; background: var(--s-color); color: white; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #00816a; }
        .check-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #00816a; }
        
        .feedback { font-size: 30px; font-weight: bold; margin-top: 20px; min-height: 40px; }
        .stars { font-size: 40px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">

 <div class="nav-header">
        <a href="../../../../math_dashboard.html" class="home-link">
            <i class="fas fa-home"></i> الرئيسية
        </a>
    </div>





        <h1>✨ جداول الضرب الممتعة ✨</h1>
        <div class="character-box">
            <span style="color:blue; font-weight:bold;">👦 أنس</span>
            <span style="color:red; font-weight:bold;">مؤسسة التقدم والعطاء</span>
            <span style="color:#e91e63; font-weight:bold;">👧 بثينة</span>
        </div>
        <p style="font-size: 20px;">اختر الجدول الذي تريد أن تتحداه:</p>
    </div>

    <div class="table-selector" id="selectors"></div>

    <div id="game-area" style="display:none;">
        <div class="question-box">
            <span id="num1">?</span> × <span id="num2">?</span> = ؟
        </div>
        <div class="input-area">
            <input type="number" id="user-answer" placeholder="؟">
        </div>
        <button class="check-btn" onclick="checkAnswer()">تحقق من الإجابة ✅</button>
        <div class="feedback" id="feedback"></div>
        <div class="stars" id="stars-container"></div>
    </div>
</div>

<script>
    let currentTable = 1;
    let currentFactor = 1;
    let correctStreak = 0;

    // إنشاء الأزرار من 1 إلى 5
    const selectors = document.getElementById('selectors');
    for (let i = 1; i <= 5; i++) {
        let btn = document.createElement('button');
        btn.className = 'table-btn';
        btn.innerText = 'جدول ' + i;
        btn.onclick = () => startTable(i, btn);
        selectors.appendChild(btn);
    }

    function startTable(num, btn) {
        currentTable = num;
        currentFactor = Math.floor(Math.random() * 10) + 1; // يضرب من 1 إلى 10
        
        // تمييز الزر المختار
        document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active-table'));
        btn.classList.add('active-table');

        // إظهار منطقة اللعب
        document.getElementById('game-area').style.display = 'block';
        updateQuestion();
        
        // تصفير الرسائل
        document.getElementById('feedback').innerText = '';
        document.getElementById('stars-container').innerText = '';
        correctStreak = 0;
    }

    function updateQuestion() {
        document.getElementById('num1').innerText = currentTable;
        document.getElementById('num2').innerText = currentFactor;
        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').focus();
    }

    function checkAnswer() {
        const inputElement = document.getElementById('user-answer');
        const userVal = parseInt(inputElement.value);
        const correctVal = currentTable * currentFactor;
        const feedback = document.getElementById('feedback');

        if (userVal === correctVal) {
            // إجابة صحيحة
            correctStreak++;
            document.getElementById('bell-sound').play();
            feedback.innerText = "أحسنت! إجابة ذكية 🌟";
            feedback.style.color = "#00b894";
            
            // تصفيق عند كل 3 إجابات صحيحة
            if (correctStreak % 3 === 0) {
                document.getElementById('clap-sound').play();
                document.getElementById('stars-container').innerText += "⭐";
            }
            
            // توليد سؤال جديد من نفس الجدول بعد ثانية ونصف
            setTimeout(() => {
                currentFactor = Math.floor(Math.random() * 10) + 1;
                updateQuestion();
                feedback.innerText = '';
            }, 1500);

        } else {
            // إجابة خاطئة
            document.getElementById('fail-sound').play();
            feedback.innerText = "حاول مرة أخرى يا بطل 😊";
            feedback.style.color = "#d63031";
            correctStreak = 0;
        }
    }

    // دعم زر Enter
    document.getElementById('user-answer').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });
</script>

</body>
</html>
