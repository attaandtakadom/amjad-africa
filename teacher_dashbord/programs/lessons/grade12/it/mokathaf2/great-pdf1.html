<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>كتاب المراجعة - تقنية المعلومات -الجزء الاول- مدرسة أمجاد أفريقيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== واجهة التطبيق ===== -->
<div class="app-container">
    <div class="header no-print">
        <h2><i class="fa-solid fa-laptop-code"></i> كتاب مراجعة تقنية المعلومات-الجزء الاول</h2>
        <span class="school-badge">مدرسة أمجاد أفريقيا - ليبيا</span>
        <span id="page-counter"></span>
    </div>

    <div class="questions-container no-print" id="questions-container">
        <!-- سيتم عرض 10 أسئلة هنا -->
    </div>

    <div class="navigation-area no-print">
        <button class="nav-btn" id="prev-btn" onclick="prevPage()">
            <i class="fa-solid fa-arrow-right"></i> السابق
        </button>
        <span id="page-indicator">الصفحة 1 من 1</span>
        <button class="nav-btn" id="next-btn" onclick="nextPage()">
            التالي <i class="fa-solid fa-arrow-left"></i>
        </button>
    </div>

    <div class="print-section no-print">
        <button class="print-btn" onclick="generatePDF()">
            <i class="fa-solid fa-file-pdf"></i> -الجزء الاول-تحميل PDF
        </button>
        <a href="https://t.me/amjad_africa2027bot" target="_blank" class="bot-link-btn">
            <i class="fa-brands fa-telegram"></i> البوت التعليمي
        </a>
    </div>
</div>

<!-- ===== وثيقة PDF ===== -->
<div id="printable-pdf-document" style="display:none;"></div>
<script src="array1-it.js" ></script>
<script>
// ============================================================
// مصفوفة الأسئلة - تقنية المعلومات
// ============================================================

// ============================================================
// متغيرات التحكم - عرض 10 أسئلة في كل صفحة
// ============================================================
let currentPage = 0;
const QUESTIONS_PER_PAGE = 10;
let userAnswers = {};
let answeredQuestions = {};

// ============================================================
// حساب عدد الصفحات
// ============================================================
function getTotalPages() {
    return Math.ceil(examQuestions.length / QUESTIONS_PER_PAGE);
}

// ============================================================
// تهيئة البرنامج
// ============================================================
function initExam() {
    if (typeof examQuestions === "undefined" || examQuestions.length === 0) {
        document.getElementById("questions-container").innerHTML = 
        "<p style='color:red; text-align:center; padding:20px;'>❌ خطأ: لم يتم العثور على أسئلة!</p>";
        return;
    }
    console.log("✅ تم العثور على " + examQuestions.length + " سؤال");
    renderPage(0);
}

// ============================================================
// عرض صفحة الأسئلة (10 أسئلة في كل صفحة)
// ============================================================
function renderPage(page) {
    const container = document.getElementById('questions-container');
    const totalPages = getTotalPages();
    currentPage = page;

    const start = page * QUESTIONS_PER_PAGE;
    const end = Math.min(start + QUESTIONS_PER_PAGE, examQuestions.length);
    const pageQuestions = examQuestions.slice(start, end);

    document.getElementById('page-counter').innerHTML = `صفحة ${page + 1} / ${totalPages}`;
    document.getElementById('page-indicator').textContent = `الصفحة ${page + 1} من ${totalPages}`;

    document.getElementById('prev-btn').disabled = page === 0;
    document.getElementById('next-btn').disabled = page === totalPages - 1;

    let html = '';
    pageQuestions.forEach((q, idx) => {
        const globalIndex = start + idx;
        const questionNum = globalIndex + 1;

        let optionsHTML = '';
        q.options.forEach((opt, optIdx) => {
            let btnClass = 'opt-btn';
            let icon = '<i class="fa-regular fa-circle"></i>';
            
            if (answeredQuestions[globalIndex] !== undefined) {
                if (answeredQuestions[globalIndex] === optIdx) {
                    btnClass += answeredQuestions[globalIndex] === q.correctAnswer ? ' correct' : ' wrong';
                    icon = answeredQuestions[globalIndex] === q.correctAnswer ? 
                        '<i class="fa-solid fa-circle-check"></i>' : 
                        '<i class="fa-solid fa-circle-xmark"></i>';
                }
                if (optIdx === q.correctAnswer && answeredQuestions[globalIndex] !== undefined) {
                    btnClass += ' correct';
                }
            }

            optionsHTML += `
                <button class="${btnClass}" onclick="checkAnswer(${globalIndex}, ${optIdx})">
                    <span>${opt}</span>
                    ${icon}
                </button>
            `;
        });

        let feedbackHTML = '';
        if (answeredQuestions[globalIndex] !== undefined) {
            const isCorrect = answeredQuestions[globalIndex] === q.correctAnswer;
            const correctText = q.options[q.correctAnswer];
            feedbackHTML = `
                <div class="feedback-box ${isCorrect ? 'success' : 'error'}">
                    ${isCorrect ? 
                        '<i class="fa-solid fa-check"></i> ✅ إجابة صحيحة' : 
                        `<i class="fa-solid fa-xmark"></i> ❌ إجابة خاطئة - الإجابة الصحيحة هي: <span class="correct-answer">${correctText}</span>`
                    }
                </div>
            `;
        }

        // التحقق إذا كان السؤال يحتوي على كود برمجي
        let questionDisplay = q.question;
        let codeClass = '';
        let isCode = false;
        
        if (q.question.includes('Private Sub') || q.question.includes('Dim') || q.question.includes('For I')) {
            isCode = true;
            // عرض الكود بشكل منظم مع الاحتفاظ بالأسطر الجديدة
            questionDisplay = q.question;
            codeClass = 'code-block';
        }

        html += `
            <div class="question-item">
                <div class="q-number">س ${questionNum}:</div>
                <div class="q-text ${codeClass}">${questionDisplay}</div>
                <div class="q-options">${optionsHTML}</div>
                ${feedbackHTML}
            </div>
        `;
    });

    container.innerHTML = html;
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// التحقق من الإجابة
// ============================================================
function checkAnswer(index, selectedIdx) {
    const data = examQuestions[index];
    if (answeredQuestions[index] !== undefined) return;

    answeredQuestions[index] = selectedIdx;
    userAnswers[index] = selectedIdx;
    renderPage(currentPage);
}

// ============================================================
// التنقل بين الصفحات
// ============================================================
function nextPage() {
    if (currentPage < getTotalPages() - 1) {
        renderPage(currentPage + 1);
    }
}

function prevPage() {
    if (currentPage > 0) {
        renderPage(currentPage - 1);
    }
}

// ============================================================
// دالة توليد PDF
// ============================================================
function generatePDF() {
    const printableDoc = document.getElementById('printable-pdf-document');
    printableDoc.innerHTML = '';

    const watermarkText = `مدرسة أمجاد أفريقيا\nليبيا البيضاء`;
    let htmlContent = '';

    // ===== 1. صفحة الغلاف =====
    htmlContent += `
        <div class="pdf-page pdf-cover-page" style="page-break-after: always; break-after: page; min-height: 100vh; padding: 15mm 8mm !important; position: relative; box-sizing: border-box;">
            <div class="watermark-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 60px; font-weight: bold; color: rgba(0, 0, 0, 0.06); white-space: pre-line; text-align: center; line-height: 1.8; letter-spacing: 8px; pointer-events: none; z-index: 0; width: 100%; font-family: 'Cairo', sans-serif;">
                ${watermarkText}
            </div>
            <div class="content-wrapper" style="position:relative; z-index:1; width:100%;">
                <div class="school-name">🏫 مدرسة أمجاد أفريقيا - ليبيا البيضاء</div>
                <div class="main-title">💻 تقنية المعلومات</div>
                <div class="sub-title">كتاب المراجعة النهائية - الجزء الأول</div>
                <div style="font-size:20pt;color:#334155;margin-bottom:15px;font-family:'Cairo', sans-serif;">الصف الثالث الثانوي</div>
                <div class="cover-frame">
                    <h3>📚 كتاب المراجعة النهائية - الجزء الأول</h3>
                    <h4>مادة تقنية المعلومات</h4>
                    <div class="cover-subjects">أسئلة شاملة للمراجعة</div>
                    <div class="year">العام الدراسي 2025 - 2026</div>
                    <div style="font-size:15pt;color:#2563eb;margin-top:8px;font-weight:bold;font-family:'Cairo', sans-serif;">
                        📊 عدد الأسئلة: ${examQuestions.length} سؤال
                    </div>
                </div>
                <div class="dedication">✨ إهداء إلى طلبتنا المتميزين ✨</div>
                <div style="font-size:14pt;color:#475569;margin-top:6px;font-family:'Cairo', sans-serif;">
                    <span style="font-weight:bold;">رابط البوت التعليمي:</span><br>
                    <span style="color:#2563eb;font-size:15pt;">t.me/amjad_africa2027bot</span>
                </div>
                <div class="bot-link" style="font-size:14pt;color:#475569;border-top:2px solid #e2e8f0;padding-top:12px;width:85%;font-family:'Cairo', sans-serif;">
                    © 2026 جميع الحقوق محفوظة - مدرسة أمجاد أفريقيا
                </div>
            </div>
        </div>
    `;

    // ===== 2. حاوية الأسئلة المتسلسلة =====
    htmlContent += `
        <div class="pdf-questions-container" style="position: relative; background: white; padding: 6mm 6mm !important; font-family: 'Cairo', sans-serif; direction: rtl;">
            
            <div class="watermark-text" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 70px; font-weight: bold; color: rgba(0, 0, 0, 0.04); white-space: pre-line; text-align: center; line-height: 2; letter-spacing: 6px; pointer-events: none; z-index: 0; width: 100%;">
                ${watermarkText}
            </div>

            <div style="position:relative; z-index:1;">
                <div style="text-align:center; border-bottom:1.5px solid #1a365d; padding-bottom:5px; margin-bottom:15px;">
                    <div style="font-size:12px; color:#1a365d; font-weight:bold;">مدرسة أمجاد أفريقيا - ليبيا البيضاء</div>
                    <div style="font-size:11px; color:#475569;">📘 كتاب المراجعة النهائية الشاملة - تقنية المعلومات (الجزء الأول)</div>
                </div>
    `;

    // معالجة وحقن الأسئلة مباشرة
    examQuestions.forEach((q, idx) => {
        const questionNum = idx + 1;
        const correctText = q.options[q.correctAnswer] || "لم يتم تحديد";

        let optionsHTML = q.options.map((opt, i) => {
            const isCorrect = i === q.correctAnswer;
            return `<span style="display:inline-block; margin:2px 4px; padding:2px 10px; background:${isCorrect ? '#dcfce7' : '#f1f5f9'}; border-radius:4px; font-size:12pt; ${isCorrect ? 'font-weight:bold; color:#065f46; border:2px solid #22c55e;' : ''}">${opt}</span>`;
        }).join(' ');

        let questionDisplay = q.question;
        if (q.question.includes('Private Sub') || q.question.includes('Dim') || q.question.includes('For I')) {
            questionDisplay = `<code style="font-family:'Courier New',monospace; font-size:10pt; direction:ltr; text-align:left; background:#1e293b; color:#e2e8f0; padding:6px 10px; border-radius:4px; display:block; white-space:pre-wrap; line-height:1.4; margin:4px 0;">${q.question}</code>`;
        }

        // ✅ هنا التعديل: طباعة التعليل مباشرة لكل سؤال يحتوي على حقل correction دون النظر لرد فعل الطالب
        let pdfCorrectionHTML = '';
        if (q.correction && q.correction.trim() !== "") {
            pdfCorrectionHTML = `
                <div style="margin-top:5px !important; padding:4px 8px !important; background:#f0fdf4 !important; border-radius:3px !important; border-right:3px solid #16a34a !important; font-size:10pt !important; color:#14532d !important;">
                    💡 <b>توضيح وتعليل الإجابة:</b> ${q.correction}
                </div>
            `;
        }

        htmlContent += `
            <div class="pdf-question-block" style="margin-bottom:12px !important; padding:6px 10px !important; border-right:4px solid #2563eb !important; background:#fafcff !important; border-radius:4px !important; box-shadow:0 1px 2px rgba(0,0,0,0.02) !important; width:100% !important; page-break-inside: avoid !important; break-inside: avoid !important;">
                <div class="pdf-q-title" style="font-weight:bold !important; color:#1a365d !important; margin-bottom:3px !important; text-align:right; font-size:11pt !important;">
                    س ${questionNum}:
                </div>
                <div class="pdf-q-text" style="color:#0f172a; line-height:1.4 !important; margin-bottom:4px !important; text-align:right; font-size:10.5pt !important;">
                    ${questionDisplay}
                </div>
                <div class="pdf-options" style="margin:4px 0 !important; font-size:10pt !important; color:#475569 !important;">
                    <span style="font-weight:bold;">الخيارات:</span> ${optionsHTML}
                </div>
                <div class="pdf-correct-answer" style="margin-top:4px !important; padding:3px 8px !important; background:#dcfce7 !important; border-radius:3px !important; border-right:3px solid #22c55e !important; font-size:9.5pt !important; color:#065f46 !important; font-weight:bold !important;">
                    ✅ الإجابة النموذجية الصحيحة: ${correctText}
                </div>
                ${pdfCorrectionHTML}
            </div>
        `;
    });

    htmlContent += `
                <div style="text-align:center; margin-top:20px; padding-top:8px; border-top:1px solid #e2e8f0; font-size:10px; color:#94a3b8; page-break-inside: avoid; break-inside: avoid;">
                    ⚡ هذه المذكرة خاصة بمدرسة أمجاد أفريقيا - لا يجوز نسخها أو إعادة توزيعها تجارياً ⚡
                </div>
            </div>
        </div>
    `;

    printableDoc.innerHTML = htmlContent;
    printableDoc.style.display = 'block';

    setTimeout(function() {
        window.print();
        setTimeout(function() {
            printableDoc.style.display = 'none';
        }, 1000);
    }, 500);
}// بدء التشغيل
// ============================================================
window.onload = function() {
    initExam();
};
</script>

</body>
</html>
