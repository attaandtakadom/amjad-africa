<script>
// ============================================================
// مصفوفة الأسئلة - تقنية المعلومات
// ============================================================

// ============================================================
// متغيرات التحكم - عرض 10 أسئلة في كل صفحة
// ============================================================
let currentPage = 0;
const QUESTIONS_PER_PAGE = 10;
let userAnswers = {};
let answeredQuestions = {};

// ============================================================
// حساب عدد الصفحات
// ============================================================
function getTotalPages() {
    return Math.ceil(examQuestions.length / QUESTIONS_PER_PAGE);
}

// ============================================================
// تهيئة البرنامج
// ============================================================
function initExam() {
    if (typeof examQuestions === "undefined" || examQuestions.length === 0) {
        document.getElementById("questions-container").innerHTML = 
        "<p style='color:red; text-align:center; padding:20px;'>❌ خطأ: لم يتم العثور على أسئلة!</p>";
        return;
    }
    console.log("✅ تم العثور على " + examQuestions.length + " سؤال");
    renderPage(0);
}

// ============================================================
// عرض صفحة الأسئلة (10 أسئلة في كل صفحة)
// ============================================================
function renderPage(page, shouldScroll = false) {
    const container = document.getElementById('questions-container');
    const totalPages = getTotalPages();
    currentPage = page;

    const start = page * QUESTIONS_PER_PAGE;
    const end = Math.min(start + QUESTIONS_PER_PAGE, examQuestions.length);
    const pageQuestions = examQuestions.slice(start, end);

    document.getElementById('page-counter').innerHTML = `صفحة ${page + 1} / ${totalPages}`;
    document.getElementById('page-indicator').textContent = `الصفحة ${page + 1} من ${totalPages}`;

    document.getElementById('prev-btn').disabled = page === 0;
    document.getElementById('next-btn').disabled = page === totalPages - 1;

    let html = '';
    pageQuestions.forEach((q, idx) => {
        const globalIndex = start + idx;
        const questionNum = globalIndex + 1;

        let optionsHTML = '';
        q.options.forEach((opt, optIdx) => {
            let btnClass = 'opt-btn';
            let icon = '<i class="fa-regular fa-circle"></i>';
            
            if (answeredQuestions[globalIndex] !== undefined) {
                if (answeredQuestions[globalIndex] === optIdx) {
                    btnClass += answeredQuestions[globalIndex] === q.correctAnswer ? ' correct' : ' wrong';
                    icon = answeredQuestions[globalIndex] === q.correctAnswer ? 
                        '<i class="fa-solid fa-circle-check"></i>' : 
                        '<i class="fa-solid fa-circle-xmark"></i>';
                }
                if (optIdx === q.correctAnswer && answeredQuestions[globalIndex] !== undefined) {
                    btnClass += ' correct';
                }
            }

            optionsHTML += `
                <button class="${btnClass}" onclick="checkAnswer(${globalIndex}, ${optIdx})">
                    <span>${opt}</span>
                    ${icon}
                </button>
            `;
        });

        // بناء حقل الإفادة والتعليل العلمي عند حل السؤال
        let feedbackHTML = '';
        if (answeredQuestions[globalIndex] !== undefined) {
            const isCorrect = answeredQuestions[globalIndex] === q.correctAnswer;
            const correctText = q.options[q.correctAnswer];
            
            // 💡 التحقق وحقن صندوق التعليل العلمي إذا كان متوفراً في بيانات السؤال
            let correctionBoxHTML = '';
            if (q.correction && q.correction.trim() !== "") {
                correctionBoxHTML = `
                    <div class="interactive-correction" style="margin-top: 8px; padding: 6px 10px; background: rgba(255,255,255,0.6); border-right: 3px solid ${isCorrect ? '#16a34a' : '#ef4444'}; color: ${isCorrect ? '#14532d' : '#7f1d1d'}; font-size: 14px; border-radius: 4px; font-weight: normal;">
                        💡 <b>التوضيح العلمي:</b> ${q.correction}
                    </div>
                `;
            }

            feedbackHTML = `
                <div class="feedback-box ${isCorrect ? 'success' : 'error'}" style="display: block;">
                    <div>
                        ${isCorrect ? 
                            '<i class="fa-solid fa-check"></i> ✅ إجابة صحيحة' : 
                            `<i class="fa-solid fa-xmark"></i> ❌ إجابة خاطئة - الإجابة الصحيحة هي: <span class="correct-answer">${correctText}</span>`
                        }
                    </div>
                    ${correctionBoxHTML}
                </div>
            `;
        }

        // التحقق إذا كان السؤال يحتوي على كود برمجي
        let questionDisplay = q.question;
        let codeClass = '';
        if (q.question.includes('Private Sub') || q.question.includes('Dim') || q.question.includes('For I')) {
            codeClass = 'code-block';
        }

        html += `
            <div class="question-item">
                <div class="q-number">س ${questionNum}:</div>
                <div class="q-text ${codeClass}">${questionDisplay}</div>
                <div class="q-options">${optionsHTML}</div>
                ${feedbackHTML}
            </div>
        `;
    });

    container.innerHTML = html;
    
    // الحل الذكي: لا يتم نقل المؤشر لأعلى إلا إذا قمنا بتمرير true صراحة (عند تغيير الصفحة فقط)
    if (shouldScroll) {
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}
// ============================================================
// التحقق من الإجابة
// ============================================================
function checkAnswer(index, selectedIdx) {
    const data = examQuestions[index];
    if (answeredQuestions[index] !== undefined) return;

    answeredQuestions[index] = selectedIdx;
    userAnswers[index] = selectedIdx;
    renderPage(currentPage);
}

// ============================================================
// التنقل بين الصفحات
// ============================================================
function nextPage() {
    if (currentPage < getTotalPages() - 1) {
        renderPage(currentPage + 1);
    }
}

function prevPage() {
    if (currentPage > 0) {
        renderPage(currentPage - 1);
    }
}

    // معالجة وحقن الأسئلة دفعة واحدة دون تقسيمها إلى مصفوفات فرعية
    examQuestions.forEach((q, idx) => {
        const questionNum = idx + 1;

        let optionsHTML = q.options.map((opt, i) => {

    setTimeout(function() { window.print(); setTimeout(function() { printableDoc.style.display = 'none'; }, 1000); }, 500);
}

    initExam();
};
