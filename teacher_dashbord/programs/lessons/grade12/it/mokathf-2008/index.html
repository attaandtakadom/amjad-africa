<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>منصة تقنية المعلومات - مدرسة أمجاد أفريقيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <!-- الهيدر -->
    <div class="header no-print">
        <h2><i class="fa-solid fa-laptop-code"></i> منصة تقنية المعلومات</h2>
        <span class="school-badge">مدرسة أمجاد أفريقيا - ليبيا</span>
        <span id="question-counter"></span>
    </div>

    <!-- منطقة السؤال -->
    <div class="question-container no-print" id="question-container">
        <div class="question-meta">
            <span class="q-source-span" id="q-source"></span>
        </div>
        <div class="question-text" id="main-question-text"></div>
        <div class="question-graphic-area" id="graphic-container"></div>
        <div class="options-container" id="options-container"></div>
        <div class="feedback-box" id="feedback-box"></div>
    </div>

    <!-- أزرار التنقل -->
    <div class="navigation-area no-print">
        <button class="nav-btn" id="prev-btn" onclick="navigateQuestion(-1)">
            <i class="fa-solid fa-arrow-right"></i> السابق
        </button>
        <button class="nav-btn" id="next-btn" onclick="navigateQuestion(1)">
            التالي <i class="fa-solid fa-arrow-left"></i>
        </button>
    </div>

    <!-- أزرار الطباعة -->
    <div class="print-section no-print">
        <button class="print-btn" onclick="generatePDF()">
            <i class="fa-solid fa-file-pdf"></i> طباعة PDF
        </button>
        <a href="https://t.me/amjad_africa2027bot" target="_blank" class="bot-link-btn">
            <i class="fa-brands fa-telegram"></i> البوت التعليمي
        </a>
    </div>

    <!-- شاشة النتيجة -->
    <div id="result-screen" class="hide no-print">
        <div id="congrats-msg" class="success-message hide">🎉 مبروك أنت ناجح! 🎉</div>
        <div id="fail-msg" class="hide">😢 حظاً أوفر في المرة القادمة!</div>
        <p class="score-display">لقد حصلت على درجة: <span id="final-score">0</span> من <span id="total-questions">0</span></p>
        <div style="text-align:center;margin-top:15px;">
            <button onclick="location.reload()" style="padding:12px 30px;background:#1a365d;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:'Cairo',sans-serif;">
                🔄 إعادة المحاولة
            </button>
        </div>
    </div>
</div>

<!-- منطقة PDF المخفية -->
<div id="printable-pdf-document" style="display:none;"></div>

<!-- استدعاء الملفات -->
<script src="array-it-2008.js"></script>
<script src="app.js"></script>

</body>
</html>
