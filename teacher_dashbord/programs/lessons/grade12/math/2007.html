<script>
    // ==================== جميع الأسئلة من الصور ====================
    const questions = [
        // سؤال 1
{
  "id": 1,
  "type": "tf",
  "text": "<div dir='rtl'>إذا كان: <span style='display: inline-block; vertical-align: middle; text-align: center;'><small>5</small><br><span style='font-size: 20px;'>∫</span><br><small>1</small></span> د(س) د س = 4 ، فإن قيمة: <span style='display: inline-block; vertical-align: middle; text-align: center;'><small>5</small><br><span style='font-size: 20px;'>∫</span><br><small>1</small></span> (3 - د(س)) د س = 8</div>",
  "options": [
    "<div dir='rtl'>صواب</div>",
    "<div dir='rtl'>خطأ</div>"
  ],
  "correct": true,
  "explanation": "<div dir='rtl'>بتوزيع التكامل: ∫ 3 د س - ∫ د(س) د س. ناتج تكامل الثابت هو [3س] من 1 إلى 5 أي (15 - 3) = 12. وبطرح قيمة التكامل المعطى (4): 12 - 4 = 8. العبارة صحيحة.</div>"
},        // سؤال 2
        { id: 2, type: "tf", text: "القيمة العظمى والصغرى للمقدار جا(س - 60°) + جتا س هي √3 ، -√3", correct: false, explanation: "بفك المقدار: جا(س - 60) = (1/2)جا س - (√3/2)جتا س، ثم نضيف جتا س = (1/2)جا س + (1 - √3/2)جتا س. القيمة العظمى = √( (1/2)² + (1 - √3/2)² ) ≈ 0.76، وليس √3 ≈ 1.732. العبارة خاطئة." },
        // سؤال 3
        { id: 3, type: "tf", text: "إذا كان س ص = لو س فإن قيمة س عندما دص/دس = 0 تساوي واحد", correct: false, explanation: "باستخدام قاعدة الضرب: ص + س(دص/دس) = 1/س. عندما دص/دس = 0: ص = 1/س. بالتعويض في المعادلة الأصلية: س×(1/س) = لو س → 1 = لو س → س = هـ ≈ 2.718، وليس 1. العبارة خاطئة." },
        // سؤال 4
        { id: 4, type: "tf", text: "قيمة المحدد | جتا س   جا س | = جتا 2س\n                              | -جا س   جتا س |", correct: false, explanation: "المحدد = (جتا س)(جتا س) - (جا س)(-جا س) = جتا² س + جا² س = 1. وليس جتا 2س. العبارة خاطئة." },
        // سؤال 5
        { id: 5, type: "tf", text: "∫ جا(أ س + ب) دس = -1/أ جتا(أ س + ب) + ث", correct: true, explanation: "∫ جا(أ س + ب) دس = -1/أ جتا(أ س + ب) + ث. هذه قاعدة صحيحة. العبارة صحيحة." },
        // سؤال 6
        { id: 6, type: "tf", text: "إذا كان دص/دس = 0 ، د²ص/دس² < 0 عند نقطة على منحنى د، تكون النقطة نقطة عظمى محلية", correct: true, explanation: "المشتقة الأولى صفر تعني نقطة حرجة. المشتقة الثانية سالبة تعني أن المنحنى مقعر لأسفل، وبالتالي النقطة هي عظمى محلية. العبارة صحيحة." },
        // سؤال 7
        { id: 7, type: "tf", text: "جا 39° جا 9° - جتا 39° جتا 9° = √3/2", correct: false, explanation: "المقدار = - (جتا 39 جتا 9 - جا 39 جا 9) = - جتا(39+9) = - جتا 48°. جتا 48° لا تساوي -√3/2. العبارة خاطئة." },
        // سؤال 8
        { id: 8, type: "tf", text: "الصورة المختصرة للمقدار 2 جتا² 4س - 1 = جتا 8س", correct: true, explanation: "باستخدام قانون ضعف الزاوية: جتا 2θ = 2 جتا² θ - 1. هنا θ = 4س، إذن 2 جتا² 4س - 1 = جتا 8س. العبارة صحيحة." },
        // سؤال 9
        { id: 9, type: "tf", text: "ظا(180° - أ) = -1/ظا أ حيث 0° < أ < 90°", correct: false, explanation: "القاعدة الصحيحة: ظا(180° - أ) = - ظا أ. وليس - ظتا أ إلا عند أ = 45°. العبارة خاطئة." },
        // سؤال 10
{ id: 10, type: "tf", text: "إذا كانت أ مصفوفة من نوع 3×3، حيث أن أ(ر، د) = ر - د، فإن أ مصفوفة متماثلة.", 
  correct: false, 
  explanation: "المصفوفة المتماثلة تحقق أ(ر، د) = أ(د، ر). لدينا أ(ر، د) = ر - د، وأ(د، ر) = د - ر = -(ر - د). لكي تكون متماثلة يجب أن يكون ر - د = -(ر - د) أي ر = د. هذا لا يتحقق لجميع العناصر. مثال: أ(1،2) = -1، أ(2،1) = 1، إذن أ(1،2) ≠ أ(2،1). العبارة خاطئة." } ,       // سؤال 11
        { id: 11, type: "tf", text: "المصفوفة لها قيمة عددية وليست مجرد طريقة لعرض البيانات", correct: true, explanation: "المصفوفة ككائن رياضي لها قيمة (مثل المحدد، الأثر، الرتبة) وليست مجرد جدول أرقام. العبارة صحيحة." },
        // سؤال 12
{
  id: 12,
  type: "tf",
  text: "إذا كان ميل العمود على المماس هو <span class='fraction'><span class='numerator'>6</span><span class='denominator'>7</span></span>، فإن ميل المماس يساوي <span class='minus'>-</span><span class='fraction'><span class='numerator'>14</span><span class='denominator'>12</span></span>.",
  correct: true,
  explanation: "ميل المماس = -1 ÷ (6/7) = -7/6 = -14/12، وبالتالي العبارة صحيحة."
},
  
  
  { 
  "id": 13, 
  "type": "mcq", 
  "text": "إذا كانت أ = <table style='display:inline-table; border-left:2px solid #000; border-right:2px solid #000; border-radius:8px;'><tr><td style='padding:5px;'>4</td><td style='padding:5px;'>ص</td></tr><tr><td style='padding:5px;'>س</td><td style='padding:5px;'>2</td></tr></table> ، ب = <table style='display:inline-table; border-left:2px solid #000; border-right:2px solid #000; border-radius:8px;'><tr><td style='padding:5px;'>ع</td><td style='padding:5px;'>6</td></tr><tr><td style='padding:5px;'>9</td><td style='padding:5px;'>ل</td></tr></table> ، بحيث أن 3أ = 2ب. فإن أ₁₂ + أ₂₂ + ب₁₁ + ب₂₂ =", 
  "options": ["13", "15", "17", "20"], 
  "correct": "b", 
  "explanation": "بتطبيق العلاقة 3أ = 2ب، نجد القيم: ص=4، س=6، ع=6، ل=3. بالتعويض في المطلوب: 4 + 2 + 6 + 3 = 15." 
},

{ 
  "id": 14, 
  "type": "mcq", 
  "text": "إذا كانت محورة المصفوفة <table style='display:inline-table; border-left:2px solid #000; border-right:2px solid #000; border-radius:8px; vertical-align:middle;'><tr><td style='padding:5px;'>س+3</td><td style='padding:5px;'>4ع-1</td></tr><tr><td style='padding:5px;'>2-د</td><td style='padding:5px;'>6أ</td></tr></table> تساوي المعكوس الجمعي للمصفوفة <table style='display:inline-table; border-left:2px solid #000; border-right:2px solid #000; border-radius:8px; vertical-align:middle;'><tr><td style='padding:5px;'>2</td><td style='padding:5px;'>4ع</td></tr><tr><td style='padding:5px;'>س+2</td><td style='padding:5px;'>3د</td></tr></table> ، فإن قيمة س، ع، أ، د على الترتيب هي:", 
  "options": ["-5, 1, -3, 6", "6, 1, 3, 5", "5, -6, -3, -1", "-3, -1, 5, -6"], 
  "correct": "a", 
  "explanation": "أولاً تدوير المصفوفة الأولى: الصف الأول يصبح [س+3 ، 2-د] والصف الثاني [4ع-1 ، 6أ]. ثانياً المعكوس الجمعي للثانية: [-2 ، -4ع] و [-(س+2) ، -3د]. بالمساواة: س+3 = -2 ومنها س=-5. ومنها نجد ع=1، أ=-3، د=6." 
},

{ 
  "id": 15, 
  "type": "mcq", 
  "text": "إذا كانت ص² جتا س = 1 ، فإن المشتقة الثانية د²ص/دس² بدلالة س، ص تساوي:", 
  "options": [
    "½ ص ( 2 قا² س + ظا² س )", 
    "¼ ص ( 2 قا² س + ظا² س )", 
    "ص ( جا² س + ظا² س )", 
    "¼ ص ( 2 - 3 ظا² س )"
  ], 
  "correct": "b", 
  "explanation": "المعادلة هي ص² = قا س. بالاشتقاق الأول: 2ص ص' = قا س ظا س. بالاشتقاق الثاني والتعويض عن قيمة ص، نصل للناتج ربع ص مضروباً في (2 قا² س + ظا² س)." 
},

{ 
  "id": 16, 
  "type": "mcq", 
  "text": "إذا كانت ص = ⁴/₃ س³ + أ س² + 2س لها نقطة حرجة عند س = -1، فإن قيمة أ تساوي:", 
  "options": ["1", "2", "3", "4"], 
  "correct": "c", 
  "explanation": "النقطة الحرجة تعني أن المشتقة الأولى ص' تساوي صفراً عند س = -1. ص' = 4س² + 2أ س + 2. بالتعويض: 4(-1)² + 2أ(-1) + 2 = 0، أي 4 - 2أ + 2 = 0، ومنها 6 = 2أ، إذن أ = 3." 
},


{ 
  "id": 17, 
  "type": "mcq", 
  "text": "إذا كانت أ' + ب' = <table style='display:inline-table; border-left:2px solid #000; border-right:2px solid #000; border-radius:8px; vertical-align:middle;'><tr><td style='padding:5px;'>0</td><td style='padding:5px;'>5</td></tr><tr><td style='padding:5px;'>7</td><td style='padding:5px;'>12</td></tr></table> ، فإن أ + ب تساوي:", 
  "options": [


      "<table style='display:inline-table; border-left:1px solid #000; border-right:1px solid #000; border-radius:5px;'><tr><td style='padding:5px;'>0</td><td style='padding:5px;'>5</td></tr><tr><td style='padding:5px;'>12</td><td style='padding:5px;'>7</td></tr></table>",

    "<table style='display:inline-table; border-left:1px solid #000; border-right:1px solid #000; border-radius:5px;'><tr><td style='padding:5px;'>0</td><td style='padding:5px;'>-5</td></tr><tr><td style='padding:5px;'>-7</td><td style='padding:5px;'>12</td></tr></table>", 
    "<table style='display:inline-table; border-left:1px solid #000; border-right:1px solid #000; border-radius:5px;'><tr><td style='padding:5px;'>0</td><td style='padding:5px;'>7</td></tr><tr><td style='padding:5px;'>5</td><td style='padding:5px;'>12</td></tr></table>", 
        "<table style='display:inline-table; border-left:1px solid #000; border-right:1px solid #000; border-radius:5px;'><tr><td style='padding:5px;'>0</td><td style='padding:5px;'>12</td></tr><tr><td style='padding:5px;'>5</td><td style='padding:5px;'>7</td></tr></table>", 

  ], 
  "correct": "c", 
  "explanation": "بما أن (أ + ب)' = أ' + ب'، فإن أ + ب هي محورة المصفوفة المعطاة. عند تدوير المصفوفة (تبديل الصفوف بالأعمدة): الصف الأول [0، 5] يصبح عموداً أول، والصف الثاني [7، 12] يصبح عموداً ثانياً، فتنتج المصفوفة في الخيار (ج)." 
},
{ 
  "id": 18, 
  "type": "mcq", 
  "text": "<div dir='rtl'>إذا كانت ص = لو₃ ( جا³ س ) ، فإن دص/دس تساوي:</div>", 
  "options": [
    "<div dir='rtl'>3 - ظا س لو₃ هـ</div>", 
    "<div dir='rtl'>3 ظا س لو₃ هـ</div>", 
    "<div dir='rtl'>ظتا س لو₃ هـ + 3</div>", 
    "<div dir='rtl'>3 ظتا س لو₃ هـ</div>"

  let userAnswers = {};
    let timerSeconds = 0;
    let timerInterval = null;
    let currentHighlightId = 1;
    
    function formatTime(sec) {
        let minutes = Math.floor(sec / 60);
        let seconds = sec % 60;
        return `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            document.getElementById('timerDisplay').innerText = formatTime(timerSeconds);
        }, 1000);
    }
    
    function updateScore() {
        let correctCount = 0;
        for(let i = 0; i < questions.length; i++) {
            let q = questions[i];
            let ans = userAnswers[q.id];
            if(ans && ans.isCorrect === true) correctCount++;
        }
        document.getElementById('scoreDisplay').innerText = correctCount;
        document.getElementById('totalDisplay').innerText = questions.length;
        document.getElementById('totalQ').innerText = questions.length;
    }
    
    function scrollToQuestion(questionId) {
        let element = document.getElementById(`q-card-${questionId}`);
        if(element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.question-card').forEach(card => card.classList.remove('highlight'));
            element.classList.add('highlight');
            setTimeout(() => element.classList.remove('highlight'), 1500);
        }
    }
    
    function goToNextQuestion() {
        let nextId = currentHighlightId + 1;
        if(nextId <= questions.length) {
            currentHighlightId = nextId;
            document.getElementById('currentPos').innerText = currentHighlightId;
            scrollToQuestion(currentHighlightId);
        }
    }
    
    function goToPrevQuestion() {
        let prevId = currentHighlightId - 1;
        if(prevId >= 1) {
            currentHighlightId = prevId;
            document.getElementById('currentPos').innerText = currentHighlightId;
            scrollToQuestion(currentHighlightId);
        }
    }
    
    function scrollToTop() {
        document.querySelector('.questions-grid').scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function showSolution(qId, userAnswer, isCorrect) {
        let q = questions.find(q => q.id === qId);
        if(!q) return;
        
        let solutionDiv = document.getElementById(`solution-${qId}`);
        let correctAnswerText = "";
        if(q.type === "tf") {
            correctAnswerText = q.correct ? "صحيح" : "خطأ";
        } else {
            let idx = {a:0, b:1, c:2, d:3}[q.correct];
            correctAnswerText = q.options[idx];
        }
        
        let statusIcon = isCorrect ? '<i class="fas fa-check-circle" style="color:#10b981"></i>' : '<i class="fas fa-times-circle" style="color:#ef4444"></i>';
        let statusText = isCorrect ? "✓ إجابة صحيحة" : "✗ إجابة خاطئة";
        
        solutionDiv.innerHTML = `
            <div class="solution-title">${statusIcon} ${statusText}</div>
            <div class="solution-content">
                <p><strong>📖 الشرح المفصل:</strong> ${q.explanation}</p>
                <p><strong>✅ الإجابة الصحيحة:</strong> ${correctAnswerText}</p>
            </div>
        `;
        solutionDiv.classList.add('show');
    }
    
    function selectAnswer(qId, answerValue, qType) {
        let q = questions.find(q => q.id === qId);
        if(!q) return;
        
        let isCorrect = false;
        if(qType === "tf") {
            let userBool = (answerValue === 'true');
            isCorrect = (userBool === q.correct);
        } else {
            isCorrect = (answerValue === q.correct);
        }
        
        userAnswers[qId] = { answer: answerValue, isCorrect: isCorrect };
        
        if(qType === "tf") {
            document.querySelectorAll(`.tf-btn-${qId}`).forEach(btn => {
                btn.classList.remove('selected-true', 'selected-false');
            });
            if(answerValue === 'true') {
                document.querySelector(`.tf-btn-${qId}.true`).classList.add('selected-true');
            } else {
                document.querySelector(`.tf-btn-${qId}.false`).classList.add('selected-false');
            }
        } else {
            document.querySelectorAll(`.option-${qId}`).forEach(opt => {
                opt.classList.remove('selected');
                if(opt.querySelector('input') && opt.querySelector('input').value === answerValue) {
                    opt.classList.add('selected');
                }
            });
        }
        
        updateScore();
        
        let solutionDiv = document.getElementById(`solution-${qId}`);
        if(solutionDiv) solutionDiv.classList.remove('show');
    }
    
    function checkAnswer(qId) {
        let q = questions.find(q => q.id === qId);
        let ans = userAnswers[qId];
        if(!ans || !ans.answer) {
            alert("⚠️ الرجاء اختيار إجابة أولاً!");
            return;
        }
        showSolution(qId, ans.answer, ans.isCorrect);
    }
    
    function renderAllQuestions() {
        let container = document.getElementById('questionsContainer');
        let html = '';
        
        for(let i = 0; i < questions.length; i++) {
            let q = questions[i];
            let savedAnswer = userAnswers[q.id] ? userAnswers[q.id].answer : null;
            
            html += `<div class="question-card" id="q-card-${q.id}">
                <div class="question-header">
                    <span class="question-number" onclick="scrollToQuestion(${q.id})">📌 السؤال ${q.id}</span>
                    <span class="question-type">${q.type === 'tf' ? '✅ صح / خطأ' : '🔘 اختيار من متعدد'}</span>
                </div>
                <div class="question-text">${q.text}</div>`;
            
            if(q.type === "tf") {
                html += `<div class="tf-options">
                    <div class="tf-btn tf-btn-${q.id} true ${savedAnswer === 'true' ? 'selected-true' : ''}" onclick="selectAnswer(${q.id}, 'true', 'tf')"><i class="fas fa-check-circle"></i> صحيح</div>
                    <div class="tf-btn tf-btn-${q.id} false ${savedAnswer === 'false' ? 'selected-false' : ''}" onclick="selectAnswer(${q.id}, 'false', 'tf')"><i class="fas fa-times-circle"></i> خطأ</div>
                </div>`;
            } else {
                html += `<div class="options">`;
                for(let j = 0; j < q.options.length; j++) {
                    let optVal = String.fromCharCode(97+j);
                    let isSelected = (savedAnswer === optVal);
                    html += `<div class="option option-${q.id} ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${q.id}, '${optVal}', 'mcq')">
                        <input type="radio" name="q${q.id}" value="${optVal}" ${isSelected ? 'checked' : ''} onchange="selectAnswer(${q.id}, '${optVal}', 'mcq')">
                        <span>${q.options[j]}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            
            html += `<button class="check-btn" onclick="checkAnswer(${q.id})"><i class="fas fa-search"></i> 🔍 تحقق من الإجابة وعرض الحل</button>
                <div id="solution-${q.id}" class="solution-box"></div>
            </div>`;
        }
        
        container.innerHTML = html;
        updateScore();
        document.getElementById('currentPos').innerText = currentHighlightId;


if (window.MathJax) {
    MathJax.typesetPromise();
}

    }
    
    function resetAllAnswers() {
        userAnswers = {};
        renderAllQuestions();
        updateScore();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    window.selectAnswer = selectAnswer;
    window.checkAnswer = checkAnswer;
    window.resetAllAnswers = resetAllAnswers;
    window.goToNextQuestion = goToNextQuestion;
    window.goToPrevQuestion = goToPrevQuestion;
    window.scrollToTop = scrollToTop;
    window.scrollToQuestion = scrollToQuestion;
    
    startTimer();
    renderAllQuestions();
</script>
