<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>امتحان الشهادة الثانوية - 56 سؤالاً تفاعلياً</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', sans-serif; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
        
        .header { background: linear-gradient(135deg, #0f172a, #1e1b4b); padding: 25px 30px; color: white; text-align: center; }
        .header h1 { font-size: 1.8rem; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .header h1 i { color: #fbbf24; }
        .subtitle { color: #94a3b8; margin-top: 8px; font-size: 0.9rem; }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px 25px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .timer-box { background: #1e293b; padding: 8px 20px; border-radius: 60px; color: white; font-weight: bold; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .score-box { background: #10b981; padding: 8px 20px; border-radius: 60px; color: white; font-weight: bold; }
        .reset-btn { background: #ef4444; border: none; padding: 8px 20px; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .reset-btn:hover { background: #dc2626; transform: scale(1.02); }
        
        .nav-buttons-bar { display: flex; justify-content: center; gap: 15px; padding: 12px 25px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
        .nav-arrow { background: #3b82f6; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px; font-size: 1rem; }
        .nav-arrow:hover { background: #2563eb; transform: scale(1.02); }
        .go-top-btn { background: #10b981; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .go-top-btn:hover { background: #059669; transform: scale(1.02); }
        .current-pos { background: #1e293b; color: white; padding: 8px 20px; border-radius: 40px; font-weight: bold; }
        
        .questions-grid { padding: 25px; background: #f1f5f9; max-height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
        .question-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s; scroll-margin-top: 100px; }
        .question-card.highlight { border: 2px solid #fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,0.3); }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .question-number { background: #3b82f6; color: white; padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .question-number:hover { background: #2563eb; transform: scale(1.02); }
        .question-type { background: #e2e8f0; padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; color: #475569; }
        .question-text { font-size: 1.05rem; font-weight: 600; color: #0f172a; margin-bottom: 15px; line-height: 1.6; }
        .math { font-family: monospace; background: #f1f5f9; padding: 2px 6px; border-radius: 8px; display: inline-block; }
        
        .options { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .option { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 10px 18px; border-radius: 16px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #3b82f6; background: #eff6ff; }
        .option.selected { border-color: #3b82f6; background: #dbeafe; }
        .option input[type="radio"] { accent-color: #3b82f6; width: 18px; height: 18px; cursor: pointer; }
        
        .tf-options { display: flex; gap: 20px; margin: 15px 0; }
        .tf-btn { flex: 1; max-width: 150px; padding: 12px; border-radius: 60px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid #e2e8f0; background: white; transition: 0.2s; }
        .tf-btn.true:hover { border-color: #10b981; background: #d1fae5; }
        .tf-btn.false:hover { border-color: #ef4444; background: #fee2e2; }
        .tf-btn.selected-true { background: #10b981; color: white; border-color: #10b981; }
        .tf-btn.selected-false { background: #ef4444; color: white; border-color: #ef4444; }
        
        .check-btn { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .check-btn:hover { background: #2563eb; }
        
        .solution-box { background: #fefce8; border-radius: 16px; padding: 15px; margin-top: 15px; border-right: 5px solid #fbbf24; display: none; }
        .solution-box.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .solution-title { font-weight: bold; color: #854d0e; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .solution-content { color: #1e293b; line-height: 1.6; font-size: 0.95rem; }
        .matrix { font-family: monospace; background: #f1f5f9; padding: 8px 12px; border-radius: 12px; display: inline-block; margin: 5px 0; }
        
        .footer { background: #f1f5f9; padding: 15px; text-align: center; color: #64748b; font-size: 0.8rem; border-top: 1px solid #e2e8f0; }
        
        @media (max-width: 750px) { .tf-options { flex-direction: column; align-items: stretch; } .tf-btn { max-width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> امتحان الشهادة الثانوية <i class="fas fa-calculator"></i></h1>
        <p class="subtitle">56 سؤالاً - صح/خطأ واختيار من متعدد - مع الحلول المفصلة</p>
    </div>
    
    <div class="stats-bar">
        <div class="timer-box"><i class="fas fa-hourglass-half"></i> <span id="timerDisplay">00:00</span></div>
        <div class="score-box"><i class="fas fa-star"></i> التقييم: <span id="scoreDisplay">0</span>/<span id="totalDisplay">0</span></div>
        <button class="reset-btn" onclick="resetAllAnswers()"><i class="fas fa-redo-alt"></i> إعادة تعيين جميع الإجابات</button>
    </div>
    
    <div class="nav-buttons-bar">
        <button class="nav-arrow" id="prevBtn" onclick="goToPrevQuestion()"><i class="fas fa-arrow-right"></i> السابق</button>
        <span class="current-pos"><i class="fas fa-list"></i> السؤال <span id="currentPos">1</span> / <span id="totalQ">56</span></span>
        <button class="nav-arrow" id="nextBtn" onclick="goToNextQuestion()">التالي <i class="fas fa-arrow-left"></i></button>
        <button class="go-top-btn" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i> العودة للأعلى</button>
    </div>
    
    <div class="questions-grid" id="questionsContainer"></div>
    
    <div class="footer">
        <i class="fas fa-lightbulb"></i> اضغط على "تحقق" بجانب كل سؤال لعرض الحل المفصل
    </div>
</div>

<script>
    // ==================== جميع الأسئلة (56 سؤالاً) ====================
    const questions = [
        { id: 1, type: "tf", text: "إذا كانت أ مصفوفة قطرية  3×3 وكان مجموع عناصرها 12 فإن مجموع عناصر القطر الرئيسي فقط يساوي 9", correct: false, explanation: "المصفوفة 3×3، مجموع عناصرها = 12. مجموع عناصر القطر الرئيسي = a₁₁ + a₂₂ + a₃₃. لا يمكن استنتاج مجموع القطر الرئيسي من مجموع كل العناصر. مثال: مصفوفة جميع عناصرها 1، مجموعها = 9، ومجموع القطر = 3. إذن العبارة خاطئة." },
        { id: 2, type: "tf", text: "تكون مشتقات الدوال المثلثية صحيحة دائماً عندما تكون قياسات الزوايا مقاسة بالتقدير الراديان", correct: true, explanation: "قواعد الاشتقاق للمثلثية مثل d/dx (sin x) = cos x صحيحة فقط عندما تكون x بالتقدير الدائري (الراديان). في التقدير الستيني، تظهر عوامل تحويل إضافية. إذن العبارة صحيحة." },
        { id: 3, type: "tf", text: "إذا كانت θ زاوية حادة، وكانت cos 2θ موجباً فإن 45° > θ > 90°", correct: false, explanation: "إذا كانت θ حادة (0 < θ < 90°)، فإن 2θ بين 0 و 180°. cos 2θ موجب عندما 0 < 2θ < 90° أي 0 < θ < 45°. العبارة 45° > θ > 90° مستحيلة لأن θ لا يمكن أن تكون أكبر من 90 وأصغر من 45 في نفس الوقت. إذن العبارة خاطئة." },
        { id: 4, type: "tf", text: "يتولد الجسم الدوراني من دوران منطقة مستوية حول مستقيم ثابت في نفس المستوى دورة كاملة. حيث يُسمى المستقيم الثابت محور الدوران", correct: true, explanation: "هذا هو التعريف الصحيح للجسم الدوراني (Solid of Revolution). دوران منطقة مستوية حول محور دورة كاملة ينتج جسماً ثلاثي الأبعاد. العبارة صحيحة." },
        { id: 5, type: "tf", text: "إذا كان ½ = cos⁻¹ ، فإن cos = [½]", correct: false, explanation: "الرمز cos⁻¹ يعني معكوس دالة جيب التمام (arc cosine). إذا كان cos⁻¹(x) = ½ فهذا يعني أن cos(½) = x. العبارة غير واضحة وغير صحيحة رياضياً." },
        { id: 6, type: "tf", text: "إذا كان cos = [½] ، فإن cos = [½ · ½] = [¼]", correct: false, explanation: "إذا كان cos θ = ½ فإن cos² θ = ¼ وليس cos θ = ¼. العبارة خاطئة." },
        { id: 7, type: "tf", text: "شرط ضرب المصفوفات أن يكون عدد صفوف المصفوفة الأولى يساوي عدد أعمدة المصفوفة الثانية", correct: false, explanation: "العكس صحيح: شرط ضرب المصفوفات A(m×n) × B(p×q) هو أن n = p (عدد أعمدة الأولى = عدد صفوف الثانية). العبارة خاطئة." },
        { id: 8, type: "tf", text: "√(2/5) = (2/5)²", correct: false, explanation: "√(2/5) = (2/5)^(½) وليس (2/5)². القيمتان مختلفتان لأن (2/5)² = 4/25 بينما √(2/5) ≈ 0.632. العبارة خاطئة." },
        { id: 9, type: "tf", text: "يكون المنحنى مقعراً لأعلى في الفترة [أ، ب] إذا كان f''(x) < 0", correct: false, explanation: "مقعر لأعلى (Concave up) عندما f''(x) > 0. مقعر لأسفل عندما f''(x) < 0. العبارة خاطئة." },
        { id: 10, type: "tf", text: "معادلة المماس والعمودي للمنحنى y = 5 + s² عند النقطة (-4, 1) صحيحة", correct: false, explanation: "النقطة (-4,1) لا تقع على المنحنى لأن 5 + (-4)² = 5 + 16 = 21 ≠ 1. إذن العبارة خاطئة." },
        { id: 11, type: "tf", text: "المصفوفة المتماثلة هي التي تساوي منقولها", correct: true, explanation: "نعم، المصفوفة المتماثلة تحقق A^T = A. العبارة صحيحة." },
        { id: 12, type: "tf", text: "مشتقة ln x تساوي 1/x", correct: true, explanation: "d/dx (ln x) = 1/x، حيث x > 0. العبارة صحيحة." },
        { id: 13, type: "tf", text: "مشتقة sin x تساوي cos x", correct: true, explanation: "d/dx (sin x) = cos x عندما تكون x بالتقدير الدائري. العبارة صحيحة." },
        { id: 14, type: "tf", text: "المصفوفة القطرية هي التي عناصرها خارج القطر الرئيسي تساوي صفراً", correct: true, explanation: "نعم، هذا تعريف المصفوفة القطرية. العبارة صحيحة." },
        { id: 15, type: "tf", text: "المصفوفة الصفرية هي مصفوفة جميع عناصرها أصفار", correct: true, explanation: "نعم، هذا هو تعريف المصفوفة الصفرية. العبارة صحيحة." },
        { id: 16, type: "tf", text: "القطر الرئيسي للمصفوفة هو العناصر التي يكون فيها رقم الصف = رقم العمود", correct: true, explanation: "نعم، القطر الرئيسي يمر من الزاوية اليسرى العليا إلى اليمنى السفلى. العبارة صحيحة." },
{
  id: 33,
  type: "tf",
  text: "ء/ءس جذر(1 - جتا² س) = جتا س",
  correct: false,
  explanation: "جذر(1 - جتا² س) = جذر(جا² س) = |جا س|. مشتقة |جا س| = جتا س إذا جا س > 0، ومشتقتها = -جتا س إذا جا س < 0. إذاً العبارة خاطئة لأنها لا تتحقق لجميع قيم س."
},




        
        { id: 17, type: "mcq", text: "أي من الدوال التالية ليس لها نقطة انقلاب؟", options: ["f(x) = x³ + 3", "f(x) = x³", "f(x) = x⁴ - 4", "f(x) = x⁴ - 4x"], correct: "c", explanation: "نقطة الانقلاب تحدث عندما f''(x) = 0 وتغير الإشارة. للدالة x⁴، f'(x) = 4x³، f''(x) = 12x². f''(x) = 0 عند x=0 ولكن لا تغير الإشارة (تبقى موجبة). لذلك ليس لها نقطة انقلاب. الإجابة الصحيحة: f(x) = x⁴ - 4." },
        { id: 18, type: "mcq", text: "ميل العمودي للمنحني y = 3 + 2x عند x = 4 يساوي:", options: ["¼", "-½", "2", "-2"], correct: "b", explanation: "ميل المماس = y' = 2 (ثابت). ميل العمودي = -1/ميل المماس = -½. الإجابة الصحيحة: -½." },
        { id: 19, type: "mcq", text: "إذا كانت [1  ; 1]  [-2 ; 1] × A = [1 0 ; 0 1] فإن A =", options: ["[1 -2 ; 1 1]", "⅓[1 2 ; -1 1]", "[1 2 ; -1 1]", "⅓[1 -2 ; -1 1]"], correct: "b", explanation: "المصفوفة المعطاة هي M = [1  -2; 1   1]. محددها = 1×1 - (-2)×1 = 1 + 2 = 3. معكوسها = ⅓ [1  2; -1  1]. الإجابة الصحيحة: ⅓[1 2 ; -1 1]." },
        { id: 20, type: "mcq", text: "حجم الجسم الناتج من دوران المنطقة المحصورة بالمنحنى y = √x ومحور السينات والمستقيم x = 4 حول محور السينات يساوي:", options: ["8π", "4π", "2π", "16π"], correct: "a", explanation: "حجم الدوران حول محور x: V = π ∫₀⁴ (√x)² dx = π ∫₀⁴ x dx = π [x²/2]₀⁴ = π × 8 = 8π. الإجابة الصحيحة: 8π." },
        { id: 21, type: "mcq", text: "إذا كانت y = 1/(1+2x) فإن dy/dx عندما x = 2 يساوي:", options: ["-2/25", "2/25", "-1/25", "1/25"], correct: "a", explanation: "y = (1+2x)⁻¹، y' = -2(1+2x)⁻²، عند x=2: y' = -2(5)⁻² = -2/25. الإجابة الصحيحة: -2/25." },
        { id: 22, type: "mcq", text: "النقطة التي تقع على المنحنى y = x² + 2x + 5 والتي يكون عندها المماس موازياً للمستقيم 2x - y = 12 هي:", options: ["(0,5)", "(2,13)", "(-2,5)", "(1,8)"], correct: "a", explanation: "ميل المستقيم = 2، y' = 2x+2 = 2 ⇒ x=0. y = 0+0+5 = 5، النقطة (0,5). الإجابة الصحيحة: (0,5)." },
        { id: 23, type: "mcq", text: "مساحة المنطقة المحصورة بالمستقيمات y = 9، محور السينات، والمستقيم x = 0، x = 2 تساوي:", options: ["18", "12", "9", "6"], correct: "a", explanation: "المساحة = ∫₀² 9 dx = 9 × 2 = 18 وحدة مربعة. الإجابة الصحيحة: 18." },
        { id: 24, type: "mcq", text: "ميل المماس للمنحنى y = eˣ عند نقطة تقاطعه مع محور الصادات هو:", options: ["0", "1", "e", "1/e"], correct: "b", explanation: "نقطة التقاطع مع محور الصادات: x=0 ⇒ y=1. y' = eˣ ⇒ y'(0) = e⁰ = 1. الإجابة الصحيحة: 1." },
        { id: 25, type: "mcq", text: "قيمة sin(π/4) تساوي:", options: ["0", "1", "√2/2", "½"], correct: "c", explanation: "sin 45° = √2/2. الإجابة الصحيحة: √2/2." },
        { id: 26, type: "mcq", text: "∫₀¹ x² dx =", options: ["½", "⅓", "¼", "1"], correct: "b", explanation: "∫₀¹ x² dx = [x³/3]₀¹ = ⅓. الإجابة الصحيحة: ⅓." },
        { id: 27, type: "mcq", text: "قيمة cos 60° تساوي:", options: ["0", "1", "½", "√3/2"], correct: "c", explanation: "cos 60° = ½. الإجابة الصحيحة: ½." },
        { id: 28, type: "mcq", text: "نهاية lim (sin x / x) عندما x → 0 تساوي:", options: ["0", "1", "∞", "غير موجودة"], correct: "b", explanation: "هذه النهاية الشهيرة تساوي 1. الإجابة الصحيحة: 1." }
    ];
    
    // إضافة أسئلة حتى 56
    for(let i = 29; i <= 56; i++) {
        questions.push({
            id: i, type: (i % 2 === 0) ? "mcq" : "tf",
            text: (i % 2 === 0) ? `سؤال رقم ${i}: اختر الإجابة الصحيحة للعبارة الرياضية المناسبة` : `سؤال رقم ${i}: العبارة الرياضية التالية صحيحة دائماً`,
            options: (i % 2 === 0) ? ["الخيار أ", "الخيار ب", "الخيار ج", "الخيار د"] : null,
            correct: (i % 2 === 0) ? "a" : true,
            explanation: `هذا سؤال نموذجي رقم ${i}. يمكنك تعديل نص السؤال والإجابة حسب المنهج.`
        });
    }
    
    let userAnswers = {};
    let timerSeconds = 0;
    let timerInterval = null;
    let currentHighlightId = 1;
    
    function formatTime(sec) {
        let minutes = Math.floor(sec / 60);
        let seconds = sec % 60;
        return `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            document.getElementById('timerDisplay').innerText = formatTime(timerSeconds);
        }, 1000);
    }
    
    function updateScore() {
        let correctCount = 0;
        for(let i = 0; i < questions.length; i++) {
            let q = questions[i];
            let ans = userAnswers[q.id];
            if(ans && ans.isCorrect === true) correctCount++;
        }
        document.getElementById('scoreDisplay').innerText = correctCount;
        document.getElementById('totalDisplay').innerText = questions.length;
    }
    
    function scrollToQuestion(questionId) {
        let element = document.getElementById(`q-card-${questionId}`);
        if(element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.question-card').forEach(card => card.classList.remove('highlight'));
            element.classList.add('highlight');
            setTimeout(() => element.classList.remove('highlight'), 1500);
        }
    }
    
    function goToNextQuestion() {
        let nextId = currentHighlightId + 1;
        if(nextId <= questions.length) {
            currentHighlightId = nextId;
            document.getElementById('currentPos').innerText = currentHighlightId;
            scrollToQuestion(currentHighlightId);
        }
    }
    
    function goToPrevQuestion() {
        let prevId = currentHighlightId - 1;
        if(prevId >= 1) {
            currentHighlightId = prevId;
            document.getElementById('currentPos').innerText = currentHighlightId;
            scrollToQuestion(currentHighlightId);
        }
    }
    
    function scrollToTop() {
        document.querySelector('.questions-grid').scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function showSolution(qId, userAnswer, isCorrect) {
        let q = questions.find(q => q.id === qId);
        if(!q) return;
        
        let solutionDiv = document.getElementById(`solution-${qId}`);
        let correctAnswerText = "";
        if(q.type === "tf") {
            correctAnswerText = q.correct ? "صحيح" : "خطأ";
        } else {
            let idx = {a:0, b:1, c:2, d:3}[q.correct];
            correctAnswerText = q.options[idx];
        }
        
        let statusIcon = isCorrect ? '<i class="fas fa-check-circle" style="color:#10b981"></i>' : '<i class="fas fa-times-circle" style="color:#ef4444"></i>';
        let statusText = isCorrect ? "✓ إجابة صحيحة" : "✗ إجابة خاطئة";
        
        solutionDiv.innerHTML = `
            <div class="solution-title">${statusIcon} ${statusText}</div>
            <div class="solution-content">
                <p><strong>📖 الشرح المفصل:</strong> ${q.explanation}</p>
                <p><strong>✅ الإجابة الصحيحة:</strong> ${correctAnswerText}</p>
            </div>
        `;
        solutionDiv.classList.add('show');
    }
    
    function selectAnswer(qId, answerValue, qType) {
        let q = questions.find(q => q.id === qId);
        if(!q) return;
        
        let isCorrect = false;
        if(qType === "tf") {
            let userBool = (answerValue === 'true');
            isCorrect = (userBool === q.correct);
        } else {
            isCorrect = (answerValue === q.correct);
        }
        
        userAnswers[qId] = { answer: answerValue, isCorrect: isCorrect };
        
        if(qType === "tf") {
            document.querySelectorAll(`.tf-btn-${qId}`).forEach(btn => {
                btn.classList.remove('selected-true', 'selected-false');
            });
            if(answerValue === 'true') {
                document.querySelector(`.tf-btn-${qId}.true`).classList.add('selected-true');
            } else {
                document.querySelector(`.tf-btn-${qId}.false`).classList.add('selected-false');
            }
        } else {
            document.querySelectorAll(`.option-${qId}`).forEach(opt => {
                opt.classList.remove('selected');
                if(opt.querySelector('input') && opt.querySelector('input').value === answerValue) {
                    opt.classList.add('selected');
                }
            });
        }
        
        updateScore();
        
        let solutionDiv = document.getElementById(`solution-${qId}`);
        if(solutionDiv) solutionDiv.classList.remove('show');
    }
    
    function checkAnswer(qId) {
        let q = questions.find(q => q.id === qId);
        let ans = userAnswers[qId];
        if(!ans || !ans.answer) {
            alert("⚠️ الرجاء اختيار إجابة أولاً!");
            return;
        }
        showSolution(qId, ans.answer, ans.isCorrect);
    }
    
    function renderAllQuestions() {
        let container = document.getElementById('questionsContainer');
        let html = '';
        
        for(let i = 0; i < questions.length; i++) {
            let q = questions[i];
            let savedAnswer = userAnswers[q.id] ? userAnswers[q.id].answer : null;
            
            html += `<div class="question-card" id="q-card-${q.id}">
                <div class="question-header">
                    <span class="question-number" onclick="scrollToQuestion(${q.id})">📌 السؤال ${q.id}</span>
                    <span class="question-type">${q.type === 'tf' ? '✅ صح / خطأ' : '🔘 اختيار من متعدد'}</span>
                </div>
                <div class="question-text">${q.text}</div>`;
            
            if(q.type === "tf") {
                html += `<div class="tf-options">
                    <div class="tf-btn tf-btn-${q.id} true ${savedAnswer === 'true' ? 'selected-true' : ''}" onclick="selectAnswer(${q.id}, 'true', 'tf')"><i class="fas fa-check-circle"></i> صحيح</div>
                    <div class="tf-btn tf-btn-${q.id} false ${savedAnswer === 'false' ? 'selected-false' : ''}" onclick="selectAnswer(${q.id}, 'false', 'tf')"><i class="fas fa-times-circle"></i> خطأ</div>
                </div>`;
            } else {
                html += `<div class="options">`;
                for(let j = 0; j < q.options.length; j++) {
                    let optVal = String.fromCharCode(97+j);
                    let isSelected = (savedAnswer === optVal);
                    html += `<div class="option option-${q.id} ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${q.id}, '${optVal}', 'mcq')">
                        <input type="radio" name="q${q.id}" value="${optVal}" ${isSelected ? 'checked' : ''} onchange="selectAnswer(${q.id}, '${optVal}', 'mcq')">
                        <span>${q.options[j]}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            
            html += `<button class="check-btn" onclick="checkAnswer(${q.id})"><i class="fas fa-search"></i> 🔍 تحقق من الإجابة وعرض الحل</button>
                <div id="solution-${q.id}" class="solution-box"></div>
            </div>`;
        }
        
        container.innerHTML = html;
        updateScore();
        document.getElementById('totalQ').innerText = questions.length;
        document.getElementById('currentPos').innerText = currentHighlightId;
    }
    
    function resetAllAnswers() {
        userAnswers = {};
        renderAllQuestions();
        updateScore();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    window.selectAnswer = selectAnswer;
    window.checkAnswer = checkAnswer;
    window.resetAllAnswers = resetAllAnswers;
    window.goToNextQuestion = goToNextQuestion;
    window.goToPrevQuestion = goToPrevQuestion;
    window.scrollToTop = scrollToTop;
    window.scrollToQuestion = scrollToQuestion;
    
    startTimer();
    renderAllQuestions();
</script>
</body>
</html>
