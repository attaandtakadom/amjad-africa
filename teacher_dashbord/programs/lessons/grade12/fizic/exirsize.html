<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تمارين الفيزياء - مدرسة أمجاد أفريقيا</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .quiz-container { max-width: 800px; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; margin: -20px -20px 20px -20px; }
        .question-card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        .question-text { font-size: 1.2em; font-weight: bold; color: #34495e; margin-bottom: 15px; }
        .options { display: grid; gap: 10px; }
        .option-btn { padding: 10px 20px; border: 2px solid #3498db; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: right; font-size: 1em; }
        .option-btn:hover { background: #3498db; color: white; }
        .check-btn { margin-top: 15px; padding: 10px 25px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-weight: bold; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .selected { background: #3498db !important; color: white; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h2>📝 بنك أسئلة الفيزياء الكهربائية</h2>
        <p>مدرسة أمجاد أفريقيا للتعليم الخاص</p>
    </div>

    <div id="quiz-body">
        </div>
</div>

<script>
    // مصفوفة الأسئلة
    const questions = [
        {
            id: 1,
            type: "tf",
            text: "لا تستخدم المحولات الكهربائية في رفع أو خفض القوة الدافعة المستمرة.",
            options: ["صح", "خطأ"],
            answer: "صح",
            note: "المحول يعمل فقط على التيار المتردد لأن فكرته تعتمد على الحث المتبادل الناتج عن تغير الفيض."
        },
        {
            id: 2,
            type: "tf",
            text: "يقل الدوران في محرك التيار المستمر عند زيادة شدة التيار الكهربائي المار فيه.",
            options: ["صح", "خطأ"],
            answer: "خطأ",
            note: "زيادة التيار تزيد من عزم الدوران وبالتالي تزداد سرعة دوران المحرك."
        },
        {
            id: 3,
            type: "tf",
            text: "في مولد التيار المتردد، إذا لم يتصل المولد بدائرة خارجية ذات حمل فإنه يسري التيار على أي حال.",
            options: ["صح", "خطأ"],
            answer: "خطأ",
            note: "إذا كانت الدائرة مفتوحة، تتولد قوة دافعة (فولت) ولكن لا يسري تيار كهربائي."
        },
        {
            id: 4,
            type: "mcq",
            text: "قاعدة تستخدم لتحديد اتجاه التيار المستحث في ملف تعرف بقاعدة:",
            options: ["لينز", "فلمنج لليد اليسرى", "فلمنج لليد اليمنى"],
            answer: "لينز",
            note: "قاعدة لينز تحدد اتجاه التيار المستحث في الملفات، بينما فلمنج لليد اليمنى تستخدم للأسلاك المستقيمة."
        },
        {
            id: 5,
            type: "mcq",
            text: "وحدة قياس (أوم × ثانية) تكافئ:",
            options: ["الأمبير (A)", "الهنري (H)", "الويبر (Wb)", "التسلا (T)"],
            answer: "الهنري (H)",
            note: "من قانون الحث الذاتي، الهنري يكافئ فولت.ثانية/أمبير، وحيث أن فولت/أمبير = أوم، فإن الوحدة هي أوم.ثانية."
        }
    ];

    const quizBody = document.getElementById('quiz-body');

    // وظيفة عرض الأسئلة من المصفوفة
    function renderQuiz() {
        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let optionsHTML = '';
            q.options.forEach(opt => {
                optionsHTML += `<button class="option-btn" onclick="selectOption(${index}, '${opt}', this)">${opt}</button>`;
            });

            card.innerHTML = `
                <div class="question-text">${index + 1}. ${q.text}</div>
                <div class="options" id="options-${index}">${optionsHTML}</div>
                <button class="check-btn" onclick="checkAnswer(${index})">تحقق من الإجابة</button>
                <div id="result-${index}" class="result"></div>
            `;
            quizBody.appendChild(card);
        });
    }

    let userSelections = {};

    function selectOption(qIndex, val, btn) {
        userSelections[qIndex] = val;
        const parent = document.getElementById(`options-${qIndex}`);
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function checkAnswer(qIndex) {
        const resultDiv = document.getElementById(`result-${qIndex}`);
        const selected = userSelections[qIndex];
        
        if (!selected) {
            alert("يرجى اختيار إجابة أولاً!");
            return;
        }

        resultDiv.style.display = "block";
        if (selected === questions[qIndex].answer) {
            resultDiv.className = "result correct";
            resultDiv.innerHTML = "✅ إجابة صحيحة! " + questions[qIndex].note;
        } else {
            resultDiv.className = "result wrong";
            resultDiv.innerHTML = "❌ إجابة خاطئة. الإجابة الصحيحة هي: " + questions[qIndex].answer + "<br><small>" + questions[qIndex].note + "</small>";
        }
    }

    renderQuiz();
</script>

</body>
</html>
