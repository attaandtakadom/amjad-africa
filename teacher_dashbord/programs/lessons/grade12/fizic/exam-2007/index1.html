<body>

    <div class="container">
        <h1>حل امتحان الفيزياء لدفعة 2008</h1>

        <!-- زر التحميل الفوري والمباشر للإجابة النموذجية في بداية البرنامج -->
        <div class="no-print" style="text-align: center; margin-bottom: 25px; padding: 15px; background: #eecf; border-radius: 8px;">
            <button class="pdf-btn" onclick="generateModelAnswersPDF()" id="pdfDirectBtn">
                📥 تحميل كتاب الإجابات النموذجية (PDF) للمنصة
            </button>
        </div>

        <!-- شاشة الامتحان التفاعلي -->
        <div id="quiz-screen">
            <div class="quiz-info">
                <span id="progress-text">السؤال 1 من --</span>
                <span id="score-live">الدرجة الحالية: 0</span>
            </div>

            <div id="question-container">
                <!-- يتم توليد الأسئلة التفاعلية هنا -->
            </div>

            <div class="navigation-buttons">
                <button id="prev-btn" onclick="previousQuestion()" disabled>السابق</button>
                <button id="next-btn" onclick="nextQuestion()">التالي</button>
                <button id="submit-btn" class="hide" onclick="finishExam()">إنهاء الامتحان ورصد الدرجة</button>
            </div>
        </div>

        <!-- شاشة النتيجة النهائية (تظهر بعد حل الامتحان تفاعلياً) -->
        <div id="result-screen" class="hide">
            <div id="print-area">
                <div id="congrats-msg" class="success-message hide">🎉 مبروك أنت ناجح! 🎉</div>
                <div id="fail-msg" style="color: var(--danger-color); font-size: 24px; font-weight: bold;" class="hide">حظاً أوفر في المرة القادمة!</div>
                <p class="score-display">لقد حصلت على درجة: <span id="final-score">0</span> من <span id="total-questions">0</span></p>
                
                <div id="review-container" style="margin-top: 30px; text-align: right;"></div>
            </div>

            <div class="no-print" style="margin-top: 20px; text-align: center;">
                <button onclick="location.reload()" style="background-color: var(--primary-color); color: white;">
                    🔄 إعادة المحاولة
                </button>
            </div>
        </div>
    </div>

    <!-- استدعاء ملفات JavaScript -->
    <script src="array-2008.js"></script>
    <script src="app.js"></script>

</body>
