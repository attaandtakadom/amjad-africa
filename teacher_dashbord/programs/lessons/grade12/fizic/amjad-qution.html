// =====================================================
// دوال العرض
// =====================================================

// عرض أسئلة صح/خطأ
function renderTrueFalse() {
    const container = document.getElementById('tf-questions-container');
    container.innerHTML = '';
    trueFalseQuestions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.setAttribute('data-qid', `tf-${idx}`);
        card.innerHTML = `
            <div class="question-text">❓ ${idx+1}. ${q.text}</div>
            <div class="tf-options">
                <div class="tf-btn" data-value="true">✅ صح</div>
                <div class="tf-btn" data-value="false">❌ خطأ</div>
            </div>
            <button class="check-btn" data-type="tf" data-idx="${idx}">🔍 تحقق من إجابتي</button>
            <div class="feedback" id="feedback-tf-${idx}"></div>
        `;
        container.appendChild(card);

        // إضافة حدث الاختيار
        const btns = card.querySelectorAll('.tf-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                card.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                card.setAttribute('data-selected', btn.getAttribute('data-value'));
            });
        });
    });
}

// عرض أسئلة اختيار من متعدد
function renderMultipleChoice() {
    const container = document.getElementById('mcq-questions-container');
    container.innerHTML = '';
    multipleChoiceQuestions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.setAttribute('data-qid', `mcq-${idx}`);
        let optionsHtml = `<div class="question-text">❓ ${idx+1}. ${q.text}</div><div class="options">`;
        q.options.forEach((opt, optIdx) => {
            optionsHtml += `
                <div class="option" data-opt-index="${optIdx}">
                    <input type="radio" name="mcq-${idx}" value="${optIdx}">
                    <label>${opt}</label>
                </div>
            `;
        });
        optionsHtml += `</div><button class="check-btn" data-type="mcq" data-idx="${idx}">🔍 تحقق من إجابتي</button>
                        <div class="feedback" id="feedback-mcq-${idx}"></div>`;
        card.innerHTML = optionsHtml;
        container.appendChild(card);

        // إضافة حدث الاختيار
        card.querySelectorAll('.option').forEach(optDiv => {
            const radio = optDiv.querySelector('input');
            optDiv.addEventListener('click', () => {
                radio.checked = true;
                card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                optDiv.classList.add('selected');
                card.setAttribute('data-selected', optDiv.getAttribute('data-opt-index'));
            });
            if (radio) {
                radio.addEventListener('change', (e) => {
                    card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    optDiv.classList.add('selected');
                    card.setAttribute('data-selected', e.target.value);
                });
            }
        });
    });
}

// التحقق من إجابة صح/خطأ
function checkTFAnswer(idx) {
    const card = document.querySelector(`.question-card[data-qid="tf-${idx}"]`);
    const selected = card.getAttribute('data-selected');
    const question = trueFalseQuestions[idx];
    const feedbackDiv = document.getElementById(`feedback-tf-${idx}`);
    
    if (!selected) {
        feedbackDiv.innerHTML = "⚠️ الرجاء اختيار إجابة أولاً";
        feedbackDiv.className = "feedback wrong-feedback";
        return;
    }
    
    const userAnswer = selected === 'true';
    const isCorrect = (userAnswer === question.correct);
    const correctStr = question.correct ? "صح ✅" : "خطأ ❌";
    const userStr = userAnswer ? "صح" : "خطأ";
    
    if (isCorrect) {
        feedbackDiv.innerHTML = `🎉 إجابتك صحيحة! 🎉<br>الإجابة الصحيحة: ${correctStr}<div class="steps">📖 خطوات الحل:<br>${question.solution || "لا توجد خطوات تفصيلية."}</div>`;
        feedbackDiv.className = "feedback correct-feedback";
    } else {
        feedbackDiv.innerHTML = `❌ إجابتك خاطئة.<br>إجابتك: ${userStr}<br>الإجابة الصحيحة: ${correctStr}<div class="steps">📖 خطوات الحل:<br>${question.solution || "لا توجد خطوات تفصيلية."}</div>`;
        feedbackDiv.className = "feedback wrong-feedback";
    }
}

// التحقق من إجابة اختيار من متعدد
function checkMCQAnswer(idx) {
    const card = document.querySelector(`.question-card[data-qid="mcq-${idx}"]`);
    const selected = card.getAttribute('data-selected');
    const question = multipleChoiceQuestions[idx];
    const feedbackDiv = document.getElementById(`feedback-mcq-${idx}`);
    
    if (!selected) {
        feedbackDiv.innerHTML = "⚠️ الرجاء اختيار إجابة أولاً";
        feedbackDiv.className = "feedback wrong-feedback";
        return;
    }
    
    const userIndex = parseInt(selected);
    const isCorrect = (userIndex === question.correctIndex);
    const correctStr = question.options[question.correctIndex];
    const userStr = question.options[userIndex];
    
    if (isCorrect) {
        feedbackDiv.innerHTML = `🎉 إجابتك صحيحة! 🎉<br>الإجابة الصحيحة: ${correctStr}<div class="steps">📖 خطوات الحل:<br>${question.solution || "لا توجد خطوات تفصيلية."}</div>`;
        feedbackDiv.className = "feedback correct-feedback";
    } else {
        feedbackDiv.innerHTML = `❌ إجابتك خاطئة.<br>إجابتك: ${userStr}<br>الإجابة الصحيحة: ${correctStr}<div class="steps">📖 خطوات الحل:<br>${question.solution || "لا توجد خطوات تفصيلية."}</div>`;
        feedbackDiv.className = "feedback wrong-feedback";
    }
}

// إضافة مستمعات لأزرار التحقق (بعد تحميل الصفحة)
function attachCheckListeners() {
    // صح/خطأ
    document.querySelectorAll('.check-btn[data-type="tf"]').forEach(btn => {
        btn.removeEventListener('click', window.tfHandler);
        window.tfHandler = () => checkTFAnswer(parseInt(btn.getAttribute('data-idx')));
        btn.addEventListener('click', window.tfHandler);
    });
    // اختيار متعدد
    document.querySelectorAll('.check-btn[data-type="mcq"]').forEach(btn => {
        btn.removeEventListener('click', window.mcqHandler);
        window.mcqHandler = () => checkMCQAnswer(parseInt(btn.getAttribute('data-idx')));
        btn.addEventListener('click', window.mcqHandler);
    });
}

// التبويبات
function setupTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tab.getAttribute('data-tab')).classList.add('active');
        });
    });
}
// أزرار التمرير للأعلى والأسفل
document.getElementById('scrollUpBtn').addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});
document.getElementById('scrollDownBtn').addEventListener('click', function() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});
// تحميل الصفحة
renderTrueFalse();
renderMultipleChoice();
setupTabs();
setTimeout(attachCheckListeners, 100);
</script>
