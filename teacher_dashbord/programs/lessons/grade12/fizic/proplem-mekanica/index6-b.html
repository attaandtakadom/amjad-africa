/* ======================================================= */
/* 1. التنسيق على الشاشة العادية (إخفاء حاوية الـ PDF تماماً) */
/* ======================================================= */
#dynamic-pdf-questions-area {
    display: none !important; /* يمنع ظهور الكراسة كلقطة شاشة معلقة أثناء التصفح */
}

/* ======================================================= */
/* 2. تنسيقات الطباعة الفائقة المخصصة للنقال والـ PDF      */
/* ======================================================= */
@media print {
    /* إجبار الهواتف على طباعة الألوان الكاملة والداكنة دون توفير للحبر */
    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    /* إخفاء عناصر واجهة المستخدم والتحكم بالكامل */
    body * {
        visibility: hidden !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
    }
    
    /* إظهار منطقة طباعة الكراسة فقط وتمديدها */
    #dynamic-pdf-questions-area, 
    #dynamic-pdf-questions-area * {
        visibility: visible !important;
        display: block !important;
        height: auto !important;
        overflow: visible !important;
    }

    @page {
        margin: 5mm !important; /* استغلال مساحة الصفحة بالكامل */
    }

    #dynamic-pdf-questions-area {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    /* كسر الصفحات بشكل حاد لكل مسألة */
    .pdf-question-page-wrapper {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: always !important;
        break-after: page !important;
        width: 100% !important;
        box-sizing: border-box !important;
        min-height: 95vh !important;
        padding: 8mm 4mm !important;
    }

    /* --------------------------------------------------- */
    /* تكبير نصوص وعناوين الأسئلة والحلول بشكل حاد وواضح    */
    /* --------------------------------------------------- */
    .pdf-q-text, 
    .pdf-q-text *, 
    .pdf-q-text p, 
    .pdf-q-text span, 
    .pdf-q-text div {
        font-size: 46px !important; 
        font-weight: bold !important;
        line-height: 1.7 !important;
    }

    /* تكبير العناوين الفرعية (مثل: قبل الحركة / بعد الحركة) */
    .pdf-q-text small,
    .pdf-q-text span[style*="font-size"] {
        font-size: 36px !important; 
        font-weight: 900 !important;
        color: #1a237e !important;
        display: block !important;
        margin-bottom: 12px !important;
        text-align: center !important;
    }

    /* --------------------------------------------------- */
    /* التكبير الجذري للرسومات الهندسية (SVG) وحل مشكلة البهتان */
    /* --------------------------------------------------- */
    .pdf-q-text div[style*="display: flex"],
    .pdf-q-text div[style*="display:flex"] {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-around !important;
        align-items: stretch !important;
        width: 100% !important;
        margin: 35px auto !important;
        overflow: visible !important;
    }

    .pdf-q-text div[style*="display: flex"] > div {
        width: 48% !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
    }

    /* أبعاد إطار الرسمة الكبير */
    .pdf-q-text svg,
    .pdf-graphic svg {
        width: 100% !important;
        height: 280px !important;
        min-height: 240px !important;
        display: block !important;
        margin: 15px auto !important;
        overflow: visible !important;
    }

    /* جعل الحبال سوداء داكنة جداً وعريضة */
    .pdf-q-text svg line,
    .pdf-graphic svg line {
        stroke: #000000 !important; 
        stroke-width: 6px !important;  
        opacity: 1 !important;         
    }

    /* جعل الكتل واضحة ومكبرة ومصبوبة بالأسود */
    .pdf-q-text svg rect,
    .pdf-graphic svg rect {
        fill: #000000 !important;   
        stroke: #000000 !important;
        stroke-width: 2px !important;
        transform: scale(1.7) !important; 
        transform-origin: center !important;
        opacity: 1 !important;
    }

    /* إبراز البكرة وتكبير قطرها */
    .pdf-q-text svg circle,
    .pdf-graphic svg circle {
        stroke: #000000 !important; 
        stroke-width: 4px !important;
        fill: #cccccc !important;   
        r: 13px !important;         
        opacity: 1 !important;
    }

    /* تكبير النصوص المكتوبة برمجياً بداخل الرسمة بدقة فائقة */
    .pdf-q-text svg text,
    .pdf-graphic svg text {
        font-size: 18px !important; 
        font-weight: 900 !important;
        fill: #000000 !important;   
    }

    /* --------------------------------------------------- */
    /* تنسيق وتكبير كتل الشرح والناتج النهائي              */
    /* --------------------------------------------------- */
    .pdf-sol-steps,
    .pdf-sol-steps *,
    .pdf-sol-steps p,
    .pdf-sol-steps span,
    .pdf-sol-steps div,
    .pdf-sol-steps li,
    .pdf-sol-steps h4 {
        font-size: 42px !important;
        line-height: 1.8 !important;
    }

    .pdf-final-ans {
        font-size: 44px !important;
        font-weight: bold !important;
        padding: 15px 35px !important;
        background-color: #e8f5e9 !important;
        border: 3px solid #4caf50 !important;
        border-radius: 12px !important;
        display: inline-block !important;
    }
}    </style>

<script>

function generatePDF() {
    // إنشاء الحاوية
    const element = document.createElement('div');
    element.style.padding = "20mm";
    element.style.direction = "rtl";
    element.style.fontFamily = "Arial, sans-serif";
    element.style.backgroundColor = "white"; // لضمان عدم الشفافية

    // 1. بناء المحتوى (الغلاف والمسائل)
    element.innerHTML = `
        <div style="text-align:center; padding-top: 50px; min-height: 250mm;">
            <h1 style="color: #1a237e;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>
            <h2 style="font-size: 24px;">الميكانيكا - تمارين الكتاب (6-B)</h2>
        </div>
        <div style="page-break-after: always;"></div>
    `;

    myQuestionsData.forEach((q, i) => {
        if (q.id === 0) return;
        const page = document.createElement('div');
        page.style.cssText = "page-break-inside: avoid; margin-bottom: 20px; padding: 10px; border: 1px solid #eee;";
        page.innerHTML = `
            <h2 style="color:#1a237e;">مسألة ${i}</h2>
            <div>${q.content}</div>
            <div style="margin:10px 0;">${q.svgCode || ''}</div>
            <div style="background:#f9f9f9; padding:10px;">${q.sol}</div>
            <p style="color:red; font-weight:bold;">الناتج: ${q.ans}</p>
        `;
        element.appendChild(page);
    });

    // 2. استخدام setTimeout لإعطاء المتصفح فرصة لبناء العناصر
    setTimeout(() => {
        const opt = {
            margin: 10,
            filename: 'تمارين_6B.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            const blob = pdf.output('bloburl');
            window.open(blob, '_blank');
        });
    }, 1000); // تأخير لمدة ثانية واحدة لضمان اكتمال بناء الصفحة
}
//end pdf
    let idx = 0;
    let choice = "";

    function show() {
        if (typeof myQuestionsData === 'undefined') {
            document.getElementById('content').innerHTML = "<p style='color:red'>خطأ: لم يتم العثور على ملف proplem-js.js</p>";
            return;
        }
        const q = myQuestionsData[idx];
        document.getElementById('title').innerText = q.title;
        document.getElementById('content').innerHTML = q.content;
        document.getElementById('options').innerHTML = q.options.map(o => `<button class="opt-btn" onclick="sel(this, '${o}')">${o}</button>`).join('');
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('sol').style.display = 'none';
        choice = "";
    }

    function sel(btn, v) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        choice = v;
        document.getElementById('checkBtn').style.display = 'block';
    }

    function verify() {
        if(choice === myQuestionsData[idx].ans) {
            document.getElementById('sol').innerHTML = myQuestionsData[idx].sol;
            document.getElementById('sol').style.display = 'block';
        } else { alert("حاول مرة أخرى!"); }
    }

    function move(s) {
        if(idx + s >= 0 && idx + s < myQuestionsData.length) {
            idx += s;
            show();
        }
    }

    window.onload = show;


function generatePDF() {
    const printableDoc = document.getElementById('dynamic-pdf-questions-area');

    if (!printableDoc) {
        alert("خطأ: لم يتم العثور على الحاوية 'dynamic-pdf-questions-area'!");
        return;
    }

    // تنظيف الحاوية لمنع تكرار البيانات القديمة
    printableDoc.innerHTML = '';

    // إظهار الحاوية مؤقتاً في الخلفية لإتاحة رندرة المتصفح لها
    printableDoc.style.setProperty('display', 'block', 'important');

    // ===== 1. بناء صفحة الغلاف المتوافقة =====
    const coverPage = document.createElement('div');
    coverPage.className = 'pdf-cover-page';
    coverPage.style.cssText = `
        page-break-after: always;
        break-after: page;
        padding: 20mm 10mm;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        direction: rtl;
        box-sizing: border-box;
    `;
    coverPage.innerHTML = `
        <div class="school-name" style="font-size: 38px; color: #1a237e; margin-bottom: 25px; font-weight: bold;">مدرسة أمجاد أفريقيا للتعليم الخاص</div>
        <div class="main-title" style="font-size: 64px; font-weight: 800; color: #0f172a; margin-bottom: 20px;">ميكانيكا الشهادة الثانوية</div>
        <div class="sub-title" style="font-size: 42px; font-weight: 600; color: #334155; margin-bottom: 30px;">تمارين الباب السادس - (6-B) حفظ الطاقة</div>
        <div class="cover-frame" style="border: 4px solid #1a237e; border-radius: 15px; padding: 30px; margin: 30px 0; background: #f8fafc;">
            <h3 style="font-size: 48px; color: #1e293b; margin: 0; font-weight: bold;">📝 كراسة الحلول النموذجية 📝</h3>
            <div style="font-size: 32px; color: #ddae11; font-weight: bold; margin-top: 10px;">حلول تمارين الكتاب المدرسي بالتفصيل</div>
            <div style="font-size: 36px; font-weight: 700; color: #0f172a; margin-top: 20px;">العام الدراسي 2025 - 2026</div>
        </div>
        <div style="font-size: 38px; color: #4caf50; margin: 25px 0; font-weight: bold;">✨ إهداء إلى طلبتنا المتميزين ✨</div>
    `;
    printableDoc.appendChild(coverPage);

    // ===== 2. بناء صفحات الأسئلة والحلول بالتتابع =====
    myQuestionsData.forEach((q, index) => {
        if (q.id === 0 || !q.content) return;

        const questionPage = document.createElement('div');
        questionPage.className = 'pdf-question-page-wrapper';
        questionPage.style.cssText = `
            page-break-inside: avoid !important;
            break-inside: avoid !important;
            page-break-after: always !important;
            break-after: page !important;
            padding: 8mm 4mm; 
            box-sizing: border-box;
            direction: rtl;
            display: block;
            width: 100%;
        `;

        questionPage.innerHTML = `
            <div class="pdf-q-title" style="font-size: 54px; font-weight: bold; color: #1a237e; margin-bottom: 15px; text-align: right; border-bottom: 4px solid #1a237e; padding-bottom: 10px;">مسألة رقم ${index}</div>
            <div class="pdf-q-text">
                ${q.content}
            </div>
            
            <div class="pdf-solution-box" style="margin-top: 35px; padding: 20px; background: #f9f9f9; border-right: 8px solid #4caf50; border-radius: 12px; text-align: right;">
                <div style="font-weight: bold; color: #1a237e; margin-bottom: 12px; font-size: 48px;">🛠️ الشرح والحل التفصيلي:</div>
                <div class="pdf-sol-steps">
                    ${q.sol}
                </div>
                <div class="pdf-final-ans">
                    🎯 الناتج النهائي: ${q.ans}
                </div>
            </div>
        `;

        printableDoc.appendChild(questionPage);
    });

    // ===== 3. بناء صفحة الخاتمة المخصصة =====
    const footerPage = document.createElement('div');
    footerPage.style.cssText = `
        page-break-before: always;
        break-before: page;
        padding: 20mm 10mm;
        text-align: center;
        direction: rtl;
        width: 100%;
        box-sizing: border-box;
    `;
    footerPage.innerHTML = `
        <div style="font-size: 40px; font-weight: bold; color: #1a237e; margin-bottom: 25px;">تم بحمد الله وتوفيقه</div>
        <div style="font-size: 28px; color: #475569; line-height: 1.8;">
            هذه المراجعة وحلول التمارين تم تنسيقها وإعدادها لتناسب أجهزة النقال وتسهيل القراءة والمراجعة لطلبتنا الأعزاء بمدرسة أمجاد أفريقيا.
        </div>
        <div style="font-size: 34px; font-weight: bold; color: #4caf50; margin-top: 50px;">نتمنى لجميع الطلبة التوفيق والتميز الباهر ⚡</div>
    `;
    printableDoc.appendChild(footerPage);

    // ===== 4. إطلاق أمر الطباعة الآمن =====
    setTimeout(() => {
        try {
            window.print();
        } catch (e) {
            console.error("فشل استدعاء نافذة الطباعة: ", e);
        } finally {
            // المعالجة الفورية: إخفاء كراسة الـ PDF لإنقاصها ومنع تجميد شاشة النقال
            printableDoc.style.setProperty('display', 'none', 'important');
        }
    }, 1200);
}
    //function dropbox تأكدي من استبدال هذا الرابط برابط ملف النقال (الخط الكبير) بعد رفعه على دروب بوكس



function triggerMobilePrintView() {
    // تأكدي من استبدال هذا الرابط برابط ملف النقال (الخط الكبير) بعد رفعه على دروب بوكس
    const mobilePdfUrl = "https://www.dropbox.com/scl/fi/kk23bkyfefjj6zigfv8nx/6.pdf?rlkey=5fgw2kuuhnar15r1hk58lfevy&st=28pz949i&dl=0";

    // التحقق مما إذا كان الطالب يفتح البرنامج من داخل تطبيق تيليجرام (Telegram WebApp)
    if (window.Telegram && window.Telegram.WebApp) {
        const webApp = window.Telegram.WebApp;
        webApp.openLink(mobilePdfUrl);
    } else {
        // إذا كان يفتحه من متصفح عادي خارجي
        window.open(mobilePdfUrl, '_blank');
    }
}







</script>
