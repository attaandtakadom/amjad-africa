<body>

<div class="container">
<header>    <h1 style="margin: 0; font-size: 2.2em; font-weight: 900;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>


<div style="margin: 15px 0;">

    <div id="options"></div>
    <button id="checkBtn" class="check-btn" onclick="verify()">تحقق من الإجابة</button>
    <div id="sol" class="sol-area"></div>
    
    <div class="nav-footer">
        <button class="nav-btn" onclick="move(-1)">السابق</button>

</div>
<div id="dynamic-pdf-questions-area" style="display: none;"></div>
<button onclick="generatePDF()" style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:10px; cursor:pointer;">طباعة جميع المسائل PDF</button>
<script src="problemData6.js"></script>

<script>

function generatePDF() {
    // إنشاء الحاوية
    const element = document.createElement('div');
    element.style.padding = "20mm";
    element.style.direction = "rtl";
    element.style.fontFamily = "Arial, sans-serif";
    element.style.backgroundColor = "white"; // لضمان عدم الشفافية

    // 1. بناء المحتوى (الغلاف والمسائل)
    element.innerHTML = `
        <div style="text-align:center; padding-top: 50px; min-height: 250mm;">
            <h1 style="color: #1a237e;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>
            <h2 style="font-size: 24px;">الميكانيكا - تمارين الكتاب (6-B)</h2>
        </div>
        <div style="page-break-after: always;"></div>
    `;

    myQuestionsData.forEach((q, i) => {
        if (q.id === 0) return;
        const page = document.createElement('div');
        page.style.cssText = "page-break-inside: avoid; margin-bottom: 20px; padding: 10px; border: 1px solid #eee;";
        page.innerHTML = `
            <h2 style="color:#1a237e;">مسألة ${i}</h2>
            <div>${q.content}</div>
            <div style="margin:10px 0;">${q.svgCode || ''}</div>
            <div style="background:#f9f9f9; padding:10px;">${q.sol}</div>
            <p style="color:red; font-weight:bold;">الناتج: ${q.ans}</p>
        `;
        element.appendChild(page);
    });

    // 2. استخدام setTimeout لإعطاء المتصفح فرصة لبناء العناصر
    setTimeout(() => {
        const opt = {
            margin: 10,
            filename: 'تمارين_6B.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            const blob = pdf.output('bloburl');
            window.open(blob, '_blank');
        });
    }, 1000); // تأخير لمدة ثانية واحدة لضمان اكتمال بناء الصفحة
}
//end pdf
    let idx = 0;
    let choice = "";

    function show() {
        if (typeof myQuestionsData === 'undefined') {
            document.getElementById('content').innerHTML = "<p style='color:red'>خطأ: لم يتم العثور على ملف proplem-js.js</p>";
            return;
        }
        const q = myQuestionsData[idx];
        document.getElementById('title').innerText = q.title;
        document.getElementById('content').innerHTML = q.content;
        document.getElementById('options').innerHTML = q.options.map(o => `<button class="opt-btn" onclick="sel(this, '${o}')">${o}</button>`).join('');
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('sol').style.display = 'none';
        choice = "";
    }

    function sel(btn, v) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        choice = v;
        document.getElementById('checkBtn').style.display = 'block';
    }

    function verify() {
        if(choice === myQuestionsData[idx].ans) {
            document.getElementById('sol').innerHTML = myQuestionsData[idx].sol;
            document.getElementById('sol').style.display = 'block';
        } else { alert("حاول مرة أخرى!"); }
    }

    function move(s) {
        if(idx + s >= 0 && idx + s < myQuestionsData.length) {
            idx += s;
            show();
        }
    }

    window.onload = show;


function generatePDF() {
    const element = document.createElement('div');
    element.style.cssText = `
        padding: 0 !important;
        margin: 0 !important;
        direction: rtl;
        font-family: Arial, sans-serif;
        background-color: white;
    `;

    // الغلاف
    element.innerHTML = `
        <div style="text-align:center; padding: 50px 0; page-break-after: always;">
            <h1 style="margin: 0; padding: 0;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>
            <h2 style="margin: 10px 0 0 0; padding: 0;">الميكانيكا - تمارين الكتاب (6-B)</h2>
        </div>
    `;

    // إضافة المسائل بدون أي هوامش أو مسافات
    myQuestionsData.forEach((q, i) => {
        if (q.id === 0) return;
        
        const page = document.createElement('div');
        page.style.cssText = `
            page-break-after: always;
            margin: 0 !important;
            padding: 15px 0 !important;
            border: none;
        `;
        
        page.innerHTML = `
            <h2 style="margin: 0 0 5px 0; padding: 0; color:#1a237e;">مسألة ${i}</h2>
            <div style="margin: 0; padding: 0;">${q.content}</div>
            <div style="margin: 5px 0; padding: 0;">${q.svgCode || ''}</div>
            <div style="margin: 5px 0; padding: 8px; background:#f9f9f9;">${q.sol}</div>
            <p style="margin: 0; padding: 5px 0; color:red; font-weight:bold;">الناتج: ${q.ans}</p>
        `;
        
        element.appendChild(page);
    });

    // خيارات PDF مضبوطة لإزالة الهوامش
    const opt = {
        margin: [0, 0, 0, 0],  // إزالة الهوامش تماماً
        filename: 'تمارين_6B.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, letterRendering: true, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true }
    };

    html2pdf().set(opt).from(element).save();
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
