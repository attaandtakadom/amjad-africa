    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; padding: 20px; }

                header { background-color: #1a237e; color: white; padding: 30px 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-bottom: 5px solid #ffa000; }

        .nav-btn { padding: 10px 25px; background: #34495e; color: white; border: none; border-radius: 8px; cursor: pointer;margin-right: 10px; }


header { background-color: #1a237e; color: white; padding: 30px 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-bottom: 5px solid #ffa000; }
        .nav-btn { background-color: #ddae11; color: #1a237e; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; text-decoration: none; display: inline-block; }
        .nav-btn-green { background-color: #4caf50; color: white; }
        #questions-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .question-card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 8px solid #1a237e; }
        #backToTopBtn { display: none; position: fixed; bottom: 20px; left: 20px; background: #1a237e; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 20px; width: 55px; height: 55px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    
@media print {
    body * { visibility: hidden; }
    #dynamic-pdf-questions-area, #dynamic-pdf-questions-area * { visibility: visible; }
    #dynamic-pdf-questions-area { position: absolute; left: 0; top: 0; width: 100%; }
    .pdf-question-block { page-break-after: always; padding: 20px; }
    .pdf-graphic svg { max-width: 300px; height: auto; }
}

@media print {
    /* إخفاء الهيدر والفوتتر والهوامش الافتراضية للمتصفح */
    @page {
        margin: 0;
    }
    body {
        margin: 0;
        padding: 0;
    }
    
    /* إزالة المسافات البيضاء من العناصر الرئيسية */
    .pdf-question-block {
        margin-bottom: 0 !important;
        padding: 10px 0 !important;
        page-break-inside: avoid;
    }
    
    /* إزالة المسافات العلوية والسفلية من العناصر */
    h1, h2, h3, h4, p, div {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 2px !important;
    }
    
    /* تقليل المسافات بين الأسطر */
    .pdf-solution-box, .pdf-sol-steps {
        line-height: 1.2 !important;
    }
    
    /* إزالة الهوامش الداخلية */
    .pdf-question-block * {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
    }
    
    /* إزالة المسافات من الحاوية الرئيسية */
    #dynamic-pdf-questions-area {
        padding: 0 !important;
        margin: 0 !important;
    }
}

@media print {
    /* 1. إخفاء واجهة الموقع بالكامل */
    body * {
        visibility: hidden;
    }
    
    /* 2. إظهار حاوية الأسئلة فقط */
    #dynamic-pdf-questions-area, 
    #dynamic-pdf-questions-area * {
        visibility: visible;
        display: block !important;
    }

    /* 3. إحكام الحاوية وإلغاء أي هوامش عشوائية */
    #dynamic-pdf-questions-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    /* 4. إجبار المتصفح على كسر الصفحات بشكل صحيح */
    .pdf-question-page-wrapper {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: always !important;
        break-after: page !important;
    }

    /* 5. التحكم بالرسومات التوضيحية */
    .pdf-graphic svg {
        max-width: 100% !important;

    }

<div style="margin: 15px 0;">

<div style="display: flex; justify-content: center; flex-wrap: wrap;">

</header>


    <h1 id="title">تمارين الباب السادس</h1>
    <hr>
    <div id="content"></div>
    <div id="options"></div>
    <button id="checkBtn" class="check-btn" onclick="verify()">تحقق من الإجابة</button>
    <div id="sol" class="sol-area"></div>

        <button class="nav-btn" onclick="move(-1)">السابق</button>

<div id="dynamic-pdf-questions-area" style="display: none;"></div>
<button onclick="generatePDF()" style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:10px; cursor:pointer;">طباعة جميع المسائل PDF</button>
<script src="problemData6.js"></script>

<script>

function generatePDF() {
    // إنشاء الحاوية
    const element = document.createElement('div');
    element.style.padding = "20mm";
    element.style.direction = "rtl";
    element.style.fontFamily = "Arial, sans-serif";
    element.style.backgroundColor = "white"; // لضمان عدم الشفافية

    // 1. بناء المحتوى (الغلاف والمسائل)
    element.innerHTML = `
        <div style="text-align:center; padding-top: 50px; min-height: 250mm;">
            <h1 style="color: #1a237e;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>
            <h2 style="font-size: 24px;">الميكانيكا - تمارين الكتاب (6-B)</h2>
        </div>
        <div style="page-break-after: always;"></div>
    `;

    myQuestionsData.forEach((q, i) => {
        if (q.id === 0) return;
        const page = document.createElement('div');
        page.style.cssText = "page-break-inside: avoid; margin-bottom: 20px; padding: 10px; border: 1px solid #eee;";
        page.innerHTML = `
            <h2 style="color:#1a237e;">مسألة ${i}</h2>
            <div>${q.content}</div>
            <div style="margin:10px 0;">${q.svgCode || ''}</div>
            <div style="background:#f9f9f9; padding:10px;">${q.sol}</div>
            <p style="color:red; font-weight:bold;">الناتج: ${q.ans}</p>
        `;
        element.appendChild(page);
    });

    // 2. استخدام setTimeout لإعطاء المتصفح فرصة لبناء العناصر
    setTimeout(() => {
        const opt = {
            margin: 10,
            filename: 'تمارين_6B.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            const blob = pdf.output('bloburl');
            window.open(blob, '_blank');
        });
    }, 1000); // تأخير لمدة ثانية واحدة لضمان اكتمال بناء الصفحة
}
//end pdf
    let idx = 0;
    let choice = "";

    function show() {
        if (typeof myQuestionsData === 'undefined') {
            document.getElementById('content').innerHTML = "<p style='color:red'>خطأ: لم يتم العثور على ملف proplem-js.js</p>";
            return;
        }
        const q = myQuestionsData[idx];
        document.getElementById('title').innerText = q.title;
        document.getElementById('content').innerHTML = q.content;
        document.getElementById('options').innerHTML = q.options.map(o => `<button class="opt-btn" onclick="sel(this, '${o}')">${o}</button>`).join('');
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('sol').style.display = 'none';
        choice = "";
    }

    function sel(btn, v) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        choice = v;
        document.getElementById('checkBtn').style.display = 'block';
    }

    function verify() {
        if(choice === myQuestionsData[idx].ans) {
            document.getElementById('sol').innerHTML = myQuestionsData[idx].sol;
            document.getElementById('sol').style.display = 'block';
        } else { alert("حاول مرة أخرى!"); }
    }

    function move(s) {
        if(idx + s >= 0 && idx + s < myQuestionsData.length) {
            idx += s;
            show();
        }
    }

    window.onload = show;


function generatePDF() {
    // 1. استهداف حاوية الطباعة المخصصة وتنظيفها تماماً
    const printableDoc = document.getElementById('dynamic-pdf-questions-area');

    if (!printableDoc) {
        alert("خطأ: لم يتم العثور على الحاوية 'dynamic-pdf-questions-area' في كود HTML!");
        return;
    }

    // تنظيف الحاوية لمنع تكرار البيانات
    printableDoc.innerHTML = '';

    // ===== 2. بناء غلاف منسق ومستقل كلياً بالنقال =====
    const coverPage = document.createElement('div');
    coverPage.className = 'pdf-cover-page';
    coverPage.style.cssText = `
        page-break-after: always;
        break-after: page;
        padding: 20mm 10mm;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        direction: rtl;
        box-sizing: border-box;
    `;
    coverPage.innerHTML = `
        <div class="school-name" style="font-size: 38px; color: #1a237e; margin-bottom: 25px; font-weight: bold;">مدرسة أمجاد أفريقيا للتعليم الخاص</div>
        <div class="main-title" style="font-size: 64px; font-weight: 800; color: #0f172a; margin-bottom: 20px;">ميكانيكا الشهادة الثانوية</div>
        <div class="sub-title" style="font-size: 42px; font-weight: 600; color: #334155; margin-bottom: 30px;">تمارين الباب السادس - (6-B) حفظ الطاقة</div>
        <div class="cover-frame" style="border: 4px solid #1a237e; border-radius: 15px; padding: 30px; margin: 30px 0; background: #f8fafc;">
            <h3 style="font-size: 48px; color: #1e293b; margin: 0; font-weight: bold;">📝 كراسة الحلول النموذجية 📝</h3>
            <div style="font-size: 32px; color: #ddae11; font-weight: bold; margin-top: 10px;">حلول تمارين الكتاب المدرسي بالتفصيل</div>
            <div style="font-size: 36px; font-weight: 700; color: #0f172a; margin-top: 20px;">العام الدراسي 2025 - 2026</div>
        </div>
        <div style="font-size: 38px; color: #4caf50; margin: 25px 0; font-weight: bold;">✨ إهداء إلى طلبتنا المتميزين ✨</div>
    `;
    printableDoc.appendChild(coverPage);

    // ===== 3. بناء الأسئلة: كل سؤال في صفحة مستقلة تماماً ومملوءة بوضوح =====
    myQuestionsData.forEach((q, index) => {
        if (q.id === 0 || !q.content) return;

        // حجم خط كبير ومناسب لشاشة النقال
        let fontSize = 34;
        const textLength = q.content.length;
        if (textLength < 80) fontSize = 40;
        if (textLength > 150) fontSize = 30;

        // تجهيز وعزل كارت السؤال بصفحة منفردة
        const questionPage = document.createElement('div');
        questionPage.className = 'pdf-question-page-wrapper';
        questionPage.style.cssText = `
            page-break-inside: avoid !important;
            break-inside: avoid !important;
            page-break-after: always !important;
            break-after: page !important;
            padding: 12mm 6mm; 
            box-sizing: border-box;
            direction: rtl;
            display: block;
            width: 100%;
        `;

        questionPage.innerHTML = `
            <div class="pdf-q-title" style="font-size: ${fontSize + 6}px; font-weight: bold; color: #1a237e; margin-bottom: 15px; text-align: right; border-bottom: 3px solid #1a237e; padding-bottom: 8px;">مسألة رقم ${index}</div>
            <div class="pdf-q-text" style="font-size: ${fontSize}px; line-height: 1.6; color: #0f172a; margin-bottom: 20px; text-align: right; font-weight: 500;">
                ${q.content}
            </div>
            
            ${q.svgCode ? `
            <div class="pdf-graphic" style="text-align: center; margin: 20px 0; max-width: 100%;">
                ${q.svgCode}
            </div>` : ''}
            
            <div class="pdf-solution-box" style="margin-top: 25px; padding: 15px; background: #f9f9f9; border-right: 6px solid #4caf50; border-radius: 8px; text-align: right;">
                <div style="font-weight: bold; color: #1a237e; margin-bottom: 10px; font-size: ${fontSize + 2}px;">🛠️ الشرح والحل التفصيلي:</div>
                <div class="pdf-sol-steps" style="font-size: ${fontSize - 2}px; line-height: 1.7; color: #1e293b; margin-bottom: 15px;">
                    ${q.sol}
                </div>
                <div class="pdf-final-ans" style="font-size: ${fontSize + 2}px; font-weight: bold; color: #2e7d32; padding: 10px 25px; background-color: #e8f5e9; border: 2.5px solid #4caf50; border-radius: 10px; display: inline-block;">
                    🎯 الناتج النهائي: ${q.ans}
                </div>
            </div>
        `;

        printableDoc.appendChild(questionPage);
    });

    // ===== 4. صفحة خاتمة مخصصة مستقلة =====
    const footerPage = document.createElement('div');
    footerPage.style.cssText = `
        padding: 20mm 10mm;
        text-align: center;
        direction: rtl;
        width: 100%;
        box-sizing: border-box;
    `;
    footerPage.innerHTML = `
        <div style="font-size: 32px; font-weight: bold; color: #1a237e; margin-bottom: 20px;">تم بحمد الله وتوفيقه</div>
        <div style="font-size: 24px; color: #475569; line-height: 1.8;">
            هذه المراجعة وحلول التمارين تم تنسيقها وإعدادها لتناسب أجهزة النقال وتسهيل القراءة والمراجعة لطلبتنا الأعزاء بمدرسة أمجاد أفريقيا.
        </div>
        <div style="font-size: 28px; font-weight: bold; color: #4caf50; margin-top: 40px;">نتمنى لجميع الطلبة التوفيق والتميز الباهر ⚡</div>
    `;
    printableDoc.appendChild(footerPage);

    // مهلة للرندرة الكاملة ثم استدعاء أمر الطباعة المباشر
    setTimeout(() => {
        try {
            window.print();
        } catch (e) {
            console.error("فشل استدعاء نافذة الطباعة: ", e);
        }
    }, 1200);


}

function triggerMobilePrintView() {
    // تأكدي من استبدال هذا الرابط برابط ملف النقال (الخط الكبير) بعد رفعه على دروب بوكس
    const mobilePdfUrl = "https://www.dropbox.com/scl/fi/kk23bkyfefjj6zigfv8nx/6.pdf?rlkey=5fgw2kuuhnar15r1hk58lfevy&st=28pz949i&dl=0";

    // التحقق مما إذا كان الطالب يفتح البرنامج من داخل تطبيق تيليجرام (Telegram WebApp)
    if (window.Telegram && window.Telegram.WebApp) {
        const webApp = window.Telegram.WebApp;
        webApp.openLink(mobilePdfUrl);
    } else {
        // إذا كان يفتحه من متصفح عادي خارجي
        window.open(mobilePdfUrl, '_blank');
    }
}







</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
