<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تمارين الباب السادس - 6 ب</title>

<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; padding: 20px; }
.container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
h1 { color: #061b30; text-align: center; border-bottom: 3px solid #2ecc71; padding-bottom: 10px; }
.opt-btn { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #3498db; background: white; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
.selected { background: #3498db !important; color: white; }
.check-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; display: none; font-size: 18px; }
.sol-area { margin-top: 20px; padding: 20px; background: #f9f9f9; border-right: 6px solid #27ae60; display: none; text-align: right; }
.nav-footer { display: flex; justify-content: space-between; margin-top: 30px; flex-wrap: wrap; gap: 10px; }
header { background-color: #1a237e; color: white; padding: 30px 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-bottom: 5px solid #ffa000; }
.nav-btn { background-color: #ddae11; color: #1a237e; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; text-decoration: none; display: inline-block; }
.nav-btn-green { background-color: #4caf50; color: white; }
</style>

</head>

<body>

<!-- المحتوى الرئيسي -->
<div class="container" id="mainApp">

<header> 
    <h1 style="margin: 0; font-size: 2.2em; font-weight: 900;">مدرسة أمجاد أفريقيا للتعليم الخاص</h1>
    <div style="margin: 15px 0;">
        <center> <span style="font-size: 1.8em; font-weight: 900; color: #ffca28; text-decoration: underline;"> تمارين (6-B) حفظ الطاقة</span></center>
    </div>
    <div style="display: flex; justify-content: center; flex-wrap: wrap;">
        <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
        <a href="index3.html" class="nav-btn">📘 تمارين 6-A</a>
        <button class="nav-btn nav-btn-green" onclick="generatePDF()">📥 تحميل PDF</button>
    </div>
</header>

<h1 id="title">تمارين الباب السادس</h1>
<hr>
<div id="content"></div>
<div id="options"></div>
<button id="checkBtn" class="check-btn" onclick="verify()">تحقق من الإجابة</button>
<div id="sol" class="sol-area"></div>

<div class="nav-footer">
    <button class="nav-btn" onclick="move(-1)">السابق</button>
    <button class="nav-btn" onclick="move(1)">التالي</button>
    <button class="nav-btn nav-btn-green" onclick="generatePDF()">📥 تحميل PDF</button>
</div>

</div>

<script src="problemData6.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// ===== الوظائف الأساسية =====
let idx = 0;
let choice = "";

function show() {
    if (typeof myQuestionsData === 'undefined') {
        document.getElementById('content').innerHTML = "<p style='color:red'>خطأ: لم يتم العثور على ملف problemData6.js</p>";
        return;
    }
    const q = myQuestionsData[idx];
    if (!q) return;
    document.getElementById('title').innerText = q.title || 'تمارين الباب السادس';
    document.getElementById('content').innerHTML = q.content || '';
    document.getElementById('options').innerHTML = q.options ? q.options.map(o => `<button class="opt-btn" onclick="sel(this, '${o}')">${o}</button>`).join('') : '';
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('sol').style.display = 'none';
    choice = "";
}

function sel(btn, v) {
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    choice = v;
    document.getElementById('checkBtn').style.display = 'block';
}

function verify() {
    if (!myQuestionsData || !myQuestionsData[idx]) return;
    if(choice === myQuestionsData[idx].ans) {
        document.getElementById('sol').innerHTML = myQuestionsData[idx].sol || 'الحل غير متوفر';
        document.getElementById('sol').style.display = 'block';
    } else { 
        alert("حاول مرة أخرى!"); 
    }
}

function move(s) {
    if(!myQuestionsData) return;
    if(idx + s >= 0 && idx + s < myQuestionsData.length) {
        idx += s;
        show();
    }
}

window.onload = show;

// ===== دالة إنشاء PDF باستخدام jsPDF =====
function generatePDF() {
    if (typeof myQuestionsData === 'undefined' || !myQuestionsData || myQuestionsData.length === 0) {
        alert('خطأ: لا توجد بيانات للتمارين');
        return;
    }

    // إظهار رسالة انتظار
    const loadingMsg = document.createElement('div');
    loadingMsg.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:30px 50px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:9999; font-size:24px; text-align:center;';
    loadingMsg.innerHTML = '⏳ جاري إنشاء PDF...<br><span style="font-size:18px; color:#666;">يرجى الانتظار</span>';
    document.body.appendChild(loadingMsg);

    // استخدام setTimeout لتجنب تجميد المتصفح
    setTimeout(() => {
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;
            const margin = 20;
            const maxWidth = pageWidth - (margin * 2);
            let y = margin;
            let pageNum = 1;

            // دالة لإضافة صفحة جديدة
            function addNewPage() {
                pdf.addPage();
                y = margin;
                pageNum++;
            }

            // دالة لكتابة نص مع التفاف تلقائي
            function writeText(text, fontSize, isBold = false, color = '#000000') {
                if (!text) return;
                
                pdf.setFontSize(fontSize);
                pdf.setTextColor(color);
                if (isBold) {
                    pdf.setFont('helvetica', 'bold');
                } else {
                    pdf.setFont('helvetica', 'normal');
                }
                
                // تقسيم النص إلى سطور
                const lines = pdf.splitTextToSize(text, maxWidth);
                
                for (let line of lines) {
                    if (y + fontSize > pageHeight - margin) {
                        addNewPage();
                    }
                    pdf.text(line, margin, y);
                    y += fontSize * 1.5;
                }
            }

            // ===== الغلاف =====
            pdf.setFontSize(28);
            pdf.setTextColor('#1a237e');
            pdf.setFont('helvetica', 'bold');
            pdf.text('مدرسة أمجاد أفريقيا', pageWidth / 2, 80, { align: 'center' });
            
            pdf.setFontSize(24);
            pdf.setTextColor('#1a237e');
            pdf.text('للتعليم الخاص', pageWidth / 2, 110, { align: 'center' });
            
            pdf.setFontSize(22);
            pdf.setTextColor('#0f172a');
            pdf.text('الميكانيكا', pageWidth / 2, 145, { align: 'center' });
            
            pdf.setFontSize(20);
            pdf.setTextColor('#334155');
            pdf.text('تمارين الباب السادس - (6-B)', pageWidth / 2, 175, { align: 'center' });
            
            pdf.setFontSize(18);
            pdf.setTextColor('#4caf50');
            pdf.text('حفظ الطاقة', pageWidth / 2, 200, { align: 'center' });
            
            pdf.setFontSize(16);
            pdf.setTextColor('#1e293b');
            pdf.text('📘 كراسة الحلول النموذجية', pageWidth / 2, 235, { align: 'center' });
            
            pdf.setFontSize(14);
            pdf.setTextColor('#ddae11');
            pdf.text('حلول تمارين الكتاب بالتفصيل', pageWidth / 2, 258, { align: 'center' });
            
            pdf.setFontSize(16);
            pdf.setTextColor('#0f172a');
            pdf.text('العام الدراسي 2025 - 2026', pageWidth / 2, 285, { align: 'center' });

            // ===== الأسئلة =====
            myQuestionsData.forEach((q, index) => {
                if (!q || q.id === 0 || !q.content) return;
                
                addNewPage();
                
                // عنوان السؤال
                pdf.setFontSize(22);
                pdf.setTextColor('#1a237e');
                pdf.setFont('helvetica', 'bold');
                pdf.text(`📌 مسألة رقم ${index}`, margin, y);
                y += 15;
                
                // محتوى السؤال
                pdf.setFontSize(18);
                pdf.setTextColor('#0f172a');
                pdf.setFont('helvetica', 'normal');
                
                // تنظيف النص من علامات HTML
                let cleanContent = q.content
                    .replace(/<br\s*\/?>/gi, '\n')
                    .replace(/<[^>]*>/g, '')
                    .replace(/&nbsp;/g, ' ');
                
                const contentLines = pdf.splitTextToSize(cleanContent, maxWidth);
                for (let line of contentLines) {
                    if (y + 18 > pageHeight - margin) {
                        addNewPage();
                        y = margin;
                    }
                    pdf.text(line, margin, y);
                    y += 18 * 1.5;
                }
                y += 10;
                
                // الحل
                if (q.sol) {
                    pdf.setFontSize(20);
                    pdf.setTextColor('#1a237e');
                    pdf.setFont('helvetica', 'bold');
                    pdf.text('🛠️ الشرح والحل التفصيلي:', margin, y);
                    y += 15;
                    
                    pdf.setFontSize(16);
                    pdf.setTextColor('#1e293b');
                    pdf.setFont('helvetica', 'normal');
                    
                    let cleanSol = q.sol
                        .replace(/<br\s*\/?>/gi, '\n')
                        .replace(/<[^>]*>/g, '')
                        .replace(/&nbsp;/g, ' ');
                    
                    const solLines = pdf.splitTextToSize(cleanSol, maxWidth);
                    for (let line of solLines) {
                        if (y + 16 > pageHeight - margin) {
                            addNewPage();
                            y = margin;
                            pdf.setFontSize(16);
                            pdf.setTextColor('#1e293b');
                            pdf.setFont('helvetica', 'normal');
                        }
                        pdf.text(line, margin, y);
                        y += 16 * 1.5;
                    }
                }
                y += 10;
                
                // الناتج النهائي
                if (q.ans) {
                    pdf.setFontSize(18);
                    pdf.setTextColor('#2e7d32');
                    pdf.setFont('helvetica', 'bold');
                    pdf.text(`🎯 الناتج النهائي: ${q.ans}`, margin, y);
                    y += 20;
                }
            });

            // ===== الخاتمة =====
            addNewPage();
            
            pdf.setFontSize(24);
            pdf.setTextColor('#1a237e');
            pdf.setFont('helvetica', 'bold');
            pdf.text('تم بحمد الله وتوفيقه', pageWidth / 2, 80, { align: 'center' });
            
            pdf.setFontSize(18);
            pdf.setTextColor('#475569');
            pdf.setFont('helvetica', 'normal');
            pdf.text('هذه المراجعة وحلول التمارين تم تنسيقها وإعدادها', pageWidth / 2, 130, { align: 'center' });
            pdf.text('لتناسب أجهزة النقال وتسهيل القراءة والمراجعة', pageWidth / 2, 155, { align: 'center' });
            pdf.text('لطلبتنا الأعزاء بمدرسة أمجاد أفريقيا.', pageWidth / 2, 180, { align: 'center' });
            
            pdf.setFontSize(20);
            pdf.setTextColor('#4caf50');
            pdf.setFont('helvetica', 'bold');
            pdf.text('نتمنى لجميع الطلبة التوفيق والتميز الباهر ⚡', pageWidth / 2, 230, { align: 'center' });

            // حفظ PDF
            pdf.save('تمارين_6B_حفظ_الطاقة.pdf');
            document.body.removeChild(loadingMsg);
            
        } catch (e) {
            console.error('خطأ:', e);
            document.body.removeChild(loadingMsg);
            alert('حدث خطأ في إنشاء PDF: ' + e.message);
        }
    }, 500);
}

</script>

</body>

</html>
