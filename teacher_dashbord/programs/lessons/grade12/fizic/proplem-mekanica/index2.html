    <div id="questions-container">
        </div>
</div>

<script src="problems_data1.js"></script>
<script src="script1.js"></script>
<button onclick="scrollToTop()" id="backToTopBtn" title="العودة للأعلى" style="
    display: none; 
    position: fixed; 
    bottom: 20px; 
    left: 20px; 
    z-index: 99; 
    border: none; 
    outline: none; 
    background-color: #1a237e; 
    color: white; 
    cursor: pointer; 
    padding: 15px; 
    border-radius: 50%; 
    font-size: 20px; 
    width: 55px; 
    height: 55px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: 0.3s;
">
    ↑
</button>

<script>
    // الحصول على الزر
    let mybutton = document.getElementById("backToTopBtn");

    // عندما يقوم الطالب بالتمرير لأسفل بمقدار 20 بكسل، يظهر الزر
    window.onscroll = function() {scrollFunction()};

    function scrollFunction() {
        if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
            mybutton.style.display = "block";
        } else {
            mybutton.style.display = "none";
        }
    }

    // وظيفة العودة للأعلى عند النقر
    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth' // صعود ناعم وليس مفاجئ
        });
    }
</script>
</body>
