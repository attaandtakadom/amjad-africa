<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">F
<title>اختبار الميكانيكا - الثالث الثانوي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root { --primary: #2c3e50; --accent: #f1c40f; --success: #266df0; --error: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma; background: #290daa; padding: 20px; }
        

.btn1-check:hover{background:linear-gradient(135deg,#e8f4f8,#d1e8f0,#09baf0);font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh;}
.container{max-width:1000px;margin:0 auto;}
.header {
    background: rgba(185, 214, 184, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 25px;
    text-align: center;
    color: #2c5f6e;
    margin-bottom: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}.header h1{font-size:1.8rem;color:gold}
.headedatar span{color:#5a9aa8;}




.stats-bar{background:#bde2a7;border-radius:60px;padding:15px 25px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:10px;z-index:100;box-shadow:0 4px 15px rgba(0,0,0,0.08);flex-wrap:wrap;gap:10px;}
.score-box,.progress-box{background:#e0f0f5;color:#2c5f6e;padding:8px 20px;border-radius:40px;font-weight:bold;}
.question-card{background:#ffffff;border-radius:24px;padding:22px;margin-bottom:20px;border-right:6px solid #9bc4d0;transition:all 0.3s ease;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.answered-correct{border-right-color:#6bb59a !important;background:#f0faf7;}
.answered-wrong{border-right-color:#d49c8a !important;background:#fef7f5;}
.question-text{font-size:1.2rem;font-weight:bold;color:#2c5f6e;margin-bottom:15px;}
.question-svg{text-align:center;margin-bottom:20px;background:#fafefe;padding:10px;border-radius:16px;border:1px solid #d4e4e8;}
.options-area{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.option{display:flex;align-items:center;gap:12px;background:#f8fbfc;padding:12px 18px;border-radius:50px;border:1px solid #d9e8ed;cursor:pointer;transition:0.2s;}
.option:hover{background:#eef4f7;}
.option.selected { background: #d9ece8; border-color: #9bc4d0; }
.tf-buttons{display:flex;gap:15px;margin-bottom:15px;}
.tf-btn{background:#eef4f7;border:2px solid #c0d6de;padding:10px 30px;border-radius:40px;cursor:pointer;text-align:center;font-weight:bold;transition:0.2s;color:#2c5f6e;}
.tf-btn.selected-true{background:#6bb59a;color:white;border-color:#6bb59a;}
.tf-btn.selected-false{background:#d49c8a;color:white;border-color:#d49c8a;}
.btn-group{display:flex;gap:12px;margin:15px 0 10px;flex-wrap:wrap;}
.btn-check{background:#7fb6c4;padding:8px 22px;border-radius:40px;color:white;border:none;cursor:pointer;font-weight:bold;transition:0.2s;}
.btn-check:hover{background:#5a9aa8;}
.btn-reset{background:#c4a48e;padding:8px 22px;border-radius:40px;color:white;border:none;cursor:pointer;font-weight:bold;transition:0.2s;}
.btn-reset:hover{background:#b08a6e;}
.feedback{margin-top:12px;padding:15px;border-radius:18px;font-weight:bold;display:none;}
.final-results{background:#d4e4e8;border-radius:40px;padding:20px;margin-top:30px;text-align:center;color:#2c5f6e;font-weight:bold;}
button:disabled { opacity: 0.5; cursor: not-allowed; }
svg{max-width:100%;height:auto;border-radius:12px;}
.tab-btn {
padding: 10px 25px;
margin: 5px;
border-radius: 25px;
border: none;
background: #caddf2;
color: #2c5f6e;
cursor: pointer;
font-weight: bold;
transition: 0.3s;
}
.tab-btn.active {
background: #11e6a6;
color: white;
box-shadow: 0 0 15px rgba(127, 182, 196, 0.4);
}
.loading {
color: #2c5f6e;
text-align: center;
padding: 50px;
font-size: 1.2rem;
}

/* أزرار التنقل */
.nav-buttons {
    position: fixed;
    left: 20px;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1000;
}

.nav-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #3bbbe2;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-btn:hover {
    transform: scale(1.1);
    background: #7fb6c4;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.nav-btn:active {
    transform: scale(0.95);
}

.scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 4px;
    background: linear-gradient(90deg, #9bc4d0, #7fb6c4);
    z-index: 1001;
    transition: width 0.3s ease;
}

.nav-btn.hide {
    opacity: 0;
    visibility: hidden;
    transform: scale(0.8);
}

.question-number {
    display: inline-block;
    background: #d9ece8;
    color: #282bdd;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    margin-left: 10px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>

<div class="nav-buttons">
    <button class="nav-btn" id="goToTop" title="الذهاب للأعلى">↑</button>
    <button class="nav-btn" id="goToBottom" title="الذهاب للأسفل">↓</button>
</div>

<div class="container">
<div class="header">
<h1>📐 اختبار الميكانيكا <span>الثالث الثانوي</span></h1>
<p style="font-size:0.9rem; margin-top:8px;"> الطاقة- الشغل - القدرة- قانون نيوتن الثاني   </p>

</div>

<div class="tabs-container" style="text-align: center; margin-bottom: 20px;">
<button class="tab-btn active">       
     <a href="../../../../../../../althanaoya/fizic/fizic-dashbord.html" >⚙️ لوحة التحكم</a>
</button>

<button class="tab-btn active" data-part="1">📘 الجزء الأول | الطاقة- الشغل</button>
<button class="tab-btn" data-part="2">📙 الجزء الثاني | قانون حفظ الطاقة</button>
<button class="tab-btn" data-part="3">📗 الجزء الثالث | القدرة</button>
</div>

<div class="stats-bar">
<div class="score-box" id="scoreDisplay">📊 النتيجة: 0</div>
<div class="progress-box" id="progressDisplay">📌 تم التحقق: 0</div>
<button id="checkAllBtn" style="background:#7fb6c4;padding:8px 22px;border-radius:40px;color:white;border:none;font-weight:bold;cursor:pointer;">✅ التحقق من الكل</button>
<button id="resetAllBtn" style="background:#c4a48e;padding:8px 22px;border-radius:40px;color:white;border:none;font-weight:bold;cursor:pointer;">🔄 إعادة ضبط الكل</button>
</div>
<div id="questionsContainer"><div class="loading">📚 جاري تحميل الأسئلة...</div></div>
<div class="final-results" id="finalResults">⭐ النتيجة النهائية: --</div>
</div>

<script>
let currentQuestions = [];
let questionsState = [];
let currentPart = 1;
let isLoading = false;

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function updateScrollProgress() {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById("scrollProgress").style.width = scrolled + "%";
    
    const topBtn = document.getElementById('goToTop');
    const bottomBtn = document.getElementById('goToBottom');
    
    if (winScroll > 200) topBtn.classList.remove('hide');
    else topBtn.classList.add('hide');
    
    if (winScroll + window.innerHeight >= document.body.scrollHeight - 100) bottomBtn.classList.add('hide');
    else bottomBtn.classList.remove('hide');
}

function renderQuestions() {
    const container = document.getElementById("questionsContainer");
    if (!currentQuestions || currentQuestions.length === 0) {
        container.innerHTML = '<div class="loading">❌ لا توجد أسئلة متاحة. تأكد من وجود ملفات الأسئلة.</div>';
        return;
    }
    
    let fullHtml = "";
    currentQuestions.forEach((q, index) => {
        let optionsHtml = "";
        if (q.type === "true-false") {
            optionsHtml = `
                <div class="tf-buttons">
                    <div class="tf-btn" data-qid="${q.id}" data-value="true">✅ صواب</div>
                    <div class="tf-btn" data-qid="${q.id}" data-value="false">❌ خطأ</div>
                </div>`;
        } else {
            optionsHtml = `<div class="options-area">`;
            if (q.options && Array.isArray(q.options)) {
                q.options.forEach(opt => {
                    optionsHtml += `
                        <label class="option" data-qid="${q.id}" data-value="${opt.replace(/'/g, "\\'")}">
                            <input type="radio" name="q${q.id}" value="${opt.replace(/'/g, "\\'")}">
                            <span>${opt}</span>
                        </label>`;
                });
            }
            optionsHtml += `</div>`;
        }
        
        fullHtml += `
            <div class="question-card" id="card-${q.id}">
                ${q.svg ? `<div class="question-svg">${q.svg}</div>` : ''}
                <div class="question-text">
                    <span class="question-number">سؤال ${q.id}</span>
                    ${q.text}
                </div>
                ${optionsHtml}
                <div class="btn-group">
                    <button class="btn-check" data-qid="${q.id}">🔎 تحقق</button>
                    <button class="btn-reset" data-qid="${q.id}">🔄 إعادة المحاولة</button>
                </div>
                <div class="feedback" id="feedback-${q.id}"></div>
            </div>`;
    });
    container.innerHTML = fullHtml;
    bindEvents();
}

function bindEvents() {
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.removeEventListener('click', tfHandler);
        btn.addEventListener('click', tfHandler);
    });
    document.querySelectorAll('.option').forEach(opt => {
        opt.removeEventListener('click', optionHandler);
        opt.addEventListener('click', optionHandler);
    });
    document.querySelectorAll('.btn-check').forEach(btn => {
        btn.removeEventListener('click', checkHandler);
        btn.addEventListener('click', checkHandler);
    });
    document.querySelectorAll('.btn-reset').forEach(btn => {
        btn.removeEventListener('click', resetHandler);
        btn.addEventListener('click', resetHandler);
    });
}

function tfHandler(e) {
    const btn = e.currentTarget;
    const qid = parseInt(btn.dataset.qid);
    const value = btn.dataset.value === 'true';
    setUserAnswer(qid, value);
}

function optionHandler(e) {
    const label = e.currentTarget;
    const qid = parseInt(label.dataset.qid);
    const input = label.querySelector('input');
    if (input) {
        input.checked = true;
        setUserAnswer(qid, input.value);
    }
}

function checkHandler(e) {
    const btn = e.currentTarget;
    const qid = parseInt(btn.dataset.qid);
    checkQuestion(qid);
}

function resetHandler(e) {
    const btn = e.currentTarget;
    const qid = parseInt(btn.dataset.qid);
    resetQuestion(qid);
}

function setUserAnswer(id, answer) {
    let idx = currentQuestions.findIndex(q => q.id === id);
    if (idx === -1) return;
    if (questionsState[idx] && questionsState[idx].checked) return;
    
    if (!questionsState[idx]) {
        questionsState[idx] = { userAnswer: null, checked: false, isCorrect: false };
    }
    questionsState[idx].userAnswer = answer;
    
    let q = currentQuestions[idx];
    if (q.type === "true-false") {
        const trueBtn = document.querySelector(`.tf-btn[data-qid="${id}"][data-value="true"]`);
        const falseBtn = document.querySelector(`.tf-btn[data-qid="${id}"][data-value="false"]`);
        if (trueBtn) trueBtn.classList.toggle('selected-true', answer === true);
        if (falseBtn) falseBtn.classList.toggle('selected-false', answer === false);
    } else {
        const labels = document.querySelectorAll(`#card-${id} .option`);
        labels.forEach(l => l.classList.remove('selected'));
        const selectedLabel = document.querySelector(`#card-${id} .option[data-value="${answer}"]`);
        if (selectedLabel) selectedLabel.classList.add('selected');
    }
}

function checkQuestion(id) {
    let idx = currentQuestions.findIndex(q => q.id === id);
    if (idx === -1) return;
    let state = questionsState[idx];
    let q = currentQuestions[idx];
    
    if (state.userAnswer === null) {
        alert("❗ الرجاء اختيار إجابة أولاً!");
        return;
    }
    if (state.checked) return;
    
    state.isCorrect = (state.userAnswer === q.correct);
    state.checked = true;
    
    const card = document.getElementById(`card-${id}`);
    if (card) {
        card.className = state.isCorrect ? "question-card answered-correct" : "question-card answered-wrong";
    }
    
    const feedback = document.getElementById(`feedback-${id}`);
    if (feedback) {
        feedback.style.display = "block";
        feedback.style.background = state.isCorrect ? "#e0f5ef" : "#fdeae5";
        feedback.innerHTML = (state.isCorrect ? "✅ صحيح! " : "❌ خطأ. ") + (q.explanation || "");
    }
    
    updateStats();
}

function resetQuestion(id) {
    let idx = currentQuestions.findIndex(q => q.id === id);
    if (idx === -1) return;
    let q = currentQuestions[idx];
    
    questionsState[idx] = { userAnswer: null, checked: false, isCorrect: false };
    
    const card = document.getElementById(`card-${id}`);
    if (card) card.className = "question-card";
    
    const feedback = document.getElementById(`feedback-${id}`);
    if (feedback) feedback.style.display = "none";
    
    if (q.type === "true-false") {
        const trueBtn = document.querySelector(`.tf-btn[data-qid="${id}"][data-value="true"]`);
        const falseBtn = document.querySelector(`.tf-btn[data-qid="${id}"][data-value="false"]`);
        if (trueBtn) trueBtn.classList.remove('selected-true');
        if (falseBtn) falseBtn.classList.remove('selected-false');
    } else {
        const radios = document.getElementsByName(`q${id}`);
        radios.forEach(r => { 
            r.checked = false; 
            if (r.parentElement) r.parentElement.classList.remove('selected');
        });
    }
    
    updateStats();
}

function updateStats() {
    let score = questionsState.filter(s => s && s.checked && s.isCorrect).length;
    let checked = questionsState.filter(s => s && s.checked).length;
    let total = currentQuestions.length;
    document.getElementById("scoreDisplay").innerText = `📊 النتيجة: ${score}/${total}`;
    document.getElementById("progressDisplay").innerText = `📌 تم التحقق: ${checked}/${total}`;
    let percent = total > 0 ? Math.round(score/total*100) : 0;
    document.getElementById("finalResults").innerHTML = `⭐ النتيجة النهائية: ${score}/${total} (${percent}%)<br>🎯 ${percent >= 70 ? 'ممتاز! 👍' : (percent >= 50 ? 'جيد، يمكنك التحسن 📚' : 'تحتاج إلى مراجعة 📖')}`;
}

function checkAll() {
    currentQuestions.forEach(q => {
        let idx = currentQuestions.findIndex(qq => qq.id === q.id);
        let state = questionsState[idx];
        if (state && state.userAnswer !== null && !state.checked) {
            checkQuestion(q.id);
        }
    });
}

function resetAll() {
    questionsState = currentQuestions.map(() => ({ userAnswer: null, checked: false, isCorrect: false }));
    renderQuestions();
    updateStats();
}

async function switchPart(partNum, btnElement) {
    if (isLoading) return;
    isLoading = true;
    currentPart = partNum;
    
    const container = document.getElementById("questionsContainer");
    container.innerHTML = '<div class="loading">📚 جاري تحميل أسئلة الميكانيكا...</div>';
    
    try {
        const oldScript = document.getElementById('dynamic-questions-script');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.id = 'dynamic-questions-script';
        script.src = `problemdata${partNum}.js?v=${Date.now()}`;
        
        await new Promise((resolve, reject) => {
            script.onload = () => {
                if (typeof physicsQuestions !== 'undefined' && physicsQuestions && physicsQuestions.length > 0) {
                    currentQuestions = [...physicsQuestions];
                    questionsState = currentQuestions.map(() => ({ userAnswer: null, checked: false, isCorrect: false }));
                    renderQuestions();
                    updateStats();
                    resolve();
                } else {
                    reject(new Error('لم يتم العثور على أسئلة في الملف'));
                }
            };
            script.onerror = () => reject(new Error(`فشل تحميل problemdata${partNum}.js`));
            document.head.appendChild(script);
        });
        
        scrollToTop();
        
    } catch (error) {
        console.error('خطأ:', error);
        container.innerHTML = `<div class="loading" style="color:#c46a5a;">
            ❌ خطأ: ${error.message}<br>
            تأكد من وجود ملف problemdata${partNum}.js في نفس المجلد
        </div>`;
    } finally {
        isLoading = false;
    }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const partNum = parseInt(btn.dataset.part);
        if (partNum === currentPart || isLoading) return;
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchPart(partNum, btn);
    });
});

document.getElementById("goToTop").onclick = scrollToTop;
document.getElementById("goToBottom").onclick = scrollToBottom;
window.addEventListener('scroll', updateScrollProgress);
window.addEventListener('resize', updateScrollProgress);

document.getElementById("checkAllBtn").onclick = checkAll;
document.getElementById("resetAllBtn").onclick = resetAll;

window.physicsQuestions = window.physicsQuestions || [];
document.getElementById('goToTop').classList.add('hide');

switchPart(1);
</script>

<script>
window.addEventListener('load', function() {
    setTimeout(function() {
        if (currentQuestions.length === 0 && !isLoading) {
            console.log('إنشاء أسئلة تجريبية للميكانيكا...');
            currentQuestions = [
                { id: 1, type: "mcq", text: "إذا تحرك جسم بسرعة ثابتة مقدارها 10 م/ث لمدة 5 ثوانٍ، فإن المسافة المقطوعة تساوي:", options: ["2 متر", "5 متر", "15 متر", "50 متر"], correct: "50 متر", explanation: "المسافة = السرعة × الزمن = 10 × 5 = 50 متر" },
                { id: 2, type: "mcq", text: "قانون نيوتن الثاني ينص على أن:", options: ["القوة = الكتلة × التسارع", "الفعل رد فعل", "الجسم الساكن يبقى ساكناً", "العزم = القوة × الذراع"], correct: "القوة = الكتلة × التسارع", explanation: "قانون نيوتن الثاني: F = m × a" },
                { id: 3, type: "true-false", text: "الجسم الذي يتحرك بسرعة منتظمة يكون تسارعه صفراً.", correct: true, explanation: "السرعة المنتظمة تعني عدم وجود تغير في السرعة، وبالتالي التسارع يساوي صفراً." },
                { id: 4, type: "mcq", text: "وحدة قياس العزم في النظام الدولي هي:", options: ["نيوتن", "جول", "نيوتن.متر", "كجم.م/ث²"], correct: "نيوتن.متر", explanation: "العزم = القوة × ذراع القوة، ووحدته نيوتن.متر" },
                { id: 5, type: "true-false", text: "مبدأ حفظ كمية التحرك ينطبق على النظام المعزول.", correct: true, explanation: "في النظام المعزول (الذي لا تؤثر عليه قوى خارجية)، تبقى كمية التحرك محفوظة." },
                { id: 6, type: "mcq", text: "إذا كانت كتلة جسم 2 كجم وتسارعه 3 م/ث²، فإن القوة المؤثرة عليه تساوي:", options: ["1.5 نيوتن", "5 نيوتن", "6 نيوتن", "8 نيوتن"], correct: "6 نيوتن", explanation: "القوة = الكتلة × التسارع = 2 × 3 = 6 نيوتن" }
            ];
            questionsState = currentQuestions.map(() => ({ userAnswer: null, checked: false, isCorrect: false }));
            renderQuestions();
            updateStats();
        }
    }, 1000);
});
</script>

</body>
</html>
