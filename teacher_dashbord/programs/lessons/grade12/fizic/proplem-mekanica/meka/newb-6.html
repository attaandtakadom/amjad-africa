        .app-container { max-width: 850px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #0f172a; color: white; padding: 20px; text-align: center; }
        .question-area { padding: 25px; }
        .options-area { padding: 0 25px; }
        .opt-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #2563eb; background: white; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; }
        .opt-btn.selected { background: #2563eb; color: white; }
        .check-btn { width: 90%; margin: 20px auto; display: block; padding: 12px; background: #16a34a; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }

        #pdf-print-area { display: none; }
        
        @media print {
            body * { display: none; }
            #pdf-print-area, #pdf-print-area * { display: block; }
            #pdf-print-area {
                display: block !important;
                width: 100%;
                padding: 0;
                margin: 0;
                background: white;
                direction: rtl;
            }
            .pdf-page {
                page-break-after: always;
                padding: 15px;
            }
            .pdf-two-columns {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .pdf-question {
                border: 1px solid #cbd5e1;
                padding: 12px;
                border-radius: 10px;
                page-break-inside: avoid;
                background: white;
            }
            .pdf-title {
                color: #2563eb;
                font-size: 16px;
                font-weight: bold;
                margin-bottom: 8px;
                border-bottom: 1px solid #e2e8f0;
                padding-bottom: 5px;
            }
            .pdf-content {
                font-size: 13px;
                line-height: 1.5;
                color: #334155;
            }
            .pdf-graphic {
                text-align: center;
                margin: 10px 0;
            }
            .pdf-solution {
                background: #f8fafc;
                padding: 10px;
                margin-top: 10px;
                border-right: 3px solid #16a34a;
                border-radius: 0 6px 6px 0;
                font-size: 12px;
                line-height: 1.6;
            }
            .pdf-answer {
                color: #dc2626;
                font-weight: bold;
                margin-top: 8px;
                font-size: 13px;
            }
            .pdf-cover {
                text-align: center;
                padding: 40px 20px;
                page-break-after: always;
            }
            .pdf-cover h1 { color: #0f172a; font-size: 28px; margin: 20px 0; }
            .pdf-cover h2 { font-size: 22px; margin: 15px 0; }
            svg { max-width: 100%; height: auto; }

</head>

// فلترة الأسئلة (نتخطى id=0)
const questions = myQuestionsData.filter(q => q.id !== 0);
let currentIndex = 0;
let selectedChoice = "";

function displayQuestion() {
    const q = questions[currentIndex];
    document.getElementById('content').innerHTML = q.content + (q.svgCode ? `<div style="text-align:center; margin-top:15px;">${q.svgCode}</div>` : '');
    document.getElementById('options').innerHTML = q.options.map(o => `<button class="opt-btn" onclick="selectOption(this, '${o}')">${o}</button>`).join('');
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('sol').style.display = 'none';
    selectedChoice = "";
}

function selectOption(btn, value) {
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedChoice = value;
    document.getElementById('checkBtn').style.display = 'block';
}

function verify() {
    if(selectedChoice === questions[currentIndex].ans) {
        document.getElementById('sol').innerHTML = questions[currentIndex].sol;
        document.getElementById('sol').style.display = 'block';
    } else { alert("❌ حاول مرة أخرى!"); }
}

function move(direction) {
    if(currentIndex + direction >= 0 && currentIndex + direction < questions.length) {
        currentIndex += direction;
        displayQuestion();
    }
}
