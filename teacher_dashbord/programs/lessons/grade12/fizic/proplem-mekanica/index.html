// عرض المسائل
const container = document.getElementById('container');
problems.forEach(p => {
    const card = document.createElement('div');
    card.className = 'problem-card';
    card.innerHTML = `
        <h3>مسألة رقم (${p.id})</h3>
        <p><strong>النص:</strong> ${p.text}</p>
        <div class="problem-layout">
            <div class="givens">
                <h4>المعطيات:</h4>
                ${p.givensHTML}
            </div>
            <div class="diagram">${drawSVG(p.type)}</div>
        </div>
        <div class="solution">
            <h4>الحل بالتفصيل:</h4>
            ${p.solutionHTML}
        </div>
    `;
    container.appendChild(card);
});
function displayQuestion(question) {
    let html = `<div class="question-box">
        <p>${question.text}</p>`;
    
    // هذا الجزء هو المسؤول عن إظهار الخيارات كأزرار راديو
    if (question.options) {
        html += `<div class="options-container">`;
        question.options.forEach((opt, index) => {
            html += `
                <label class="option-label">
                    <input type="radio" name="q${question.id}" value="${opt}">
                    ${opt}
                </label><br>
            `;
        });
        html += `</div>`;
    }

    // زر التحقق من الإجابة
    html += `<button onclick="checkAnswer('${question.id}')" class="check-btn">تحقق من الإجابة</button>`;
    
    // جزء الحل المخفي
    html += `${question.solutionHTML}</div>`;
    
    return html;
}
