<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار الحث الكهرومغناطيسي - الثالث الثانوي (متكامل)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Roboto', sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 25px 35px;
        }
        h1 {
            font-size: 1.9rem;
            text-align: center;
            color: #0b3b5f;
            border-bottom: 3px solid #3b82f6;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding-bottom: 8px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .section {
            background: #ffffff;
            margin-bottom: 35px;
            border-radius: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 5px 0;
        }
        .section-title {
            background: #eef2ff;
            padding: 12px 20px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1e40af;
            border-radius: 30px 30px 20px 20px;
            margin-top: 0;
            margin-bottom: 15px;
            border-right: 6px solid #3b82f6;
        }
        .question-card {
            background: #fefefe;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 18px 22px;
            margin-bottom: 22px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 12px 0 15px;
            padding-right: 10px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            transition: 0.1s;
        }
        .option.selected {
            background: #dbeafe;
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        input[type="radio"] {
            accent-color: #2563eb;
            width: 18px;
            height: 18px;
            margin-left: 6px;
        }
        .graph-option {
            flex-direction: column;
            width: 130px;
            text-align: center;
            background: #f1f5f9;
        }
        .graph-svg {
            width: 100px;
            height: 70px;
            margin-bottom: 5px;
        }
        .feedback {
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            display: inline-block;
            width: auto;
        }
        .correct-feedback {
            background: #dcfce7;
            color: #15803d;
            border-right: 4px solid #22c55e;
        }
        .wrong-feedback {
            background: #fee2e2;
            color: #b91c1c;
            border-right: 4px solid #ef4444;
        }
        .neutral-feedback {
            background: #f1f5f9;
            color: #334155;
        }
        .input-answer {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .input-answer input {
            padding: 8px 12px;
            border-radius: 28px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            width: 220px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        button:hover {
            background: #2563eb;
            transform: scale(0.97);
        }
        .reset-btn {
            background: #ef4444;
            margin-right: 15px;
            padding: 10px 25px;
            font-size: 1rem;
        }
        .reset-btn:hover {
            background: #dc2626;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .score-area {
            background: #e6f0ff;
            border-radius: 36px;
            padding: 15px 20px;
            text-align: center;
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #075985;
            position: sticky;
            bottom: 10px;
        }
        @media (max-width: 650px) {
            .container {
                padding: 12px;
            }
            .question-card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ اختبار الحث الكهرومغناطيسي الشامل ⚡</h1>
        <p>الصف الثالث الثانوي | الجزء الأول + التركيبية (جميع الأسئلة كما وردت)</p>
        <div class="button-group">
            <button class="reset-btn" onclick="resetAllQuestions()">
                <i class="fas fa-redo-alt"></i> إعادة تعيين جميع الإجابات
            </button>

          <button class="nav-btn home-btn" onclick="window.location.href='unit7.html'" id="homeMainBtn"><i class="fas fa-home"></i> الرئيسية</button>



        </div>
    </div>
    <div id="app"></div>
    <div class="score-area" id="scoreBoard">📊 يتم حساب النقاط...</div>
    <footer>✅ تحقق تلقائي لكل سؤال | التقييم حسب الإجابات الصحيحة</footer>
</div>

<script>
    // ================== جميع الأسئلة (35 سؤالاً) ==================
    const questionsData = [
        // الجزء الأول - الأسئلة الجديدة
        { id: 1, type: "mcq", section: "الجزء الأول - الاختيار من متعدد", text: "أي من الإجراءات التالية لا تنتج قوة دافعة كهربائية؟", options: ["أ) مسك مغناطيس ثابت داخل ملف", "ب) تدوير ملف في مجال مغناطيسي", "ج) تدوير مغناطيس حول ملف ثابت", "د) تحريك قضيب مغناطيس عبر قطعة فلز"], correct: "a", explanation: "القوة الدافعة الكهربائية المستحثة تنشأ فقط عند تغير التدفق المغناطيسي. عندما يكون المغناطيس ثابتاً داخل الملف، لا يوجد تغير في التدفق، وبالتالي لا تتولد قوة دافعة كهربائية." },
        { id: 2, type: "mcq", section: "الجزء الأول - الاختيار من متعدد", text: "أي مما يلي لا يؤثر على مقدار القوة الدافعة الكهربائية المستحثة؟", options: ["أ) قوة المجال المغناطيسي", "ب) مقاومة الملف", "ج) سرعة قطع الملف للمجال", "د) عدد لفات الملف"], correct: "b", explanation: "مقاومة الملف تؤثر على شدة التيار المستحث ولكنها لا تؤثر على مقدار القوة الدافعة الكهربائية نفسها." },
        { id: 3, type: "graph", section: "الجزء الأول - الاختيار من متعدد", text: "يمثل الرسم ملف مولد ذو حلقات انزلاق. أي من العلاقات البيانية التالية تعكس الجهد الخارج مقابل الزمن عند بدء الدوران من الوضع الأفقي؟", options: ["الشكل أ", "الشكل ب", "الشكل ج", "الشكل د"], correct: "c", explanation: "عند بدء الدوران من الوضع الأفقي، يبدأ الجهد من القيمة العظمى، والشكل (ج) هو الصحيح.", graphOptions: [
            { value: "a", label: "الشكل أ", svg: '<svg viewBox="0 0 120 80"><path d="M 10 60 Q 35 20 60 60 T 110 60" fill="none" stroke="red" stroke-width="3"/><line x1="5" y1="60" x2="115" y2="60" stroke="black"/><line x1="10" y1="10" x2="10" y2="75" stroke="black"/><text x="2" y="45">e</text><text x="105" y="75">t</text></svg>' },
            { value: "b", label: "الشكل ب", svg: '<svg viewBox="0 0 120 80"><path d="M 10 40 Q 35 70 60 40 T 110 40" fill="none" stroke="red" stroke-width="3"/><line x1="5" y1="40" x2="115" y2="40" stroke="black"/><line x1="10" y1="10" x2="10" y2="75" stroke="black"/><text x="2" y="30">e</text><text x="105" y="55">t</text></svg>' },
            { value: "c", label: "الشكل ج", svg: '<svg viewBox="0 0 120 80"><path d="M 10 20 Q 35 70 60 40 T 110 40" fill="none" stroke="red" stroke-width="3"/><line x1="5" y1="40" x2="115" y2="40" stroke="black"/><line x1="10" y1="10" x2="10" y2="75" stroke="black"/><text x="2" y="30">e</text><text x="105" y="55">t</text></svg>' },
            { value: "d", label: "الشكل د", svg: '<svg viewBox="0 0 120 80"><path d="M 10 60 L 60 20 L 110 60" fill="none" stroke="red" stroke-width="3"/><line x1="5" y1="60" x2="115" y2="60" stroke="black"/><line x1="10" y1="10" x2="10" y2="75" stroke="black"/></svg>' }
        ] },
        { id: 4, type: "mcq", section: "الجزء الأول - الاختيار من متعدد", text: "لماذا يستخدم الحديد المطاوع في قلب المحولات الكهربائية؟", options: ["أ) مقاومة كهربائية منخفضة", "ب) يوصل التيار المستحث بشكل جيد", "ج) لا ينصهر بسهولة", "د) يضمن رابطة تدفق مغناطيسي أفضل ويقلل التيارات الدوامية"], correct: "d", explanation: "الحديد المطاوع يتميز بنفاذية مغناطيسية عالية ومقاومة كهربائية عالية لتقليل التيارات الدوامية." },
        { id: 5, type: "mcq", section: "الجزء الأول - الاختيار من متعدد", text: "محول: Np=100 لفة، Ns=50 لفة، Vp=240V، الحمل R=10Ω. المطلوب: حساب التيار في الحمل.", options: ["12 A", "24 A", "48 A", "120 A"], correct: "a", explanation: "Vs = (Ns/Np) × Vp = (50/100) × 240 = 120V، Is = Vs / R = 120 / 10 = 12A" },
        
        // الأسئلة التركيبية السابقة (30 سؤالاً - مختصرة للمساحة)
        { id: 6, type: "text", section: "الأسئلة التركيبية", text: "1- (أ) ماذا يُقصد بمصطلح الحث الكهرومغناطيسي؟", correctAnswer: "ظاهرة تولد قوة دافعة كهربائية في موصل نتيجة تغير التدفق المغناطيسي خلاله.", isShort: true },
        { id: 7, type: "text", section: "الأسئلة التركيبية", text: "1- (ب) حدد العوامل التي تؤثر على مقدار القوة الدافعة الكهربائية المستحثة.", correctAnswer: "شدة المجال المغناطيسي، سرعة الحركة، عدد لفات الملف، مساحة الملف، والزاوية بين المجال والعمودي.", isShort: true },
        { id: 8, type: "text", section: "الأسئلة التركيبية", text: "2- حدد ما يشاهد في الجلفانومتر G عند: (أ) تقريب المغناطيس نحو الملف.", correctAnswer: "ينحرف مؤشر الجلفانومتر انحرافاً لحظياً.", isShort: true },
        { id: 9, type: "text", section: "الأسئلة التركيبية", text: "2- (ب) إبعاد المغناطيس عن الملف اللولبي.", correctAnswer: "ينحرف المؤشر في الاتجاه المعاكس.", isShort: true },
        { id: 10, type: "text", section: "الأسئلة التركيبية", text: "2- (ج) زيادة عدد اللفات في الملف.", correctAnswer: "يزداد مقدار انحراف الجلفانومتر بسبب زيادة القوة الدافعة المستحثة.", isShort: true },
        { id: 11, type: "text", section: "الأسئلة التركيبية", text: "3- اذكر قاعدة لينز عن الحث الكهرومغناطيسي.", correctAnswer: "اتجاه التيار المستحث يكون بحيث يعاكس التغير في التدفق المغناطيسي المسبب له.", isShort: true },
        { id: 12, type: "text", section: "الأسئلة التركيبية", text: "3- (ب) كيف ينطبق حفظ الطاقة على الحث الكهرو مغناطيسي؟", correctAnswer: "الشغل المبذول لتحريك المغناطيس يتحول إلى طاقة كهربائية، والتيار المستحث ينتج مجالاً مضاداً.", isShort: true },
        { id: 13, type: "text", section: "الأسئلة التركيبية", text: "4- (أ) صف مولد تيار متردد بسيط باستخدام حلقات الانزلاق.", correctAnswer: "يتكون من ملف يدور بين قطبي مغناطيس، طرفا الملف متصلان بحلقتين منزلقتين معدنيتين.", isShort: true },
        { id: 14, type: "text", section: "الأسئلة التركيبية", text: "4- (ب) ارسم العلاقة البيانية للجهد المتغير مع الزمن لمولد تيار متردد بسيط.", correctAnswer: "منحنى جيبي (sinusoidal) يوضح تغير الجهد مع الزمن بشكل دوري.", isShort: true },
        { id: 15, type: "text", section: "الأسئلة التركيبية", text: "5- ما الغرض من القلب المصنوع من رقائق الحديد المطاوع في المحول؟", correctAnswer: "تقلل فقد الحرارة الناتج عن التيارات المستحثة.", isShort: true },
        { id: 16, type: "text", section: "الأسئلة التركيبية", text: "5-ب يستخدم هذا المحول للحصول على جهد لنموذج سيارة 6v تسحب تيارا 0.4 . احسب التيار في الملف الابتدائي  اذا كانت قيمة جهد منبع التيار المتردد 240v.", correctAnswer: "Ip = (Vs*Is)/Vp = (6*0.4)/240 = 0.01 A = 10 mA.", isShort: true },
        { id: 17, type: "text", section: "الأسئلة التركيبية", text: "6- كيف تولد تياراً كهرو مغناطيسياً باستخدام قلبين حديديين وملفين؟", correctAnswer: "نركب القلبين معاً لعمل قلب مغلق، نمرر تياراً متغيراً في أحد الملفين فيستحث تيار في الملف الآخر.", isShort: true },
        { id: 18, type: "text", section: "الأسئلة التركيبية", text: "7- (أ) صف تجربة الحث الكهرومغناطيسي واذكر العوامل المؤثرة.", correctAnswer: "تحريك مغناطيس داخل ملف متصل بجلفانومتر. العوامل: السرعة، شدة المغناطيس، عدد اللفات، مساحة الملف.", isShort: true },
        { id: 19, type: "text", section: "الأسئلة التركيبية", text: "7- (ب) محول: Np=400، Ns=10، Vp=250V، Ip=2A. احسب Vs.", correctAnswer: "Vs = (Ns/Np)*Vp = (10/400)*250 = 6.25 V", isShort: true },
        { id: 20, type: "text", section: "الأسئلة التركيبية", text: "7- (ب) احسب التيار الثانوي (كفاءة 100%).", correctAnswer: "Is = (Vp*Ip)/Vs = (250*2)/6.25 = 80 A", isShort: true },
        { id: 21, type: "text", section: "الأسئلة التركيبية", text: "8- (أ) قدرة 40kW، جهد 5000V، مقاومة 0.5Ω. احسب التيار.", correctAnswer: "I = P/V = 40000/5000 = 8 A", isShort: true },
        { id: 22, type: "text", section: "الأسئلة التركيبية", text: "8- (أ) احسب هبوط الجهد.", correctAnswer: "Vdrop = I*R = 8*0.5 = 4 V", isShort: true },
        { id: 23, type: "text", section: "الأسئلة التركيبية", text: "8- (أ) احسب فقد القدرة.", correctAnswer: "Ploss = I²*R = 64*0.5 = 32 W، يتحول إلى حرارة.", isShort: true },
        { id: 24, type: "text", section: "الأسئلة التركيبية", text: "8- (ب) نفس القدرة عند 250V، احسب فقد القدرة.", correctAnswer: "I = 40000/250 = 160 A، الفقد = (160)² * 0.5 = 12800 W = 12.8 kW.", isShort: true },
        { id: 25, type: "text", section: "الأسئلة التركيبية", text: "8- (ج) لماذا تنقل القدرة بجهود عالية؟", correctAnswer: "لأن الفقد في القدرة يتناسب مع مربع التيار، فعند رفع الجهد يقل التيار ويقل الفقد.", isShort: true },
        { id: 26, type: "text", section: "الأسئلة التركيبية", text: "9- (أ) اشرح تجربة الحث الكهرومغناطيسي والعوامل المؤثرة.", correctAnswer: "تجربة تحريك مغناطيس داخل ملف متصل بجلفانومتر.", isShort: true },
        { id: 27, type: "text", section: "الأسئلة التركيبية", text: "9- (ب) كيف يفسر الحث الكهرومغناطيسي عمل المحول؟", correctAnswer: "التيار المتردد في الابتدائي ينتج فيضاً متغيراً في القلب، وهذا التغير يولد قوة دافعة مستحثة في الثانوي.", isShort: true },
        { id: 28, type: "text", section: "الأسئلة التركيبية", text: "10- محول 240V/15V، Np=6400 لفة. احسب Ns.", correctAnswer: "Ns = (Vs/Vp)*Np = (15/240)*6400 = 400 لفة.", isShort: true },
        { id: 29, type: "text", section: "الأسئلة التركيبية", text: "10- (ب) احسب تيار الابتدائي إذا كان تيار الخرج 2A (كفاءة 100%).", correctAnswer: "Ip = (Vs*Is)/Vp = (15*2)/240 = 0.125 A", isShort: true },
        { id: 30, type: "text", section: "الأسئلة التركيبية", text: "11- ملف: 500 لفة، مساحة 100cm²، تردد 1500 دورة/دقيقة، مجال 42×10⁻⁴ T. احسب emf عند ربع دورة.", correctAnswer: "التردد = 25 Hz، الزمن لربع دورة = 0.01 s، التغير في التدفق = N B A = 0.021 Wb، emf = 2.1 V.", isShort: true },
        { id: 31, type: "text", section: "الأسئلة التركيبية", text: "12- ملف: 500 لفة، مساحة 50cm²، مجال 4T يتناقص إلى 20% خلال 1s. احسب emf.", correctAnswer: "ΔB = 3.2 T، ΔΦ = 8 Wb، emf = 8 V.", isShort: true }
    ];

    let userAnswers = {};

    // دالة إعادة التعيين الكاملة
    window.resetAllQuestions = function() {
        // 1. مسح كائن الإجابات بالكامل
        userAnswers = {};
        
        // 2. إعادة تعيين جميع حقول الإدخال النصية (text inputs)
        document.querySelectorAll('.input-answer input').forEach(input => {
            input.value = '';
        });
        
        // 3. إلغاء تحديد جميع أزرار الراديو (MCQ والرسوم البيانية)
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.checked = false;
        });
        
        // 4. إزالة class "selected" من جميع الخيارات
        document.querySelectorAll('.option').forEach(opt => {
            opt.classList.remove('selected');
        });
        
        // 5. إعادة تعيين جميع رسائل التغذية الراجعة إلى الحالة المحايدة
        document.querySelectorAll('.feedback').forEach(fb => {
            fb.innerHTML = '🔘 لم يتم الإجابة بعد. اختر إجابة.';
            fb.className = 'feedback neutral-feedback';
        });
        
        // 6. معالجة خاصة للأسئلة النصية: تغيير رسائلها إلى الحالة الافتراضية
        questionsData.forEach(q => {
            if (q.type === 'text') {
                const fbDiv = document.getElementById(`fb-${q.id}`);
                if (fbDiv) {
                    fbDiv.innerHTML = '✍️ أدخل إجابتك ثم اضغط تحقق.';
                    fbDiv.className = 'feedback neutral-feedback';
                }
            }
        });
        
        // 7. تحديث شريط التقييم
        updateScore();
        
        // 8. (اختياري) تمرير سلس إلى أعلى الصفحة
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // باقي دوال البرنامج (render, selectOption, checkTextAnswer, updateScore, normalizeString, escapeHtml)
    function render() {
        const app = document.getElementById('app');
        let sectionsMap = new Map();
        questionsData.forEach(q => {
            if (!sectionsMap.has(q.section)) sectionsMap.set(q.section, []);
            sectionsMap.get(q.section).push(q);
        });

        let html = '';
        for (let [sectionName, questions] of sectionsMap.entries()) {
            html += `<div class="section"><div class="section-title">📘 ${sectionName}</div>`;
            questions.forEach(q => {
                if (q.type === 'mcq') {
                    const selectedVal = userAnswers[`q${q.id}`] || '';
                    html += `<div class="question-card" id="qcard-${q.id}">
                        <div class="question-text">${q.text}</div>
                        <div class="options" id="options-${q.id}">
                            ${q.options.map((opt, idx) => {
                                const optVal = String.fromCharCode(97+idx);
                                return `<label class="option ${selectedVal === optVal ? 'selected' : ''}">
                                    <input type="radio" name="q${q.id}" value="${optVal}" ${selectedVal === optVal ? 'checked' : ''} onchange="selectOption(${q.id}, '${optVal}')">
                                    <span>${opt}</span>
                                </label>`;
                            }).join('')}
                        </div>
                        <div class="feedback ${userAnswers[`fb_q${q.id}`] ? (userAnswers[`fb_q${q.id}`].isCorrect ? 'correct-feedback' : 'wrong-feedback') : 'neutral-feedback'}" id="fb-${q.id}">
                            ${userAnswers[`fb_q${q.id}`] ? userAnswers[`fb_q${q.id}`].msg : '🔘 لم يتم الإجابة بعد. اختر إجابة.'}
                        </div>
                    </div>`;
                } 
                else if (q.type === 'graph') {
                    const selectedVal = userAnswers[`q${q.id}`] || '';
                    html += `<div class="question-card" id="qcard-${q.id}">
                        <div class="question-text">${q.text}</div>
                        <div class="options" id="options-${q.id}">
                            ${q.graphOptions.map(opt => `
                                <label class="option graph-option ${selectedVal === opt.value ? 'selected' : ''}">
                                    <input type="radio" name="q${q.id}" value="${opt.value}" ${selectedVal === opt.value ? 'checked' : ''} onchange="selectOption(${q.id}, '${opt.value}')">
                                    <div class="graph-svg">${opt.svg}</div>
                                    <span>${opt.label}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div class="feedback ${userAnswers[`fb_q${q.id}`] ? (userAnswers[`fb_q${q.id}`].isCorrect ? 'correct-feedback' : 'wrong-feedback') : 'neutral-feedback'}" id="fb-${q.id}">
                            ${userAnswers[`fb_q${q.id}`] ? userAnswers[`fb_q${q.id}`].msg : '🔘 اختر الشكل البياني الصحيح.'}
                        </div>
                    </div>`;
                }
                else {
                    const saved = userAnswers[`q${q.id}_text`] || '';
                    const fbObj = userAnswers[`fb_q${q.id}`];
                    html += `<div class="question-card" id="qcard-${q.id}">
                        <div class="question-text">${q.text}</div>
                        <div class="input-answer">
                            <input type="text" id="input-${q.id}" placeholder="اكتب إجابتك هنا..." value="${escapeHtml(saved)}" style="flex:2;">
                            <button onclick="checkTextAnswer(${q.id})">✔ تحقق</button>
                        </div>
                        <div class="feedback ${fbObj ? (fbObj.isCorrect ? 'correct-feedback' : 'wrong-feedback') : 'neutral-feedback'}" id="fb-${q.id}">
                            ${fbObj ? fbObj.msg : '✍️ أدخل إجابتك ثم اضغط تحقق.'}
                        </div>
                    </div>`;
                }
            });
            html += `</div>`;
        }
        app.innerHTML = html;
        updateScore();
    }

    window.selectOption = function(qId, val) {
        userAnswers[`q${qId}`] = val;
        const question = questionsData.find(q => q.id === qId);
        let isCorrect = false;
        let msg = '';
        if (question && question.correct === val) {
            isCorrect = true;
            msg = `✅ إجابة صحيحة! ${question.explanation || ''}`;
        } else {
            isCorrect = false;
            msg = `❌ إجابة خاطئة. الإجابة الصحيحة: ${question.correct.toUpperCase()}. ${question?.explanation || ''}`;
        }
        userAnswers[`fb_q${qId}`] = { isCorrect, msg };
        
        const optionsDiv = document.getElementById(`options-${qId}`);
        if(optionsDiv) {
            const radios = optionsDiv.querySelectorAll('input[type="radio"]');
            radios.forEach(radio => {
                const parentLabel = radio.closest('.option');
                if(radio.value === val) parentLabel?.classList.add('selected');
                else parentLabel?.classList.remove('selected');
            });
        }
        const fbDiv = document.getElementById(`fb-${qId}`);
        if(fbDiv) {
            fbDiv.innerHTML = msg;
            fbDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
        }
        updateScore();
    };

    window.checkTextAnswer = function(qId) {
        const inputEl = document.getElementById(`input-${qId}`);
        let userAnswer = inputEl ? inputEl.value.trim() : '';
        userAnswers[`q${qId}_text`] = userAnswer;
        const question = questionsData.find(q => q.id === qId);
        if (!question) return;
        
        let isCorrect = false;
        let feedbackMsg = '';
        const correctNorm = normalizeString(question.correctAnswer);
        const userNorm = normalizeString(userAnswer);
        
        let matched = false;
        if ((question.id === 30 || question.id === 31) && (userNorm.includes('2.1') || userNorm.includes('8'))) matched = true;
        else if (userNorm === correctNorm || (correctNorm.length>0 && userNorm.includes(correctNorm.substring(0,12)))) matched = true;
        
        if(matched) {
            isCorrect = true;
            feedbackMsg = `✅ إجابة صحيحة! الإجابة النموذجية: ${question.correctAnswer}`;
        } else {
            isCorrect = false;
            feedbackMsg = `❌ إجابة غير دقيقة. الإجابة المتوقعة: ${question.correctAnswer}`;
        }
        userAnswers[`fb_q${qId}`] = { isCorrect, msg: feedbackMsg };
        const fbDiv = document.getElementById(`fb-${qId}`);
        if(fbDiv) {
            fbDiv.innerHTML = feedbackMsg;
            fbDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
        }
        updateScore();
    };

    function normalizeString(str) {
        if(!str) return '';
        return str.replace(/\s+/g, ' ').trim().toLowerCase();
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function updateScore() {
        let total = questionsData.length;
        let correctCount = 0;
        for(let q of questionsData) {
            const fb = userAnswers[`fb_q${q.id}`];
            if(fb && fb.isCorrect) correctCount++;
        }
        const percent = total === 0 ? 0 : Math.round((correctCount/total)*100);
        const scoreDiv = document.getElementById('scoreBoard');
        scoreDiv.innerHTML = `📊 التقييم: ${correctCount} / ${total} إجابة صحيحة (${percent}%) ${percent >= 70 ? '🎉 ممتاز' : (percent >= 50 ? '👍 جيد، راجع الأخطاء' : '📚 يحتاج مراجعة إضافية')}`;
    }

    window.addEventListener('DOMContentLoaded', () => { render(); });
</script>
</body>
</html>
