<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>منصة الفيزياء - مدرسة أمجاد أفريقيا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary: #0f172a;
    --accent: #2563eb;
    --sky-blue: #38bdf8;
    --sky-blue-dark: #0ea5e9;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --success: #16a34a;
    --error: #dc2626;
    --text-main: #334155;
    --border-color: #e2e8f0;
    --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    --radius: 12px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Cairo', sans-serif;
}

body {
    background-color: #cbd5e1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.app-container {
    width: 100%;
    max-width: 900px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
}

.header {
    background-color: var(--primary);
    color: white;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.header h2 {
    font-size: 22px;
    font-weight: 700;
}

.school-badge {
    background: #ea580c;
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
}

#question-counter {
    background: rgba(255, 255, 255, 0.15);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 14px;
}

.question-container {
    padding: 30px;
    text-align: center;
}

.question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    direction: rtl;
    flex-wrap: wrap;
    gap: 10px;
}

.q-source-span {
    background: var(--accent);
    color: white;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: bold;
}

.question-text {
    font-size: 19px;
    line-height: 1.8;
    color: var(--text-main);
    margin-bottom: 20px;
    font-weight: 600;
    text-align: right;
}

.question-graphic-area {
    max-width: 100%;
    margin: 0 auto 20px auto;
    padding: 15px;
    border: 2px dashed #cbd5e1;
    border-radius: 8px;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 120px;
}

.question-graphic-area svg {
    max-width: 100%;
    height: auto;
}

.no-graphic {
    color: #94a3b8;
    font-size: 14px;
}

.options-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 15px 0;
}

.option-btn {
    background: white;
    border: 2px solid var(--border-color);
    padding: 12px 16px;
    border-radius: 6px;
    cursor: pointer;
    text-align: right;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s ease;
    width: 100%;
    font-family: 'Cairo', sans-serif;
}

.option-btn:hover {
    border-color: var(--sky-blue);
    background: #f0f9ff;
}

.option-btn.correct {
    border-color: var(--success);
    background: #dcfce7;
    color: #166534;
}

.option-btn.wrong {
    border-color: var(--error);
    background: #fee2e2;
    color: #991b1b;
}

.option-btn i {
    font-size: 18px;
}

.feedback-box {
    margin-top: 15px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    text-align: right;
}

.feedback-box.success {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
    display: block;
}

.feedback-box.error {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fecaca;
    display: block;
}

.navigation-area {
    padding: 0 30px 30px 30px;
    display: flex;
    justify-content: space-between;
    background: var(--bg);
}

.nav-btn {
    padding: 12px 28px;
    background: var(--primary);
    color: white;
    border: none;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Cairo', sans-serif;
}

.nav-btn:hover:not(:disabled) {
    background: #1e293b;
    transform: translateY(-1px);
}

.nav-btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    color: #94a3b8;
}

.nav-btn i {
    font-size: 14px;
}

.print-section {
    text-align: center;
    margin: 20px 0 50px 0;
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.print-btn {
    background-color: var(--success);
    color: white;
    padding: 15px 35px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Cairo', sans-serif;
}

.print-btn:hover {
    background-color: #15803d;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
}

.bot-link-btn {
    background-color: var(--accent);
    color: white;
    padding: 15px 25px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    transition: all 0.2s ease;
    font-family: 'Cairo', sans-serif;
}

.bot-link-btn:hover {
    background-color: #1d4ed8;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    color: white;
}

#printable-pdf-document {
    display: none;
}

.hide {
    display: none !important;
}

#result-screen {
    margin-top: 20px;
    padding: 20px;
    background: #f8fafc;
    border-radius: 12px;
}

.success-message {
    background: #d4edda;
    color: #155724;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-size: 28px;
    margin: 15px 0;
}

#fail-msg {
    background: #f8d7da;
    color: #721c24;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-size: 28px;
    margin: 15px 0;
}

.score-display {
    font-size: 22px;
    text-align: center;
    margin: 20px 0;
    color: #1a365d;
}

.score-display span {
    font-weight: bold;
    font-size: 26px;
}

<div class="app-container">
    <div class="header no-print">
        <h2><i class="fa-solid fa-desktop"></i> منصة الفيزياء</h2>

            <i class="fa-solid fa-arrow-right"></i> السابق
        </button>

        </button>

        <button class="print-btn" onclick="generatePDF()">
            <i class="fa-solid fa-file-pdf"></i> طباعة PDF
        </button>
        <a href="https://t.me/amjad_africa2027bot" target="_blank" class="bot-link-btn">
            <i class="fa-brands fa-telegram"></i> البوت التعليمي
        </a>

            <button onclick="location.reload()" style="padding:12px 30px;background:#1a365d;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:'Cairo',sans-serif;">

<script>
// ============================================================
// مصفوفة الأسئلة - تم تحميلها من المصفوفة التي أرسلتها
// ============================================================
console.log("✅ تم تحميل المصفوفة! عدد الأسئلة: " + examQuestions.length);

examQuestions.forEach((q, i) => {
    console.log(`السؤال ${i+1}: correctAnswer = ${q.correctAnswer}, الإجابة = ${q.options[q.correctAnswer]}`);
});

// ============================================================
// متغيرات التحكم
// ============================================================
let currentQIndex = 0;
let userAnswers = {};
let answeredQuestions = {};

// ============================================================
// دوال العرض والتنقل
// ============================================================
function navigateQuestion(direction) {
    const newIndex = currentQIndex + direction;
    if (newIndex >= 0 && newIndex < examQuestions.length) {
        currentQIndex = newIndex;
        renderActiveQuestion(currentQIndex);
    }
}

function renderActiveQuestion(index) {
    const data = examQuestions[index];
    if (!data) return;

    document.getElementById('q-source').innerText = `السؤال ${index + 1}`;
    document.getElementById('main-question-text').innerText = data.question;
    document.getElementById('question-counter').innerHTML = `مسألة ${index + 1} / ${examQuestions.length}`;

    const graphicContainer = document.getElementById('graphic-container');
    if (data.svg && data.svg.trim() !== "") {
        graphicContainer.innerHTML = data.svg;
        graphicContainer.style.display = 'block';
    } else {
        graphicContainer.innerHTML = '<p class="no-graphic">⚠️ لا يوجد رسم توضيحي</p>';
        graphicContainer.style.display = 'block';
    }

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    data.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span>${opt}</span><i class="fa-regular fa-circle"></i>`;
        btn.onclick = function() { checkAnswer(index, idx); };
        if (answeredQuestions[index] !== undefined) {
            if (answeredQuestions[index] === idx) {
                btn.classList.add(answeredQuestions[index] === data.correctAnswer ? 'correct' : 'wrong');
                btn.querySelector('i').className = answeredQuestions[index] === data.correctAnswer ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            }
            if (idx === data.correctAnswer && answeredQuestions[index] !== undefined) {
                btn.style.borderColor = '#22c55e';
                btn.style.background = '#dcfce7';
            }
        }
        optionsContainer.appendChild(btn);
    });

    document.getElementById('prev-btn').disabled = index === 0;
    document.getElementById('next-btn').disabled = index === examQuestions.length - 1;

    const feedbackBox = document.getElementById('feedback-box');
    if (answeredQuestions[index] !== undefined) {
        const isCorrect = answeredQuestions[index] === data.correctAnswer;
        feedbackBox.className = `feedback-box ${isCorrect ? 'success' : 'error'}`;
        feedbackBox.innerHTML = isCorrect ? 
            '<i class="fa-solid fa-check"></i> ✅ إجابة صحيحة! درجة السؤال: 1.5' : 
            `<i class="fa-solid fa-xmark"></i> ❌ الإجابة الصحيحة هي: ${data.options[data.correctAnswer]}`;
        feedbackBox.style.display = 'block';
    } else {
        feedbackBox.style.display = 'none';
    }
}

function checkAnswer(index, selectedIdx) {
    const data = examQuestions[index];
    if (answeredQuestions[index] !== undefined) return;

    answeredQuestions[index] = selectedIdx;
    userAnswers[index] = selectedIdx;
    renderActiveQuestion(index);
}

// ============================================================
// دالة توليد PDF - مع حل مشكلة الصفحات
// ============================================================
function generatePDF() {
    const printableDoc = document.getElementById('printable-pdf-document');
    printableDoc.innerHTML = '';

    const totalScore = examQuestions.length * 1.5;
    const passingScore = Math.floor(examQuestions.length * 0.7) * 1.5;
    const watermarkText = `مدرسة أمجاد أفريقيا\nليبيا البيضاء`;

    function createWatermark() {
        return `<div class="watermark-text">${watermarkText}</div>`;
    }

    let htmlContent = '';

    // ===== صفحة الغلاف - بدون خلفية زرقاء =====
    htmlContent += `
    <div class="pdf-page pdf-cover-page">
        ${createWatermark()}
        <div class="content-wrapper" style="position:relative; z-index:1; width:100%;">
            <div class="school-name">🏫 مدرسة أمجاد أفريقيا - ليبيا البيضاء</div>
            <div class="main-title">📘 الفيزياء الكهربائية</div>
            <div class="sub-title">كراسة الحلول النموذجية</div>
            <div style="font-size:20pt;color:#334155;margin-bottom:15px;">دفعة 2008 - الصف الثالث الثانوي</div>
            <div class="cover-frame">
                <h3>📚 كراسة الحلول النموذجية</h3>
                <h4>امتحان الفيزياء الكهربائية</h4>
                <div class="cover-subjects">دفعة 2008</div>
                <div class="year">العام الدراسي 2025 - 2026</div>
                <div style="font-size:15pt;color:#059669;margin-top:8px;font-weight:bold;">
                    📊 عدد الأسئلة: ${examQuestions.length} سؤال
                </div>
                <div style="font-size:15pt;color:#2563eb;margin-top:4px;font-weight:bold;">
                    ⭐ كل سؤال: 1.5 درجة | المجموع الكلي: ${totalScore.toFixed(1)} درجة
                </div>
                <div style="font-size:14pt;color:#d97706;margin-top:4px;font-weight:bold;">
                    🎯 درجة النجاح (70%): ${passingScore.toFixed(1)} درجة
                </div>
            </div>
            <div class="dedication">✨ إهداء إلى طلبتنا المتميزين ✨</div>
            <div style="font-size:14pt;color:#475569;margin-top:6px;">
                <span style="font-weight:bold;">رابط البوت التعليمي:</span><br>
                <span style="color:#2563eb;font-size:15pt;">t.me/amjad_africa2027bot</span>
            </div>
            <div class="bot-link">© 2026 جميع الحقوق محفوظة - مدرسة أمجاد أفريقيا</div>
        </div>
    </div>
    `;

    // ===== صفحات الأسئلة - 7 أسئلة لكل صفحة =====
    const questionsPerPage = 7;
    const totalPages = Math.ceil(examQuestions.length / questionsPerPage);

    for (let page = 0; page < totalPages; page++) {
        const start = page * questionsPerPage;
        const end = Math.min(start + questionsPerPage, examQuestions.length);
        
        htmlContent += `
        <div class="pdf-page">
            ${createWatermark()}
            <div class="content-wrapper" style="position:relative; z-index:1; width:100%;">
                <div class="pdf-page-header">
                    <div class="school-name-header">مدرسة أمجاد أفريقيا - ليبيا البيضاء</div>
                    <div class="sub-header">📘 كراسة الحلول النموذجية - امتحان الفيزياء الكهربائية</div>
                    <div class="page-info">📄 الصفحة ${page + 1} من ${totalPages}</div>
                </div>
        `;

        for (let i = start; i < end; i++) {
            const q = examQuestions[i];
            const correctIndex = q.correctAnswer;
            let correctText = "لم يتم تحديد";
            if (q.options && q.options[correctIndex] !== undefined) {
                correctText = q.options[correctIndex];
            }
            let svgHTML = "";
            if (q.svg && q.svg.trim() !== "") {
                svgHTML = `<div class="pdf-graphic">${q.svg}</div>`;
            }

            let optionsHTML = q.options.map((opt, idx) => {
                const isCorrect = idx === correctIndex;
                return `<span style="background:${isCorrect ? '#dcfce7' : '#f1f5f9'};border-radius:3px;padding:1px 8px;${isCorrect ? 'font-weight:bold;color:#065f46;border:1px solid #22c55e;' : ''}">${opt}</span>`;
            }).join(' ');

            htmlContent += `
            <div class="pdf-question-block">
                <div class="pdf-q-title">س ${i + 1}: ${q.question}</div>
                ${svgHTML}
                <div class="pdf-options">
                    <span style="font-weight:bold;">الخيارات:</span> ${optionsHTML}
                </div>
                <div class="pdf-correct-answer">
                    ✅ الإجابة النموذجية الصحيحة: ${correctText}
                </div>
            </div>
            `;
        }

        // ملخص الدرجات في آخر صفحة فقط
        if (page === totalPages - 1) {
            htmlContent += `
            <div class="pdf-summary">
                <h2>📊 ملخص الدرجات</h2>
                <div class="pdf-summary-grid">
                    <div class="item">
                        <div class="label">📄 عدد الأسئلة</div>
                        <div class="value">${examQuestions.length}</div>
                    </div>
                    <div class="item">
                        <div class="label">⭐ درجة كل سؤال</div>
                        <div class="value">1.5</div>
                    </div>
                    <div class="item">
                        <div class="label">🏆 المجموع الكلي</div>
                        <div class="value">${totalScore.toFixed(1)}</div>
                    </div>
                    <div class="item">
                        <div class="label">✅ النجاح (70%)</div>
                        <div class="value">${passingScore.toFixed(1)}</div>
                    </div>
                </div>
                <div style="margin-top:5px;padding:6px;background:white;border-radius:4px;border:1px solid #86efac;font-size:11pt;color:#475569;">
                    📌 كل سؤال بـ <b style="color:#2563eb;">1.5 درجة</b> | 🎯 النجاح: <b style="color:#d97706;">${passingScore.toFixed(1)}</b> من ${totalScore.toFixed(1)}
                </div>
            </div>
            `;
        }

        htmlContent += `
            <div class="pdf-footer">
                <span class="school-name-footer">مدرسة أمجاد أفريقيا - ليبيا البيضاء</span> ⚡ هذه المذكرة خاصة - لا يجوز نسخها ⚡
                <br>© 2026 جميع الحقوق محفوظة | الصفحة ${page + 1} من ${totalPages}
            </div>
        </div>
        `;
    }

    printableDoc.innerHTML = htmlContent;
    printableDoc.style.display = 'block';

    setTimeout(function() {
        window.print();
        setTimeout(function() {
            printableDoc.style.display = 'none';
        }, 1000);
    }, 500);
}

window.onload = function() {
    renderActiveQuestion(0);
};
</script>
</body>
</html>
