        { id: 5, type: "mcq_orig", section: "الجزء الأول - الاختيار من متعدد", text: "محول: Np=100 لفة، Ns=50 لفة، Vp=240V، الحمل R=10Ω. التيار في الحمل هو:", options: ["12 A", "24 A", "48 A", "120 A"], correct: "a", explanation: "Vs = (Ns/Np) × Vp = 120V، Is = Vs/R = 12A" },

        { id: 12, type: "text", section: "الأسئلة التركيبية", text: "3- (ب) كيف ينطبق حفظ الطاقة على الحث الكهرو مغناطيسي؟", correctAnswer: "الشغل المبذول لتحريك المغناطيس يتحول إلى طاقة كهربائية، والتيار المستحث ينتج مجالاً مضاداً." },
        { id: 13, type: "text", section: "الأسئلة التركيبية", text: "4- (أ) صف مولد تيار متردد بسيط باستخدام حلقات الانزلاق.", correctAnswer: "يتكون من ملف يدور بين قطبي مغناطيس، طرفا الملف متصلان بحلقتين منزلقتين معدنيتين." },

        { id: 15, type: "text", section: "الأسئلة التركيبية", text: "5- ما الغرض من القلب المصنوع من رقائق الحديد المطاوع في المحول؟", correctAnswer: "تقليل التيارات الدوامية (فوكو) وفقد الطاقة." },

        { id: 18, type: "text", section: "الأسئلة التركيبية", text: "7- (أ) صف تجربة الحث الكهرومغناطيسي واذكر العوامل المؤثرة.", correctAnswer: "تحريك مغناطيس داخل ملف متصل بجلفانومتر. العوامل: السرعة، شدة المغناطيس، عدد اللفات، مساحة الملف." },
        { id: 19, type: "text", section: "الأسئلة التركيبية", text: "7- (ب) محول: Np=400، Ns=10، Vp=250V، Ip=2A. احسب Vs.", correctAnswer: "Vs = (10/400)*250 = 6.25 V" },

        { id: 23, type: "text", section: "الأسئلة التركيبية", text: "8- (أ) احسب فقد القدرة.", correctAnswer: "Ploss = 64*0.5 = 32 W، يتحول إلى حرارة." },

        { id: 7, text: "عند تقريب مغناطيس من ملف متصل بجلفانومتر، ينحرف المؤشر. عند إبعاد المغناطيس، ينحرف المؤشر:", options: ["في نفس الاتجاه", "في الاتجاه المعاكس", "لا ينحرف", "ينحرف ثم يعود بسرعة"], correct: "b", explanation: "حسب قاعدة لينز، اتجاه التيار المستحث يعاكس التغير في التدفق." },
        { id: 8, text: "التيارات الدوامية (Foucault currents) تنتج في:", options: ["قلب المحول المصنوع من الحديد", "ملفات المحول", "أسلاك النقل", "المقاومات"], correct: "a", explanation: "التيارات الدوامية تتولد في القلوب الحديدية." },
        { id: 9, text: "وحدة قياس التدفق المغناطيسي هي:", options: ["تسلا", "ويبر", "فولت", "أمبير"], correct: "b", explanation: "وحدة التدفق المغناطيسي هي الويبر (Weber)." },
        { id: 10, text: "العلاقة الرياضية لقاعدة فاراداي هي:", options: ["emf = -N ΔΦ/Δt", "emf = N ΔΦ/Δt", "emf = -ΔΦ/Δt", "emf = N B A"], correct: "a", explanation: "قاعدة فاراداي: emf = -N dΦ/dt" }
    ];

    // ================== أسئلة صح/خطأ (محاكاة) ==================
    const trueFalseQuestions = [
        { id: 1, text: "الحث الكهرومغناطيسي هو توليد قوة دافعة كهربائية نتيجة تغير التدفق المغناطيسي.", correct: true, explanation: "هذا هو التعريف الدقيق للحث الكهرومغناطيسي." },
        { id: 2, text: "قاعدة لينز تنص على أن اتجاه التيار المستحث يعاكس التغير في التدفق المغناطيسي.", correct: true, explanation: "هذا هو النص الدقيق لقاعدة لينز." },
        { id: 3, text: "زيادة سرعة حركة المغناطيس داخل الملف يقلل من القوة الدافعة المستحثة.", correct: false, explanation: "زيادة السرعة تزيد من معدل تغير التدفق، فتزيد القوة الدافعة." },
        { id: 4, text: "المحول الكهربائي يعمل على التيار المستمر فقط.", correct: false, explanation: "المحول يعمل على التيار المتردد فقط، لأنه يحتاج إلى تغير التدفق." },
        { id: 5, text: "قلب المحول يصنع من الحديد المطاوع لتقليل التيارات الدوامية.", correct: true, explanation: "الحديد المطاوع (الرقائقي) يقلل التيارات الدوامية." },
        { id: 6, text: "في المولد الكهربائي، حلقات الانزلاق تستخدم للحصول على تيار مستمر.", correct: false, explanation: "حلقات الانزلاق تعطي تياراً متردداً، أما المبدل فيعطي تياراً مستمراً." },
        { id: 7, text: "القوة الدافعة المستحثة تتناسب طردياً مع عدد لفات الملف.", correct: true, explanation: "emf = -N (dΦ/dt)، أي تتناسب طردياً مع عدد اللفات N." },
        { id: 8, text: "التيارات الدوامية ظاهرة مفيدة دائماً في المحولات.", correct: false, explanation: "التيارات الدوامية تسبب فقداً في الطاقة وسخونة، وهي ضارة." },
        { id: 9, text: "قاعدة لنز هي تطبيق لمبدأ حفظ الطاقة في الحث الكهرومغناطيسي.", correct: true, explanation: "الاتجاه المعاكس للتيار المستحث يضمن حفظ الطاقة." },
        { id: 10, text: "وحدة قياس شدة المجال المغناطيسي هي الويبر.", correct: false, explanation: "وحدة شدة المجال المغناطيسي هي التسلا، والويبر وحدة التدفق." }
    ];

    // تخزين الإجابات
    let originalAnswers = {};
    let mcqAnswers = {};
    let trueFalseAnswers = {};
    let activeTab = 'original';

    function updateScore() {
        let total = 0, correctCount = 0;
        if (activeTab === 'original') {
            total = originalQuestions.length;
            for(let q of originalQuestions) {
                if(q.type === 'text') { if(originalAnswers[`text_q${q.id}`] && originalAnswers[`text_q${q.id}`].isCorrect) correctCount++; }
                else { if(originalAnswers[`q${q.id}`] && originalAnswers[`q${q.id}`].isCorrect) correctCount++; }
            }
        } else if (activeTab === 'mcq') {
            total = mcqQuestions.length;
            for(let q of mcqQuestions) { if(mcqAnswers[`q${q.id}`] && mcqAnswers[`q${q.id}`].isCorrect) correctCount++; }
        } else {
            total = trueFalseQuestions.length;
            for(let q of trueFalseQuestions) { if(trueFalseAnswers[`q${q.id}`] && trueFalseAnswers[`q${q.id}`].isCorrect) correctCount++; }
        }
        let percent = total===0?0:Math.round((correctCount/total)*100);
        let tabName = activeTab === 'original' ? 'الأصلي' : (activeTab === 'mcq' ? 'اختيار من متعدد' : 'صح/خطأ');
        document.getElementById('scoreBoard').innerHTML = `📊 التقييم (${tabName}): ${correctCount} / ${total} إجابة صحيحة (${percent}%) ${percent>=70?'🎉 ممتاز':(percent>=50?'👍 جيد':'📚 يحتاج مراجعة')}`;
    }

    // دوال التصحيح للتبويب الأصلي
    window.selectOriginalOption = function(qId, val) {
        let question = originalQuestions.find(q => q.id === qId);
        let isCorrect = (question && question.correct === val);
        let msg = isCorrect ? `✅ صحيح! ${question.explanation||''}` : `❌ خطأ. الإجابة الصحيحة: ${question.correct.toUpperCase()}. ${question.explanation||''}`;
        originalAnswers[`q${qId}`] = { isCorrect, msg };
        let fbDiv = document.getElementById(`fb-orig-${qId}`);
        if(fbDiv) { fbDiv.innerHTML = msg; fbDiv.className = `feedback ${isCorrect?'correct-feedback':'wrong-feedback'}`; }
        updateScore();
    };

    window.checkOriginalText = function(qId) {
        let inputEl = document.getElementById(`input-orig-${qId}`);
        let userAnswer = inputEl ? inputEl.value.trim() : '';
        let question = originalQuestions.find(q => q.id === qId);
        if(!question) return;
        let userNorm = userAnswer.replace(/\s+/g, ' ').trim().toLowerCase();
        let correctNorm = question.correctAnswer.replace(/\s+/g, ' ').trim().toLowerCase();
        let isCorrect = (userNorm === correctNorm) || (question.id === 30 && userNorm.includes('2.1')) || (question.id === 31 && userNorm.includes('8'));
        let msg = isCorrect ? `✅ صحيح! ${question.correctAnswer}` : `❌ خطأ. الإجابة: ${question.correctAnswer}`;
        originalAnswers[`text_q${qId}`] = { isCorrect, msg };
        let fbDiv = document.getElementById(`fb-orig-${qId}`);
        if(fbDiv) { fbDiv.innerHTML = msg; fbDiv.className = `feedback ${isCorrect?'correct-feedback':'wrong-feedback'}`; }
        updateScore();
    };

    // دوال التصحيح لتبويب الاختيار من متعدد
    window.selectMcqOption = function(qId, val) {
        let question = mcqQuestions.find(q => q.id === qId);
        let isCorrect = (question && question.correct === val);
        let msg = isCorrect ? `✅ صحيح! ${question.explanation||''}` : `❌ خطأ. الإجابة الصحيحة: ${question.correct.toUpperCase()}. ${question.explanation||''}`;
        mcqAnswers[`q${qId}`] = { isCorrect, msg };
        let fbDiv = document.getElementById(`fb-mcq-${qId}`);
        if(fbDiv) { fbDiv.innerHTML = msg; fbDiv.className = `feedback ${isCorrect?'correct-feedback':'wrong-feedback'}`; }
        updateScore();
    };

    // دوال التصحيح لتبويب صح/خطأ
    window.selectTrueFalse = function(qId, val) {
        let question = trueFalseQuestions.find(q => q.id === qId);
        let isCorrect = (question && ((val === 'true' && question.correct) || (val === 'false' && !question.correct)));
        let correctText = question.correct ? "صحيح" : "خطأ";
        let msg = isCorrect ? `✅ صحيح! ${question.explanation||''}` : `❌ خطأ. الإجابة الصحيحة: ${correctText}. ${question.explanation||''}`;
        trueFalseAnswers[`q${qId}`] = { isCorrect, msg };
        let fbDiv = document.getElementById(`fb-tf-${qId}`);
        if(fbDiv) { fbDiv.innerHTML = msg; fbDiv.className = `feedback ${isCorrect?'correct-feedback':'wrong-feedback'}`; }
        updateScore();
    };

    // دوال العرض
    function renderOriginalTab() {
        let html = '';
        let sectionsMap = new Map();
        originalQuestions.forEach(q => {
            if (!sectionsMap.has(q.section)) sectionsMap.set(q.section, []);
            sectionsMap.get(q.section).push(q);
        });
        for(let [sectionName, questions] of sectionsMap.entries()) {
            html += `<div class="section"><div class="section-title">📘 ${sectionName}</div>`;
            for(let q of questions) {
                if(q.type === 'mcq_orig') {
                    html += `<div class="question-card"><div class="question-text">${q.text}</div>
                        <div class="options" id="options-orig-${q.id}">${q.options.map((opt, idx) => { let optVal = String.fromCharCode(97+idx); return `<label class="option"><input type="radio" name="orig_${q.id}" value="${optVal}" onchange="selectOriginalOption(${q.id},'${optVal}')"><span>${opt}</span></label>`; }).join('')}</div>
                        <div class="feedback neutral-feedback" id="fb-orig-${q.id}">🔘 اختر إجابة.</div></div>`;
                } else if(q.type === 'graph_orig') {
                    html += `<div class="question-card"><div class="question-text">${q.text}</div>
                        <div class="options" id="options-orig-${q.id}">${q.graphOptions.map(opt => `<label class="option graph-option"><input type="radio" name="orig_${q.id}" value="${opt.value}" onchange="selectOriginalOption(${q.id},'${opt.value}')"><div class="graph-svg">${opt.svg}</div><span>${opt.label}</span></label>`).join('')}</div>
                        <div class="feedback neutral-feedback" id="fb-orig-${q.id}">🔘 اختر الشكل البياني الصحيح.</div></div>`;
                } else {
                    html += `<div class="question-card"><div class="question-text">${q.text}</div>
                        <div class="input-answer"><input type="text" id="input-orig-${q.id}" placeholder="اكتب إجابتك هنا..."><button onclick="checkOriginalText(${q.id})">✔ تحقق</button></div>
                        <div class="feedback neutral-feedback" id="fb-orig-${q.id}">✍️ أدخل إجابتك ثم اضغط تحقق.</div></div>`;
                }
            }
            html += `</div>`;
        }
        document.getElementById('originalTab').innerHTML = html;
    }

    function renderMcqTab() {
        let html = '<div class="section"><div class="section-title">📘 أسئلة اختيار من متعدد</div>';
        for(let q of mcqQuestions) {
            html += `<div class="question-card"><div class="question-text">${q.text}</div>
                <div class="options" id="options-mcq-${q.id}">${q.options.map((opt, idx) => { let optVal = String.fromCharCode(97+idx); return `<label class="option"><input type="radio" name="mcq_${q.id}" value="${optVal}" onchange="selectMcqOption(${q.id},'${optVal}')"><span>${opt}</span></label>`; }).join('')}</div>
                <div class="feedback neutral-feedback" id="fb-mcq-${q.id}">🔘 اختر إجابة.</div></div>`;
        }
        html += `</div>`;
        document.getElementById('mcqTab').innerHTML = html;
    }

    function renderTrueFalseTab() {
        let html = '<div class="section"><div class="section-title">📘 أسئلة صح / خطأ</div>';
        for(let q of trueFalseQuestions) {
            html += `<div class="question-card"><div class="question-text">${q.text}</div>
                <div class="options" id="options-tf-${q.id}">
                    <label class="option"><input type="radio" name="tf_${q.id}" value="true" onchange="selectTrueFalse(${q.id},'true')"><span>✔️ صحيح</span></label>
                    <label class="option"><input type="radio" name="tf_${q.id}" value="false" onchange="selectTrueFalse(${q.id},'false')"><span>❌ خطأ</span></label>
                </div>
                <div class="feedback neutral-feedback" id="fb-tf-${q.id}">🔘 اختر صح أو خطأ.</div></div>`;
        }
        html += `</div>`;
        document.getElementById('truefalseTab').innerHTML = html;
    }

    window.switchTab = function(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(tab === 'original') {
            document.querySelector('.tabs button:first-child').classList.add('active');
            document.getElementById('originalTab').classList.add('active-tab');
            document.getElementById('mcqTab').classList.remove('active-tab');
            document.getElementById('truefalseTab').classList.remove('active-tab');
        } else if(tab === 'mcq') {
            document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            document.getElementById('mcqTab').classList.add('active-tab');
            document.getElementById('originalTab').classList.remove('active-tab');
            document.getElementById('truefalseTab').classList.remove('active-tab');
        } else {
            document.querySelector('.tabs button:last-child').classList.add('active');
            document.getElementById('truefalseTab').classList.add('active-tab');
            document.getElementById('originalTab').classList.remove('active-tab');
            document.getElementById('mcqTab').classList.remove('active-tab');
        }
        updateScore();
    };

    window.resetAllTabs = function() {
        originalAnswers = {};
        mcqAnswers = {};
        trueFalseAnswers = {};
        renderOriginalTab();
        renderMcqTab();
        renderTrueFalseTab();
        updateScore();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.addEventListener('click', function(e) {
        let option = e.target.closest('.option');
        if(option && !e.target.closest('input[type="radio"]')) {
            let radio = option.querySelector('input[type="radio"]');
            if(radio) { radio.checked = true; let changeEvent = new Event('change', { bubbles: true }); radio.dispatchEvent(changeEvent); }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        renderOriginalTab();
        renderMcqTab();
        renderTrueFalseTab();
        updateScore();
    });
</script>
</body>
</html>
