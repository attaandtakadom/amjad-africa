<div class="section-card" style="border: 2px solid #f39c12;">
    <h2 class="section-title" style="color: #f39c12;"><i class="fas fa-star"></i> كويز التحدي: هل أنت خبير نووي؟</h2>
    
    <div class="question-box">
        <div class="question-text">
            <i class="fas fa-microscope"></i> 11. إذا فقدت نواة عنصر ما جسيم "ألفا" ثم جسيمي "بيتا"، فإن النواة الناتجة تكون:
        </div>
        <div class="options">
            <label class="option"><input type="radio" name="q11" value="a"> أ) نظير للنواة الأصلية (نفس Z)</label>
            <label class="option"><input type="radio" name="q11" value="b"> ب) عنصر جديد تماماً</label>
            <label class="option"><input type="radio" name="q11" value="c"> ج) نواة لها نفس العدد الكتلي A</label>
        </div>
        <button class="check-btn" onclick="checkMCQ('q11','a','ألفا ينقص Z بـ 2، ثم 2 بيتا يزيدان Z بـ 2، فنعود لنفس العدد الذري (نظير)')">
            <i class="fas fa-check"></i> تحقق
        </button>
        <div id="fb_q11" class="feedback"></div>
    </div>

    <div class="question-box">
        <div class="question-text">
            <i class="fas fa-hourglass-half"></i> 12. عينة إشعاعية عمر نصفها (20 يوم)، كم يتبقى منها بعد مرور (60 يوم)؟
        </div>
        <div class="options">
            <label class="option"><input type="radio" name="q12" value="a"> أ) نصف العينة</label>
            <label class="option"><input type="radio" name="q12" value="b"> ب) ربع العينة</label>
            <label class="option"><input type="radio" name="q12" value="c"> ج) ثُمن العينة (12.5%)</label>
        </div>
        <button class="check-btn" onclick="checkMCQ('q12','c','60 يوم تعادل 3 أعمار نصف: (1/2) × (1/2) × (1/2) = 1/8')">
            <i class="fas fa-check"></i> تحقق
        </button>
        <div id="fb_q12" class="feedback"></div>
    </div>

    <div class="question-box">
        <div class="question-text">
            <i class="fas fa-bolt"></i> 13. أي من الإشعاعات التالية لا يتأثر بالمجال الكهربائي أو المغناطيسي؟
        </div>
        <div class="options">
            <label class="option"><input type="radio" name="q13" value="a"> أ) أشعة جاما (γ)</label>
            <label class="option"><input type="radio" name="q13" value="b"> ب) جسيمات بيتا (β)</label>
            <label class="option"><input type="radio" name="q13" value="c"> ج) جسيمات ألفا (α)</label>
        </div>
        <button class="check-btn" onclick="checkMCQ('q13','a','جاما عبارة عن فوتونات متعادلة الشحنة فلا تنحرف')">
            <i class="fas fa-check"></i> تحقق
        </button>
        <div id="fb_q13" class="feedback"></div>
    </div>
</div>
