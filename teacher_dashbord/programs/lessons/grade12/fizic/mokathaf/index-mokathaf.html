<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>منصة الفيزياء - مدرسة أمجاد أفريقيا</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2><i class="fa-solid fa-desktop"></i> منصة الفيزياء</h2>
        <span class="school-badge">مدرسة أمجاد أفريقيا - ليبيا</span>
        <span id="question-counter"></span>
    </div>

    <div class="question-container">
        <div class="question-meta">
            <span class="q-source-span" id="q-source"></span>
        </div>
        <div class="question-text" id="main-question-text"></div>
        <div class="question-graphic-area" id="graphic-container"></div>
    </div>

    <div class="steps-container" id="steps-container"></div>

    <div class="navigation-area">
        <button class="nav-btn" id="prev-btn" onclick="navigateQuestion(-1)">
            <i class="fa-solid fa-arrow-right"></i> السابق
        </button>
        <button class="nav-btn" id="next-btn" onclick="navigateQuestion(1)">
            التالي <i class="fa-solid fa-arrow-left"></i>
        </button>
    </div>
</div>

<div class="print-section">
    <button class="print-btn" onclick="triggerSmartPrint()">
        <i class="fa-solid fa-file-pdf"></i> طباعة PDF
    </button>
    <a href="https://t.me/amjad_africa2027bot" target="_blank" class="bot-link-btn">
        <i class="fa-brands fa-telegram"></i> البوت التعليمي
    </a>
</div>

<div id="printable-pdf-document"></div>
<div id="dynamic-pdf-questions-area"></div>

<script src="array-questions.js"></script>

<script>
    let currentQIndex = 0;

    function navigateQuestion(direction) {
        const newIndex = currentQIndex + direction;
        if (newIndex >= 0 && newIndex < questionsMatrix.length) {
            currentQIndex = newIndex;
            renderActiveQuestion(currentQIndex);
        }
    }

    function renderActiveQuestion(index) {
        const data = questionsMatrix[index];
        if (!data) return;

        document.getElementById('q-source').innerText = data.title;
        document.getElementById('main-question-text').innerText = data.text;
        document.getElementById('question-counter').innerHTML = `مسألة ${index + 1} / ${questionsMatrix.length}`;

        const graphicContainer = document.getElementById('graphic-container');
        if (data.svgCode && data.svgCode.trim() !== "") {
            graphicContainer.innerHTML = data.svgCode;
        } else if (data.imagePath && data.imagePath.trim() !== "") {
            graphicContainer.innerHTML = `<img src="${data.imagePath}" alt="رسم توضيحي">`;
        } else {
            graphicContainer.innerHTML = '<p class="no-graphic">⚠️ لا يوجد رسم توضيحي</p>';
        }

        document.getElementById('prev-btn').disabled = index === 0;
        document.getElementById('next-btn').disabled = index === questionsMatrix.length - 1;

        const stepsContainer = document.getElementById('steps-container');
        stepsContainer.innerHTML = '';

        if (data.steps) {
            data.steps.forEach((step, sIdx) => {
                let optionsHTML = '';
                step.options.forEach(opt => {
                    optionsHTML += `
                        <button class="option-btn" onclick="checkLiveAnswer(this, ${sIdx}, ${opt.isCorrect})" data-feedback="${step.feedback}">
                            <span>${opt.text}</span>
                            <i class="fa-regular fa-circle"></i>
                        </button>
                    `;
                });

                stepsContainer.innerHTML += `
                    <div class="step-card ${sIdx === 0 ? 'active' : ''}" id="step-card-${sIdx}">
                        <div class="step-title">${step.title}</div>
                        <div class="step-question">${step.question}</div>
                        <div class="options-grid">${optionsHTML}</div>
                        <div class="feedback-box" id="feedback-${sIdx}"></div>
                    </div>
                `;
            });
        }
    }

    function checkLiveAnswer(btn, sIdx, isCorrect) {
        const card = document.getElementById(`step-card-${sIdx}`);
        const fb = document.getElementById(`feedback-${sIdx}`);

        card.querySelectorAll('.option-btn').forEach(b => {
            b.classList.remove('correct', 'wrong');
            b.querySelector('i').className = 'fa-regular fa-circle';
        });

        if (isCorrect) {
            btn.classList.add('correct');
            btn.querySelector('i').className = 'fa-solid fa-circle-check';
            fb.innerHTML = `<i class="fa-solid fa-check"></i> ${btn.getAttribute('data-feedback')}`;
            fb.className = 'feedback-box success';
            card.classList.add('completed');
            card.classList.remove('active');

            const nextCard = document.getElementById(`step-card-${sIdx + 1}`);
            if (nextCard) {
                nextCard.classList.add('active');
                nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        } else {
            btn.classList.add('wrong');
            btn.querySelector('i').className = 'fa-solid fa-circle-xmark';
        }
    }

    // ===== دالة الطباعة الذكية بدون ترقيم ومع فواصل منضبطة =====
    function triggerSmartPrint() {
        const printableDoc = document.getElementById('printable-pdf-document');
        const questionsArea = document.getElementById('dynamic-pdf-questions-area');

        printableDoc.innerHTML = '';
        questionsArea.innerHTML = '';

        // ===== صفحة الغلاف =====
        const coverPage = document.createElement('div');
        coverPage.className = 'pdf-cover-page';
        coverPage.innerHTML = `
            <div class="school-name">مدرسة أمجاد أفريقيا - ليبيا - البيضاء</div>
            <div class="main-title">الفيزياء</div>
            <div class="sub-title">الصف الثالث الثانوي</div>
            <div class="cover-frame">
                <h3>📘 كراسة الحلول النموذجية 📘</h3>
                <h4>أسئلة من امتحانات سابقة</h4>
                <div class="cover-subjects">الكهربائية والمغناطيسية والذرية</div>
                <div class="year">العام الدراسي 2025 - 2026</div>
            </div>
            <div class="dedication">✨ إهداء إلى طلبتنا المتميزين ✨</div>
            <div class="bot-link">
                رابط البوت التعليمي:<br>
                <a href="http://t.me/amjad_africa2027bot">t.me/amjad_africa2027bot</a>
            </div>
        `;
        printableDoc.appendChild(coverPage);

        // ===== حاوية الأسئلة الكلية =====
        const continuousWrapper = document.createElement('div');
        continuousWrapper.className = 'pdf-continuous-wrapper';

        let specialGroupCounter = 0; 
        const totalMatrixCount = questionsMatrix.length;

        questionsMatrix.forEach((q, idx) => {
            const currentNumber = idx + 1;

            let stepsHtml = '';
            if (q.pdfSolutionSteps && q.pdfSolutionSteps.length > 0) {
                q.pdfSolutionSteps.forEach(s => {
                    if (s && s.trim()) {
                        stepsHtml += `<div>${s}</div>`;
                    }
                });
            }

            let graphicHtml = '';
            if (q.svgCode && q.svgCode.trim() !== "") {
                graphicHtml = `<div class="pdf-graphic">${q.svgCode}</div>`;
            } else if (q.imagePath && q.imagePath.trim() !== "") {
                graphicHtml = `<div class="pdf-graphic"><img src="${q.imagePath}" alt="رسم توضيحي"></div>`;
            }

            const questionDiv = document.createElement('div');
            questionDiv.className = 'pdf-question-block';
            
            // إدارة المعاملة الخاصة لأول 13 سؤالاً (كل 4 أسئلة في صفحة)
            if (currentNumber <= 13) {
                specialGroupCounter++;
                if (specialGroupCounter === 4 && currentNumber < 13) {
                    questionDiv.className += ' force-page-break';
                    specialGroupCounter = 0;
                } else if (currentNumber === 13) {
                    questionDiv.className += ' force-page-break';
                }
            }

            // تم حذف متغير الترقيم التلقائي (currentNumber) بناءً على طلبك
            questionDiv.innerHTML = `
                <div class="pdf-q-title">${q.title || ''}</div>
                <div class="pdf-q-text">${q.text || ''}</div>
                ${graphicHtml}
                <div class="pdf-solution-box">
                    <div class="pdf-sol-steps">${stepsHtml || 'لا يوجد حل متاح'}</div>
                    ${q.pdfFinalAnswer ? `<div class="pdf-final-ans">${q.pdfFinalAnswer}</div>` : ''}
                </div>
            `;
            continuousWrapper.appendChild(questionDiv);
        });

        questionsArea.appendChild(continuousWrapper);

        setTimeout(() => {
            window.print();
        }, 500);
    }

    window.onload = () => {
        renderActiveQuestion(0);
    };
</script>

</body>
</html>
